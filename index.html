<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Lolo Touch - Retro Edition</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #boardWrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas { 
      width: 100%; 
      height: 100%; 
      display: block; 
      touch-action: none; 
      image-rendering: pixelated; 
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      flex-wrap: wrap;
    }
    .pill {
      background: #000;
      border: 2px solid #666;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px #000;
    }
    .pill.interactive {
      pointer-events: auto;
      cursor: pointer;
    }
    #levelDropdown {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 42px);
      left: 8px;
      z-index: 4;
      min-width: 130px;
      border: 2px solid #666;
      background: #000;
      display: none;
      flex-direction: column;
      box-shadow: 2px 2px 0 #000;
    }
    #levelDropdown.visible { display: flex; }
    .level-option {
      border: 0;
      border-bottom: 1px solid #333;
      background: transparent;
      text-align: left;
      padding: 8px;
      min-height: 34px;
      font-size: 13px;
      box-shadow: none;
    }
    .level-option:last-child { border-bottom: 0; }
    #controls {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      border: 2px solid #fff;
      min-height: 46px;
      font-size: 16px;
      color: #fff;
      background: #000;
      font-weight: bold;
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 2px 2px 0px #000;
      cursor: pointer;
    }
    #controls button {
      min-height: 38px;
      font-size: 13px;
      padding: 4px;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
      background: #333;
    }

    #editorView {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #050505;
      color: #fff;
      display: none;
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px);
      overflow: auto;
    }
    #editorView.visible {
      display: block;
    }
    .editor-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .editor-actions button {
      min-height: 42px;
      font-size: 13px;
    }
    #editorStatus {
      margin: 0 0 10px;
      font-size: 14px;
      border: 1px dashed #666;
      padding: 6px;
      min-height: 34px;
    }
    .editor-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .editor-card {
      border: 2px solid #666;
      padding: 8px;
      background: #111;
    }
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(62px, 1fr));
      gap: 6px;
    }
    .palette-tile.active {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    #editorGrid {
      --editor-cell-size: clamp(14px, 4.4vw, 20px);
      display: grid;
      grid-template-columns: repeat(20, var(--editor-cell-size));
      width: fit-content;
      margin: 0 auto;
      gap: 0;
      background: #000;
      border: 2px solid #666;
      touch-action: none;
    }
    .editor-cell {
      border: 0;
      min-height: var(--editor-cell-size);
      height: var(--editor-cell-size);
      width: var(--editor-cell-size);
      box-shadow: none;
      padding: 0;
      background-color: #000;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
    }
    .editor-cell:active {
      transform: none;
      box-shadow: none;
    }
    .editor-cell.drop-target {
      outline: 2px solid #00d4ff;
      outline-offset: -2px;
      box-shadow: inset 0 0 0 2px rgba(0, 212, 255, 0.35);
    }
    #editorText {
      width: 100%;
      min-height: 150px;
      background: #000;
      color: #fff;
      border: 2px solid #666;
      font-family: inherit;
      padding: 8px;
      resize: vertical;
    }
  </style>
</head>

const ALLOWED = new Set(['#','V','.','P','H','C','B','~','R','A','M','T','S','D','N','U','E','O']);
function parseLevelRows(raw) {
  const rows = raw.trim().split('\n').map(r => r.trim());
  const h = rows.length;
  const w = rows[0]?.length ?? 0;
  if (!h || !w) throw new Error('Nivel inválido: vacío.');
  for (const row of rows) {
    if (row.length !== w) throw new Error('Nivel inválido: ancho inconsistente.');
    for (const ch of row) if (!ALLOWED.has(ch)) throw new Error('Tile inválido: ' + ch);
  }
  return rows;
}

function key(x,y){ return `${x},${y}`; }
function has(set,x,y){ return set.has(key(x,y)); }
function setFromArr(arr){ return new Set(arr.map(p => key(p.x,p.y))); }
function arrFromSet(set){ return [...set].map(s=>{ const [x,y] = s.split(',').map(Number); return {x,y}; }); }
function inBounds(x,y){ return x>=0 && y>=0 && x<W && y<H; }
function chestOpen(){ return state.hearts.size === 0; }
function enemyAt(x,y){ return state.enemies.find(e => e.x===x && e.y===y); }
function fireballAt(x,y){ return state.fireballs.find(f => Math.round(f.x)===x && Math.round(f.y)===y); }

function setPlayerAnimation(fromX, fromY, toX, toY){
  playerAnim = { fromX, fromY, toX, toY, startedAt: performance.now(), duration: PLAYER_MOVE_MS };
}

function clearPlayerAnimation(){
  playerAnim = null;
}

function getPlayerDrawPosition(now = performance.now()){
  if (!playerAnim) return { x: state.player.x, y: state.player.y };
  const elapsed = now - playerAnim.startedAt;
  const t = Math.max(0, Math.min(1, elapsed / Math.max(1, playerAnim.duration)));
  if (t >= 1) {
    playerAnim = null;
    return { x: state.player.x, y: state.player.y };
  }
  return {
    x: playerAnim.fromX + (playerAnim.toX - playerAnim.fromX) * t,
    y: playerAnim.fromY + (playerAnim.toY - playerAnim.fromY) * t,
  };
}

function parseLevel(){
  const base = Array.from({ length:H }, () => Array(W).fill('.'));
  const hearts = [];
  const blocks = [];
  const enemies = [];
  let player = null;
  let chest = null;
  let door = null;

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const ch = LEVEL[y][x];
    if ('#V.~TCDSR'.includes(ch)) base[y][x] = ch;
    if (ch === 'P') player = { x, y, facing:[1,0] };
    if (ch === 'H') hearts.push({ x, y });
    if (ch === 'A') enemies.push({ type:'ardilla', x, y, charge:0, alert:false });
    if (ch === 'M') enemies.push({ type:'medusa', x, y, charge:0, alert:false });
    if (ch === 'N') enemies.push({ type:'dragon', x, y, dir:[0,-1], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'U') enemies.push({ type:'dragon', x, y, dir:[0,1], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'E') enemies.push({ type:'dragon', x, y, dir:[1,0], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'O') enemies.push({ type:'dragon', x, y, dir:[-1,0], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'B') blocks.push({ x, y });
    if (ch === 'C') chest = { x, y };
    if (ch === 'D') door = { x, y };
  }
  return { base, player, chest, door, hearts:setFromArr(hearts), blocks:setFromArr(blocks), filledWater:new Set(), enemies };
}

function snapshot(){
  return {
    player: { ...state.player },
    hearts: arrFromSet(state.hearts),
    shots: state.shots,
    blocks: arrFromSet(state.blocks),
    eggs: arrFromSet(state.eggs),
    eggTimers: [...state.eggTimers.entries()].map(([pos, hatchAt]) => { const [x,y] = pos.split(',').map(Number); return { x, y, hatchAt }; }),
    filledWater: arrFromSet(state.filledWater),
    enemies: state.enemies.map(e => ({ ...e })),
    doorOpen: state.doorOpen,
    frozenUntil: state.frozenUntil,
    medusaShot: state.medusaShot ? { ...state.medusaShot } : null,
    fireballs: state.fireballs.map(f => ({ ...f })),
    keyCollected: Boolean(state.keyCollected),
    explosions: state.explosions.map(explosion => ({ ...explosion })),
  };
}

function restore(s){
  state.player = { ...s.player };
  state.hearts = setFromArr(s.hearts);
  state.shots = s.shots ?? 0;
  state.blocks = setFromArr(s.blocks);
  state.eggs = setFromArr(s.eggs);
  state.eggTimers = new Map((s.eggTimers ?? []).map(t => [key(t.x, t.y), t.hatchAt]));
  state.filledWater = setFromArr(s.filledWater);
  state.enemies = s.enemies.map(e => ({ ...e }));
  state.doorOpen = Boolean(s.doorOpen);
  state.won = false;
  state.deadUntil = 0;
  state.frozenUntil = 0;
  state.medusaShot = null;
  state.fireballs = (s.fireballs ?? []).map(f => ({ ...f }));
  state.resetFlashUntil = 0;
  state.keyCollected = Boolean(s.keyCollected);
  state.explosions = (s.explosions ?? []).map(explosion => ({ ...explosion }));
  clearPlayerAnimation();
}

function triggerEnemyExplosion(){
  const now = performance.now();
  const exploded = [];
  for (const enemy of state.enemies) exploded.push({ x: enemy.x, y: enemy.y, startedAt: now, life: EXPLOSION_FLASH_MS });
  for (const egg of arrFromSet(state.eggs)) exploded.push({ x: egg.x, y: egg.y, startedAt: now, life: EXPLOSION_FLASH_MS });
  if (!exploded.length) return;
  state.explosions.push(...exploded);
  state.enemies = [];
  state.eggs = new Set();
  state.eggTimers = new Map();
  state.medusaShot = null;
  state.fireballs = [];
  state.frozenUntil = 0;
  setHudMessage('¡La llave destruyó a todos los enemigos!');
  navigator.vibrate?.([20, 20, 45]);
}

function pushUndoSnapshot(undoSnapshot){
  state.undo.push(undoSnapshot);
  if (state.undo.length > MAX_UNDO) state.undo.shift();
}

function pushUndo(){
  pushUndoSnapshot(snapshot());
}

function passableForPlayer(x,y,ignorePushables=false){
  if (!inBounds(x,y)) return false;
  if (!ignorePushables) {
    if (has(state.blocks,x,y)) return false;
    if (has(state.eggs,x,y) && !has(state.filledWater,x,y)) return false;
  }
  const b = state.base[y][x];
  if (b === '#' || b === 'V' || b === 'T' || b === 'S') return false;
  if (b === '~' && !has(state.filledWater,x,y)) return false;
  if (b === 'C' && !chestOpen()) return false;
  if (b === 'D' && !state.doorOpen) return false;
  return !enemyAt(x,y) && !fireballAt(x,y);
}

function isPlayerFrozen(){
  return state.frozenUntil && performance.now() < state.frozenUntil;
}

function killPlayer(){
  if (state.deadUntil || state.won) return;
  const now = performance.now();
  state.deadUntil = now + 350;
  state.frozenUntil = now + 350;
  navigator.vibrate?.(40);
}

function winLevel(){
  state.won = true;
  setHudMessage('¡Pantalla completada!');
  navigator.vibrate?.([30,30,60]);
  window.setTimeout(() => {
    currentLevelIndex = (currentLevelIndex + 1) % LEVELS_RAW.length;
    currentLevelRaw = LEVELS_RAW[currentLevelIndex];
    startLevel();
    resize();
  }, 450);
}

function attemptPush(setRef, fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  if (t === '#' || t === 'V' || t === 'T' || t === 'C' || t === 'D' || t === 'S') return false;
  const fromKey = key(fromX,fromY);
  const toKey = key(nx,ny);
  const eggHatchAt = setRef === state.eggs ? state.eggTimers.get(fromKey) : null;
  setRef.delete(fromKey);
  if (setRef === state.eggs) state.eggTimers.delete(fromKey);
  if (t === '~' && !has(state.filledWater,nx,ny)) {
    state.filledWater.add(toKey);
    if (setRef === state.eggs) {
      setRef.add(toKey);
    }
  } else {
    setRef.add(toKey);
    if (setRef === state.eggs && eggHatchAt != null) state.eggTimers.set(toKey, eggHatchAt);
  }
  return true;
}

function tryMovePlayer(dx,dy){
  if (isPlayerFrozen()) return false;
  const tx = state.player.x + dx;
  const ty = state.player.y + dy;
  if (!inBounds(tx,ty)) return false;
  state.player.facing = [dx,dy];

  if (enemyAt(tx,ty)) return false;

  if (has(state.blocks,tx,ty)) {
    if (!attemptPush(state.blocks, tx, ty, dx, dy)) return false;
  } else if (has(state.eggs,tx,ty)) {
    if (!has(state.filledWater,tx,ty)) {
      if (!attemptPush(state.eggs, tx, ty, dx, dy)) return false;
    }
  } else if (!passableForPlayer(tx,ty,true)) {
    return false;
  }

  const fromX = state.player.x;
  const fromY = state.player.y;
  state.player.x = tx;
  state.player.y = ty;
  setPlayerAnimation(fromX, fromY, tx, ty);
  const heartKey = key(tx,ty);
  if (state.hearts.has(heartKey)) {
    state.hearts.delete(heartKey);
    state.shots += 1;
    setHudMessage('¡Ganaste 1 disparo!');
  }
  if (!state.doorOpen && chestOpen() && state.chest && tx === state.chest.x && ty === state.chest.y) {
    if (!state.keyCollected) {
      state.keyCollected = true;
      triggerEnemyExplosion();
    }
    state.doorOpen = true;
    setHudMessage('¡Puerta abierta!');
  }
  if (state.doorOpen && state.door && tx === state.door.x && ty === state.door.y) return winLevel(), true;
  if (fireballAt(tx, ty)) killPlayer();
  const now = performance.now();
  updateDragonThreat(now);
  resolveMedusaThreat(now, true);
  return true;
}

function shoot(){
  if (isPlayerFrozen()) return false;
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  const [dx,dy] = state.player.facing;
  if (!dx && !dy) return false;
  const x = state.player.x + dx;
  const y = state.player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit && hit.type === 'ardilla') {
    state.enemies = state.enemies.filter(v => v !== hit);
    const eggPos = key(x,y);
    state.eggs.add(eggPos);
    state.eggTimers.set(eggPos, performance.now() + EGG_HATCH_MS);
    state.shots -= 1;
    setHudMessage('¡Ardilla convertida en huevo!');
    navigator.vibrate?.(20);
    return true;
  }
  if (has(state.eggs,x,y)) {
    const eggPos = key(x,y);
    state.eggs.delete(eggPos);
    state.eggTimers.delete(eggPos);
    state.shots -= 1;
    setHudMessage('¡Huevo eliminado!');
    navigator.vibrate?.(15);
    return true;
  }
  setHudMessage('Acércate a una ardilla o un huevo para disparar');
  return false;
}

function interactAdjacent(dx,dy){
  if (isPlayerFrozen()) return false;
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  const x = state.player.x + dx;
  const y = state.player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit && hit.type === 'ardilla') {
    state.enemies = state.enemies.filter(v => v !== hit);
    const eggPos = key(x,y);
    state.eggs.add(eggPos);
    state.eggTimers.set(eggPos, performance.now() + EGG_HATCH_MS);
    state.shots -= 1;
    setHudMessage('¡Ardilla convertida en huevo!');
    navigator.vibrate?.(20);
    return true;
  }
  if (has(state.eggs,x,y)) {
    const eggPos = key(x,y);
    state.eggs.delete(eggPos);
    state.eggTimers.delete(eggPos);
    state.shots -= 1;
    setHudMessage('¡Huevo eliminado!');
    navigator.vibrate?.(15);
    return true;
  }
  return false;
}

function tapToTile(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - board.x) / board.t;
  const y = (clientY - rect.top - board.y) / board.t;
  return {
    x: Math.max(0, Math.min(W-1, Math.round(x - 0.5))),
    y: Math.max(0, Math.min(H-1, Math.round(y - 0.5))),
  };
}

function canDragThrough(x,y){
  if (x === state.player.x && y === state.player.y) return true;
  return passableForPlayer(x,y,true);
}

function appendStepToPath(path, tile){
  const last = path[path.length - 1];
  if (!last) {
    path.push(tile);
    return;
  }
  if (last.x === tile.x && last.y === tile.y) return;

  let cx = last.x;
  let cy = last.y;
  while (cx !== tile.x || cy !== tile.y) {
    const dx = tile.x - cx;
    const dy = tile.y - cy;

    const horizontalFirst = Math.abs(dx) >= Math.abs(dy);
    const candidates = [];
    if (horizontalFirst) {
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
    } else {
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
    }

    const next = candidates.find(c => canDragThrough(c.x, c.y));
    if (!next) break;

    cx = next.x;
    cy = next.y;
    if (path[path.length - 1].x !== cx || path[path.length - 1].y !== cy) path.push({ x: cx, y: cy });
  }
}

function clearPathInput(){
  activePointerId = null;
  dragPath = [];
}

function clearKeyboardInput(){
}

function enqueueMove(dx, dy, undoSnapshot = snapshot(), intervalMs = MOVE_INTERVAL){
  queuedMoves.push({ dx, dy, undoSnapshot, intervalMs });
  if (queuedMoves.length === 1) moveAcc = intervalMs;
}

function queueDraggedPath(){
  if (dragPath.length < 2) return;
  const steps = [];
  for (let i = 1; i < dragPath.length; i++) {
    const prev = dragPath[i - 1];
    const next = dragPath[i];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    if (Math.abs(dx) + Math.abs(dy) !== 1) continue;
    steps.push([dx, dy]);
  }
  if (!steps.length) return;
  for (const [dx, dy] of steps) enqueueMove(dx, dy, snapshot(), DRAG_PATH_MOVE_INTERVAL);
}

function processQueuedMove(){
  if (!queuedMoves.length || state.won || state.deadUntil || isPlayerFrozen()) return false;
  const nextMove = queuedMoves.shift();
  pushUndoSnapshot(nextMove.undoSnapshot);
  if (!tryMovePlayer(nextMove.dx, nextMove.dy)) {
    state.undo.pop();
  }
  return true;
}

canvas.addEventListener('pointerdown', e => {
  if (state.won || isEditorOpen || isPlayerFrozen()) return;
  const t = tapToTile(e.clientX, e.clientY);
  if (t.x === state.player.x && t.y === state.player.y) {
    activePointerId = e.pointerId;
    queuedMoves = [];
    dragPath = [{ x: state.player.x, y: state.player.y }];
    canvas.setPointerCapture(e.pointerId);
    return;
  }

  const dx = t.x - state.player.x;
  const dy = t.y - state.player.y;
  if (Math.abs(dx) + Math.abs(dy) === 1) {
    const stepX = Math.sign(dx);
    const stepY = Math.sign(dy);
    state.player.facing = [stepX, stepY];
    const undoSnapshot = snapshot();
    if (interactAdjacent(stepX, stepY)) {
      pushUndoSnapshot(undoSnapshot);
      return;
    }
    enqueueMove(stepX, stepY, undoSnapshot);
    return;
  }
  if (dx === 0 || dy === 0) {
    state.player.facing = [Math.sign(dx), Math.sign(dy)];
    pushUndo();
    if (!shoot()) state.undo.pop();
  }
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointerId || !dragPath.length) return;
  const tile = tapToTile(e.clientX, e.clientY);
  appendStepToPath(dragPath, tile);
});

function handlePointerEnd(e){
  if (e.pointerId !== activePointerId) return;
  queueDraggedPath();
  clearPathInput();
}

canvas.addEventListener('pointerup', handlePointerEnd);
canvas.addEventListener('pointercancel', handlePointerEnd);

document.addEventListener('keydown', (e) => {
  const movement = KEY_DIRECTIONS[e.key];
  if (!movement) return;
  e.preventDefault();
  if (isEditorOpen || state.won || state.deadUntil || isPlayerFrozen()) return;
  if (e.repeat || queuedMoves.length) return;
  const [dx, dy] = movement;
  const undoSnapshot = snapshot();
  pushUndoSnapshot(undoSnapshot);
  if (!tryMovePlayer(dx, dy)) state.undo.pop();
});

document.addEventListener('keyup', clearKeyboardInput);
window.addEventListener('blur', clearKeyboardInput);

function blockedForDragonSight(x,y){
  const b = state.base[y][x];
  if (b === '#' || b === 'V' || b === 'C' || b === 'D' || b === 'S' || b === 'T') return true;
  if (has(state.blocks,x,y) || has(state.eggs,x,y)) return true;
  if (enemyAt(x,y)) return true;
  return false;
}

function isPlayerInDragonFireDirection(dragon){
  const [dx, dy] = dragon.dir || [0, 0];
  if (!dx && !dy) return false;
  if (dx !== 0) {
    if (state.player.y !== dragon.y) return false;
    return (state.player.x - dragon.x) * dx > 0;
  }
  if (state.player.x !== dragon.x) return false;
  return (state.player.y - dragon.y) * dy > 0;
}


function triggerExplosionAt(x, y, now = performance.now()){
  state.explosions.push({ x, y, startedAt: now, life: EXPLOSION_FLASH_MS * 0.55 });
}

function spawnDragonFireball(dragon, now){
  const [dx, dy] = dragon.dir || [0, 0];
  const x = dragon.x + dx;
  const y = dragon.y + dy;
  if (!inBounds(x, y)) return;
  if (blockedForDragonSight(x, y)) {
    triggerExplosionAt(x, y, now);
    return;
  }
  const fireball = { x, y, dx, dy, lastStepAt: now };
  state.fireballs.push(fireball);
  if (x === state.player.x && y === state.player.y) killPlayer();
}

function updateDragonThreat(now = performance.now()){
  if (!chestOpen() || state.keyCollected || state.won || state.deadUntil) return;
  for (const enemy of state.enemies) {
    if (enemy.type !== 'dragon') continue;
    const seesPlayer = isPlayerInDragonFireDirection(enemy);
    if (!seesPlayer) {
      enemy.wasSeeingPlayer = false;
      continue;
    }
    const justSpottedPlayer = !enemy.wasSeeingPlayer;
    enemy.wasSeeingPlayer = true;
    if (!justSpottedPlayer && (enemy.coolDownUntil ?? 0) > now) continue;
    enemy.coolDownUntil = now + DRAGON_FIRE_COOLDOWN_MS;
    spawnDragonFireball(enemy, now);
  }
}

function advanceDragonFireballs(now = performance.now()){
  const next = [];
  for (const fireball of state.fireballs) {
    if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) continue;
    let stepped = false;
    while (now - fireball.lastStepAt >= DRAGON_FIREBALL_STEP_MS) {
      fireball.lastStepAt += DRAGON_FIREBALL_STEP_MS;
      fireball.x += fireball.dx;
      fireball.y += fireball.dy;
      stepped = true;
      if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) break;
      const tx = Math.round(fireball.x);
      const ty = Math.round(fireball.y);
      if (tx === state.player.x && ty === state.player.y) {
        killPlayer();
        break;
      }
      if (blockedForDragonSight(tx, ty)) {
        triggerExplosionAt(tx, ty, fireball.lastStepAt);
        break;
      }
    }
    if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) continue;
    const tx = Math.round(fireball.x);
    const ty = Math.round(fireball.y);
    if (tx === state.player.x && ty === state.player.y) continue;
    if (stepped && blockedForDragonSight(tx, ty)) continue;
    next.push(fireball);
  }
  state.fireballs = next;
}

function getFireballRenderPosition(fireball, now = performance.now()){
  const progress = Math.max(0, Math.min(1, (now - fireball.lastStepAt) / DRAGON_FIREBALL_STEP_MS));
  return {
    x: fireball.x + fireball.dx * progress,
    y: fireball.y + fireball.dy * progress,
  };
}

function blockedForMedusaShot(x,y){
  const b = state.base[y][x];
  return b === '#' || b === 'V' || b === 'C' || b === 'D' || b === 'S' || has(state.blocks,x,y) || has(state.eggs,x,y);
}

function hasLineOfSightToPlayer(medusa){
  if (medusa.x !== state.player.x && medusa.y !== state.player.y) return null;
  if (medusa.x === state.player.x) {
    const step = Math.sign(state.player.y - medusa.y);
    for (let y = medusa.y + step; y !== state.player.y; y += step) {
      if (blockedForMedusaShot(medusa.x, y)) return null;
    }
    return { dx: 0, dy: step };
  }
  const step = Math.sign(state.player.x - medusa.x);
  for (let x = medusa.x + step; x !== state.player.x; x += step) {
    if (blockedForMedusaShot(x, medusa.y)) return null;
  }
  return { dx: step, dy: 0 };
}

function isPlayerAlignedWithMedusa(medusa){
  return medusa.x === state.player.x || medusa.y === state.player.y;
}

function medusaVisionTiles(medusa){
  const tiles = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx,dy] of dirs) {
    let x = medusa.x + dx;
    let y = medusa.y + dy;
    while (inBounds(x,y) && !blockedForMedusaShot(x,y)) {
      tiles.push({x,y});
      x += dx;
      y += dy;
    }
  }
  return tiles;
}

function isPlayerAdjacentToVision(medusa){
  return medusaVisionTiles(medusa).some(v => Math.abs(v.x - state.player.x) + Math.abs(v.y - state.player.y) === 1);
}

function resolveMedusaThreat(now = performance.now(), instantKill = false){
  state.medusaShot = null;
  for (const e of state.enemies) {
    if (e.type !== 'medusa') {
      e.alert = false;
      continue;
    }
    const sight = hasLineOfSightToPlayer(e);
    const warning = isPlayerAdjacentToVision(e);
    const aligned = isPlayerAlignedWithMedusa(e);
    e.alert = Boolean(aligned || warning);
    if (!sight) {
      e.charge = 0;
      continue;
    }
    if (!e.charge) e.charge = now;
    if (instantKill) e.charge = Math.min(e.charge, now - MEDUSA_FREEZE_BEFORE_SHOT_MS);
    const elapsed = now - e.charge;
    state.frozenUntil = Math.max(state.frozenUntil, e.charge + MEDUSA_FREEZE_BEFORE_SHOT_MS + MEDUSA_SHOT_FLASH_MS);
    if (elapsed < MEDUSA_FREEZE_BEFORE_SHOT_MS) continue;

    const shotStartedAt = e.charge + MEDUSA_FREEZE_BEFORE_SHOT_MS;
    const shotAge = now - shotStartedAt;
    state.medusaShot = {
      fromX: e.x,
      fromY: e.y,
      toX: state.player.x,
      toY: state.player.y,
      chargeRatio: 1,
      ts: shotStartedAt,
      life: MEDUSA_SHOT_FLASH_MS,
    };
    if (shotAge >= MEDUSA_SHOT_FLASH_MS * 0.35 || instantKill) {
      killPlayer();
      return;
    }
  }
}

function tick(){
  const now = performance.now();
  if (state.deadUntil && now >= state.deadUntil) return resetLevel({ fromDeath: true });
  if (state.won) return;
  if (state.frozenUntil && now >= state.frozenUntil) state.frozenUntil = 0;

  for (const [pos, hatchAt] of state.eggTimers.entries()) {
    if (now < hatchAt) continue;
    const [x,y] = pos.split(',').map(Number);
    state.eggTimers.delete(pos);
    if (!state.eggs.has(pos)) continue;
    state.eggs.delete(pos);
    if (!enemyAt(x,y)) state.enemies.push({ type:'ardilla', x, y, charge:0, alert:false });
  }

  state.explosions = state.explosions.filter(explosion => now - explosion.startedAt < explosion.life);

  updateDragonThreat(now);
  advanceDragonFireballs(now);
  resolveMedusaThreat(now);
}

function resize(){
  const r = boardWrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = r.width;
  const h = r.height;
  board.t = Math.max(12, Math.floor(Math.min((w - 4) / W, (h - 4) / H)));
  board.x = Math.floor((w - W * board.t) / 2);
  board.y = Math.floor((h - H * board.t) / 2);
}
window.addEventListener('resize', resize);

function drawSprite(name, x, y){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
  } else { 
    ctx.fillStyle = '#000'; 
    ctx.fillRect(px,py,board.t,board.t); 
  }
}

function getWaterSpriteName(now, x, y){
  const frame = (Math.floor(now / 260) + (x % 2) + (y % 3)) % 4;
  return frame === 0 ? 'water' : `water_${frame}`;
}

function draw(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  const now = performance.now();

  // Capa 0: Suelo en todas partes
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      drawSprite('floor', x, y);
    }
  }

  // Capa 1: Elementos base
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      const b = state.base[y][x];
      if (b === '#') drawSprite('wall',x,y);
      else if (b === 'V') {
        const px = board.x + x * board.t;
        const py = board.y + y * board.t;
        ctx.fillStyle = '#000';
        ctx.fillRect(px, py, board.t, board.t);
      }
      else if (b === '~') drawSprite(getWaterSpriteName(now, x, y),x,y);
      else if (b === 'R') {
        drawSprite(getWaterSpriteName(now, x, y),x,y);
        drawSprite('bridge',x,y);
      }
      else if (b === 'T') drawSprite('tree',x,y);
      else if (b === 'S') drawSprite('stone',x,y);
      else if (b === 'C') {
        drawSprite(chestOpen() ? 'chest_open' : 'chest',x,y);
        if (chestOpen()) {
          const px = board.x + x * board.t;
          const py = board.y + y * board.t;
          const pulse = 0.5 + Math.abs(Math.sin(now * 0.01)) * 0.5;
          const glow = ctx.createRadialGradient(
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * 0.1,
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * (0.9 + pulse * 0.55)
          );
          glow.addColorStop(0, `rgba(255, 255, 180, ${0.28 + pulse * 0.22})`);
          glow.addColorStop(0.6, `rgba(255, 212, 92, ${0.24 + pulse * 0.2})`);
          glow.addColorStop(1, 'rgba(255, 212, 92, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px - board.t * 0.75, py - board.t * 0.75, board.t * 2.5, board.t * 2.5);
        }
      }
      else if (b === 'D') {
        drawSprite('door',x,y);
        const px = board.x + x * board.t;
        const py = board.y + y * board.t;
        if (!state.doorOpen) {
          ctx.fillStyle = 'rgba(20, 12, 4, 0.6)';
          ctx.fillRect(px, py, board.t, board.t);
        } else {
          const pulse = 0.45 + Math.abs(Math.sin(now * 0.008 + 1.2)) * 0.55;
          const glow = ctx.createRadialGradient(
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * 0.15,
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * (1.05 + pulse * 0.5)
          );
          glow.addColorStop(0, `rgba(170, 240, 255, ${0.26 + pulse * 0.18})`);
          glow.addColorStop(0.65, `rgba(75, 192, 255, ${0.18 + pulse * 0.22})`);
          glow.addColorStop(1, 'rgba(75, 192, 255, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px - board.t * 0.8, py - board.t * 0.8, board.t * 2.6, board.t * 2.6);
        }
      }
    }
  }

  // Capa 2: Elementos interactivos
  for (const b of arrFromSet(state.blocks)) drawSprite('block',b.x,b.y);
  for (const hrt of arrFromSet(state.hearts)) drawSprite('heart',hrt.x,hrt.y);
  for (const egg of arrFromSet(state.eggs)) drawSprite('egg',egg.x,egg.y);
  for (const e of state.enemies) {
    if (e.type === 'dragon') {
      const dir = e.dir || [0, -1];
      let sprite = 'dragon_n';
      if (dir[0] === 1) sprite = 'dragon_e';
      else if (dir[0] === -1) sprite = 'dragon_o';
      else if (dir[1] === 1) sprite = 'dragon_s';
      drawSprite(sprite, e.x, e.y);
      continue;
    }
    if (e.type === 'medusa' && e.alert) {
      const px = board.x + e.x * board.t;
      const py = board.y + e.y * board.t;
      const t = performance.now() * 0.012;
      const pulse = 0.45 + Math.abs(Math.sin(t)) * 0.55;
      const radius = board.t * (0.5 + pulse * 0.32);
      const glow = ctx.createRadialGradient(
        px + board.t * 0.5,
        py + board.t * 0.5,
        board.t * 0.2,
        px + board.t * 0.5,
        py + board.t * 0.5,
        radius
      );
      glow.addColorStop(0, `rgba(246, 240, 107, ${0.32 + pulse * 0.28})`);
      glow.addColorStop(1, 'rgba(246, 240, 107, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(px - board.t * 0.4, py - board.t * 0.4, board.t * 1.8, board.t * 1.8);
      drawSprite('medusa_alert', e.x, e.y);
    } else drawSprite(e.type, e.x, e.y);
  }

  for (const explosion of state.explosions) {
    const life = Math.max(1, explosion.life);
    const progress = Math.max(0, Math.min(1, (now - explosion.startedAt) / life));
    const alpha = 1 - progress;
    const px = board.x + (explosion.x + 0.5) * board.t;
    const py = board.y + (explosion.y + 0.5) * board.t;
    const radius = board.t * (0.2 + progress * 0.85);

    const blast = ctx.createRadialGradient(px, py, board.t * 0.04, px, py, radius);
    blast.addColorStop(0, `rgba(255, 255, 255, ${0.95 * alpha})`);
    blast.addColorStop(0.4, `rgba(255, 214, 94, ${0.8 * alpha})`);
    blast.addColorStop(0.8, `rgba(255, 92, 64, ${0.5 * alpha})`);
    blast.addColorStop(1, 'rgba(255, 92, 64, 0)');
    ctx.fillStyle = blast;
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const fireball of state.fireballs) {
    const renderPos = getFireballRenderPosition(fireball, now);
    const px = board.x + (renderPos.x + 0.5) * board.t;
    const py = board.y + (renderPos.y + 0.5) * board.t;
    const glow = ctx.createRadialGradient(px, py, board.t * 0.05, px, py, board.t * 0.45);
    glow.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
    glow.addColorStop(0.35, 'rgba(255, 204, 83, 0.95)');
    glow.addColorStop(1, 'rgba(200, 32, 0, 0.2)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(3, board.t * 0.22), 0, Math.PI * 2);
    ctx.fill();
  }

  if (state.medusaShot) {
    const { fromX, fromY, toX, toY, chargeRatio = 1, ts = performance.now(), life = MEDUSA_SHOT_FLASH_MS } = state.medusaShot;
    const fromPx = board.x + (fromX + 0.5) * board.t;
    const fromPy = board.y + (fromY + 0.5) * board.t;
    const toPx = board.x + (toX + 0.5) * board.t;
    const toPy = board.y + (toY + 0.5) * board.t;

    const progress = Math.max(0, Math.min(1, (now - ts) / Math.max(1, life)));
    const head = Math.min(1, 0.92 + progress * 0.2);
    const sx = fromPx;
    const sy = fromPy;
    const ex = fromPx + (toPx - fromPx) * head;
    const ey = fromPy + (toPy - fromPy) * head;

    const grad = ctx.createLinearGradient(sx, sy, ex, ey);
    grad.addColorStop(0, 'rgba(153, 230, 255, 0.25)');
    grad.addColorStop(0.45, 'rgba(246, 240, 107, 0.92)');
    grad.addColorStop(1, 'rgba(255, 255, 255, 1)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(2, board.t * (0.24 + chargeRatio * 0.08));
    ctx.lineCap = 'round';
    ctx.shadowBlur = board.t * (0.7 + (1 - progress) * 0.8);
    ctx.shadowColor = 'rgba(246, 240, 107, 0.9)';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath();
    ctx.arc(ex, ey, Math.max(1.5, board.t * 0.11), 0, Math.PI * 2);
    ctx.fill();
  }

  if (dragPath.length > 1) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = Math.max(2, board.t * 0.2);
    ctx.lineCap = 'square';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < dragPath.length; i++) {
      const p = dragPath[i];
      const cx = board.x + (p.x + 0.5) * board.t;
      const cy = board.y + (p.y + 0.5) * board.t;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  const playerDraw = getPlayerDrawPosition();
  drawSprite('player', playerDraw.x, playerDraw.y);
  if (state.frozenUntil) {
    const px = board.x + playerDraw.x * board.t;
    const py = board.y + playerDraw.y * board.t;
    ctx.fillStyle = 'rgba(120, 210, 255, 0.4)';
    ctx.fillRect(px, py, board.t, board.t);
  }

  if (state.deadUntil) {
    const blink = 0.25 + Math.abs(Math.sin(performance.now() * 0.04)) * 0.35;
    ctx.fillStyle = `rgba(255, 44, 44, ${blink})`;
    ctx.fillRect(board.x, board.y, board.t * W, board.t * H);
  }

  if (state.resetFlashUntil) {
    const now = performance.now();
    const remain = state.resetFlashUntil - now;
    if (remain <= 0) state.resetFlashUntil = 0;
    else {
      const p = remain / DEATH_RESET_FLASH_MS;
      ctx.fillStyle = `rgba(200, 245, 255, ${0.5 * p})`;
      ctx.fillRect(board.x, board.y, board.t * W, board.t * H);
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.95 * p})`;
      ctx.lineWidth = Math.max(2, board.t * 0.16);
      ctx.strokeRect(board.x, board.y, board.t * W, board.t * H);
    }
  }

  hudShots.textContent = `✦ ${state.shots}`;
  hudLevel.textContent = `Nivel ${currentLevelIndex + 1} ▾`;
  if (!state.won && state.hearts.size === 0 && !state.doorOpen) {
    setHudMessage('¡Pasa por el cofre abierto para abrir la puerta!');
  }
}


function spriteNameForTile(tile){
  if (tile === '#') return 'wall';
  if (tile === 'V') return 'void';
  if (tile === 'T') return 'tree';
  if (tile === 'S') return 'stone';
  if (tile === '~') return 'water';
  if (tile === 'R') return 'bridge';
  if (tile === 'B') return 'block';
  if (tile === 'H') return 'heart';
  if (tile === 'C') return 'chest';
  if (tile === 'D') return 'door';
  if (tile === 'A') return 'ardilla';
  if (tile === 'M') return 'medusa';
  if (tile === 'N') return 'dragon_n';
  if (tile === 'U') return 'dragon_s';
  if (tile === 'E') return 'dragon_e';
  if (tile === 'O') return 'dragon_o';
  if (tile === 'P') return 'player';
  return 'floor';
}

function applyEditorCellVisual(cell, tile, x, y){
  const meta = TILE_META[tile] ?? TILE_META['.'];
  const floorSprite = sprites.floor;
  const sprite = sprites[spriteNameForTile(tile)] ?? floorSprite;
  cell.textContent = '';
  cell.title = `${meta.label} (${tile}) - [${x},${y}]`;
  const floorLayer = floorSprite?.src ? `url("${floorSprite.src}")` : '';
  const spriteLayer = sprite?.src ? `url("${sprite.src}")` : '';
  if (tile === 'V') {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = 'none';
  } else if (tile === '.' || !spriteLayer) {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = floorLayer || 'none';
  } else {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = `${spriteLayer}, ${floorLayer}`;
  }
}

function moveEditorTile(fromX, fromY, toX, toY){
  if (fromX === toX && fromY === toY) return;
  const tile = editorRows[fromY]?.[fromX];
  if (!tile || tile === '.') return;
  editorRows[fromY][fromX] = '.';
  editorRows[toY][toX] = tile;
  const fromCell = editorGrid.querySelector(`.editor-cell[data-x="${fromX}"][data-y="${fromY}"]`);
  const toCell = editorGrid.querySelector(`.editor-cell[data-x="${toX}"][data-y="${toY}"]`);
  if (fromCell) applyEditorCellVisual(fromCell, '.', fromX, fromY);
  if (toCell) applyEditorCellVisual(toCell, tile, toX, toY);
  editorText.value = editorToRaw(editorRows);
}

function setEditorDropTarget(x, y){
  if (editorDropTarget && editorDropTarget.x === x && editorDropTarget.y === y) return;
  if (editorDropTarget) {
    const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorDropTarget.x}"][data-y="${editorDropTarget.y}"]`);
    prev?.classList.remove('drop-target');
  }
  editorDropTarget = { x, y };
  const next = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  next?.classList.add('drop-target');
}

function clearEditorDropTarget(){
  if (!editorDropTarget) return;
  const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorDropTarget.x}"][data-y="${editorDropTarget.y}"]`);
  prev?.classList.remove('drop-target');
  editorDropTarget = null;
}

function getEditorTileFromPointerEvent(e, clamp=false){
  const rect = editorGrid.getBoundingClientRect();
  if (!rect.width || !rect.height) return null;
  const relX = (e.clientX - rect.left) / rect.width;
  const relY = (e.clientY - rect.top) / rect.height;
  if (!clamp && (relX < 0 || relX > 1 || relY < 0 || relY > 1)) return null;
  const x = clamp
    ? Math.max(0, Math.min(W - 1, Math.floor(relX * W)))
    : Math.floor(relX * W);
  const y = clamp
    ? Math.max(0, Math.min(H - 1, Math.floor(relY * H)))
    : Math.floor(relY * H);
  return { x, y };
}

function frame(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  acc += dt;
  moveAcc += dt;
  while (queuedMoves.length) {
    const intervalMs = queuedMoves[0].intervalMs ?? MOVE_INTERVAL;
    if (moveAcc < intervalMs) break;
    const processed = processQueuedMove();
    if (!processed) break;
    moveAcc -= intervalMs;
  }
  while (acc >= TICK) {
    tick();
    acc -= TICK;
  }
  draw();
  requestAnimationFrame(frame);
}

function setEditorStatus(message, isError=false) {
  editorStatus.textContent = message;
  editorStatus.style.borderColor = isError ? '#d33' : '#666';
  editorStatus.style.color = isError ? '#ff9f9f' : '#fff';
}

function editorToRaw(rows){
  return rows.map(r => r.join('')).join('\n');
}

function validateEditorRows(rows){
  const players = rows.flat().filter(ch => ch === 'P').length;
  const chests = rows.flat().filter(ch => ch === 'C').length;
  if (players !== 1) throw new Error('Debe existir exactamente 1 jugador (P).');
  if (chests > 1) throw new Error('Solo puede haber 1 cofre (C).');
}

function paintEditorCell(x, y){
  if (!editorRows[y] || !editorRows[y][x]) return;
  if (editorRows[y][x] === editorTile) return;
  editorRows[y][x] = editorTile;
  const cell = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  if (cell) applyEditorCellVisual(cell, editorTile, x, y);
  editorText.value = editorToRaw(editorRows);
}

function paintEditorFromPointerEvent(e){
  const tilePos = getEditorTileFromPointerEvent(e);
  if (!tilePos) return;
  const { x, y } = tilePos;
  if (editorDrag && editorMouseDown && (x !== editorDrag.fromX || y !== editorDrag.fromY) && editorDrag.tile !== '.') {
    editorDrag.moved = true;
  }
  if (editorDrag?.isMove) return;
  paintEditorCell(x, y);
}

function renderEditorGrid(){
  editorGrid.innerHTML = '';
  editorGrid.style.gridTemplateColumns = `repeat(${W}, var(--editor-cell-size))`;
  editorGrid.style.width = 'max-content';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const tile = editorRows[y][x];
      const cell = document.createElement('button');
      cell.className = 'editor-cell';
      cell.type = 'button';
      cell.dataset.x = String(x);
      cell.dataset.y = String(y);
      applyEditorCellVisual(cell, tile, x, y);
      cell.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        editorMouseDown = true;
        editorActivePointerId = e.pointerId;
        const sourceTile = editorRows[y][x];
        const canMoveTile = sourceTile !== '.' && sourceTile === editorTile;
        editorDrag = { fromX: x, fromY: y, moved: false, tile: sourceTile, isMove: canMoveTile };
        editorGrid.setPointerCapture(e.pointerId);
        if (editorDrag.isMove) setEditorDropTarget(x, y);
        if (!editorDrag.isMove) paintEditorCell(x, y);
      });
      editorGrid.appendChild(cell);
    }
  }
  clearEditorDropTarget();
  editorText.value = editorToRaw(editorRows);
}

editorGrid.addEventListener('pointermove', (e) => {
  if (!editorMouseDown) return;
  if (e.pointerId !== editorActivePointerId) return;
  if ((e.buttons & 1) !== 1) return;
  if (editorDrag?.isMove) {
    const target = getEditorTileFromPointerEvent(e);
    if (target) setEditorDropTarget(target.x, target.y);
    else clearEditorDropTarget();
  }
  paintEditorFromPointerEvent(e);
});

function renderPalette(){
  paletteGrid.innerHTML = '';
  for (const tile of PALETTE_ORDER) {
    const meta = TILE_META[tile];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `palette-tile ${tile === editorTile ? 'active' : ''}`;
    btn.textContent = `${tile} ${meta.label}`;
    btn.style.background = meta.color;
    btn.style.color = meta.text;
    btn.onclick = () => {
      editorTile = tile;
      renderPalette();
      setEditorStatus(`Pieza activa: ${meta.label} (${tile}).`);
    };
    paletteGrid.appendChild(btn);
  }
}

function loadEditorFromRaw(raw){
  const rows = parseLevelRows(raw).map(r => r.split(''));
  if (rows.length !== H || rows[0].length !== W) {
    throw new Error(`La pantalla debe mantener tamaño ${W}x${H}.`);
  }
  validateEditorRows(rows);
  editorRows = rows;
  renderEditorGrid();
}

function openEditor(){
  clearKeyboardInput();
  isEditorOpen = true;
  editorView.classList.add('visible');
  editorView.setAttribute('aria-hidden', 'false');
  loadEditorFromRaw(currentLevelRaw);
  renderPalette();
  setEditorStatus('Editor abierto. Arrastra el dedo para pintar rápido.');
}

function closeEditor(){
  clearKeyboardInput();
  isEditorOpen = false;
  editorView.classList.remove('visible');
  editorView.setAttribute('aria-hidden', 'true');
  editorMouseDown = false;
  editorActivePointerId = null;
  editorDrag = null;
  clearEditorDropTarget();
}

function startLevel(){
  LEVEL = parseLevelRows(currentLevelRaw);
  const p = parseLevel();
  state.base = p.base;
  state.player = p.player;
  state.chest = p.chest;
  state.door = p.door;
  state.hearts = p.hearts;
  state.blocks = p.blocks;
  state.eggs = new Set();
  state.eggTimers = new Map();
  state.filledWater = p.filledWater;
  state.enemies = p.enemies;
  state.won = false;
  state.doorOpen = false;
  state.shots = 0;
  state.deadUntil = 0;
  state.frozenUntil = 0;
  state.medusaShot = null;
  state.fireballs = [];
  state.resetFlashUntil = 0;
  state.keyCollected = false;
  state.explosions = [];
  state.undo = [];
  queuedMoves = [];
  clearPlayerAnimation();
  dragPath = [];
  activePointerId = null;
  setHudMessage('');
  state.initialSnapshot = snapshot();
}

function resetLevel({ fromDeath = false } = {}){
  restore(state.initialSnapshot);
  state.undo = [];
  queuedMoves = [];
  clearPlayerAnimation();
  dragPath = [];
  activePointerId = null;
  state.explosions = [];
  if (fromDeath) state.resetFlashUntil = performance.now() + DEATH_RESET_FLASH_MS;
  setHudMessage('');
}

document.getElementById('undoBtn').onclick = () => {
  if (!state.undo.length || state.won) return;
  restore(state.undo.pop());
};
document.getElementById('resetBtn').onclick = () => resetLevel();
document.getElementById('editBtn').onclick = () => openEditor();

function releaseEditorPointer(e){
  if (e && editorActivePointerId !== null && e.pointerId !== editorActivePointerId) return;
  if (editorDrag && editorDrag.isMove && editorDrag.moved && e) {
    const target = getEditorTileFromPointerEvent(e, true);
    if (target) moveEditorTile(editorDrag.fromX, editorDrag.fromY, target.x, target.y);
  }
  editorMouseDown = false;
  editorActivePointerId = null;
  editorDrag = null;
  clearEditorDropTarget();
}

document.addEventListener('pointerup', releaseEditorPointer);
document.addEventListener('pointercancel', releaseEditorPointer);

document.getElementById('editorBackBtn').onclick = () => closeEditor();
document.getElementById('editorSaveBtn').onclick = () => {
  try {
    validateEditorRows(editorRows);
    currentLevelRaw = editorToRaw(editorRows);
    startLevel();
    resize();
    closeEditor();
  } catch (err) {
    setEditorStatus(`No se pudo guardar: ${err.message}`, true);
  }
};

document.getElementById('editorExportBtn').onclick = async () => {
  const raw = editorToRaw(editorRows);
  editorText.value = raw;
  try {
    await navigator.clipboard.writeText(raw);
    setEditorStatus('Pantalla exportada y copiada al portapapeles.');
  } catch {
    setEditorStatus('Pantalla exportada. Copia el texto manualmente desde la caja.');
  }
};

document.getElementById('editorImportBtn').onclick = () => {
  try {
    loadEditorFromRaw(editorText.value);
    setEditorStatus('Pantalla importada correctamente. Revisa y guarda para aplicarla.');
  } catch (err) {
    setEditorStatus(`Importación inválida: ${err.message}`, true);
  }
};

document.getElementById('editorClearBtn').onclick = () => {
  editorRows = editorRows.map(row => row.map(() => '.'));
  renderEditorGrid();
  setEditorStatus('Pantalla vaciada. Coloca al menos 1 jugador (P) antes de guardar.');
};


function renderLevelDropdown(){
  levelDropdown.innerHTML = '';
  LEVELS_RAW.forEach((_, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'level-option';
    btn.textContent = `Nivel ${idx + 1}`;
    btn.onclick = () => {
      currentLevelIndex = idx;
      currentLevelRaw = LEVELS_RAW[currentLevelIndex];
      startLevel();
      resize();
      levelDropdown.classList.remove('visible');
      levelDropdown.setAttribute('aria-hidden', 'true');
    };
    levelDropdown.appendChild(btn);
  });
}

hudLevel.addEventListener('click', (e) => {
  e.stopPropagation();
  const willShow = !levelDropdown.classList.contains('visible');
  levelDropdown.classList.toggle('visible', willShow);
  levelDropdown.setAttribute('aria-hidden', willShow ? 'false' : 'true');
});

document.addEventListener('pointerdown', (e) => {
  if (e.target === hudLevel || levelDropdown.contains(e.target)) return;
  levelDropdown.classList.remove('visible');
  levelDropdown.setAttribute('aria-hidden', 'true');
});

startLevel();
renderLevelDropdown();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
