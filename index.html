<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Lolo Touch - Retro Edition</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #boardWrap {
      position: absolute;
      inset: 72px 12px 156px;
      overflow: hidden;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }
    #gameCanvas { 
      width: 100%; 
      height: 100%; 
      display: block; 
      touch-action: none; 
      image-rendering: pixelated; 
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      flex-wrap: wrap;
    }
    .pill {
      background: #000;
      border: 2px solid #666;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px #000;
    }
    .pill.interactive {
      pointer-events: auto;
      cursor: pointer;
    }
    #levelDropdown {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 42px);
      left: 8px;
      z-index: 4;
      min-width: 130px;
      border: 2px solid #666;
      background: #000;
      display: none;
      flex-direction: column;
      box-shadow: 2px 2px 0 #000;
    }
    #levelDropdown.visible { display: flex; }
    .level-option {
      border: 0;
      border-bottom: 1px solid #333;
      background: transparent;
      text-align: left;
      padding: 8px;
      min-height: 34px;
      font-size: 13px;
      box-shadow: none;
    }
    .level-option:last-child { border-bottom: 0; }
    #bottomPanel {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      justify-items: center;
      align-items: center;
    }
    #controls {
      position: absolute;
      left: 8px;
      right: 8px;
      top: calc(env(safe-area-inset-top) + 8px);
      z-index: 4;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    #directionalControls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: min(360px, 100%);
    }
    .dir-btn {
      border: 2px solid #7dc6ff;
      min-height: 42px;
      color: #d8eeff;
      font-size: clamp(16px, 4.3vw, 24px);
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      box-shadow: 2px 2px 0 #000;
      background: #0d3350;
      transition: background 120ms ease, border-color 120ms ease;
      text-decoration: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .dir-btn:focus,
    .dir-btn:focus-visible {
      outline: none;
      text-decoration: none;
    }
    .dir-btn:active {
      background: #21689b;
      border-color: #bde7ff;
    }
    #moveUpBtn,
    #moveDownBtn {
      grid-column: 2;
    }
    #moveLeftBtn {
      grid-column: 1;
    }
    #moveRightBtn {
      grid-column: 3;
    }
    #moveDownBtn {
      grid-column: 2;
    }
    button {
      border: 2px solid #fff;
      min-height: 46px;
      font-size: 16px;
      color: #fff;
      background: #000;
      font-weight: bold;
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 2px 2px 0px #000;
      cursor: pointer;
    }
    #controls button {
      min-height: 38px;
      font-size: 13px;
      padding: 4px;
    }
    #controls {
      width: min(420px, 100%);
      justify-self: center;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
      background: #333;
    }

    #editorView {
      --editor-cell-size: clamp(18px, 6vw, 30px);
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #050505;
      color: #fff;
      display: none;
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px);
      overflow: auto;
    }
    #editorView.visible {
      display: block;
    }
    .editor-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 0;
    }
    .editor-primary-actions {
      margin-bottom: 12px;
    }
    .editor-primary-actions .editor-save {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    .editor-actions button {
      min-height: 42px;
      font-size: 13px;
    }
    .editor-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .editor-board-section h3 {
      margin: 0 0 8px;
    }
    .editor-card {
      border: 2px solid #666;
      padding: 8px;
      background: #111;
    }
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, var(--editor-cell-size));
      justify-content: center;
      gap: 6px;
    }
    .palette-tile.active {
      outline: 2px solid #00d4ff;
      outline-offset: 0;
      color: #00d4ff;
    }
    .palette-tile {
      width: var(--editor-cell-size);
      height: var(--editor-cell-size);
      min-height: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
      font-size: 0;
      border: 0;
      box-shadow: none;
    }
    #editorGrid {
      display: grid;
      grid-template-columns: repeat(13, var(--editor-cell-size));
      width: fit-content;
      margin: 0 auto;
      gap: 0;
      background: #000;
      border: 2px solid #666;
      touch-action: none;
    }
    .editor-cell {
      border: 0;
      min-height: var(--editor-cell-size);
      height: var(--editor-cell-size);
      width: var(--editor-cell-size);
      box-shadow: none;
      padding: 0;
      background-color: #000;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
    }
    .editor-cell:active {
      transform: none;
      box-shadow: none;
    }
    .editor-cell.drop-target {
      outline: 2px solid #00d4ff;
      outline-offset: -2px;
      box-shadow: inset 0 0 0 2px rgba(0, 212, 255, 0.35);
    }
    .editor-cell.hover-target {
      outline: 2px dashed #ffe066;
      outline-offset: -2px;
      box-shadow: inset 0 0 0 2px rgba(255, 224, 102, 0.2);
    }
    #editorText {
      width: 100%;
      min-height: 150px;
      background: #000;
      color: #fff;
      border: 2px solid #666;
      font-family: inherit;
      padding: 8px;
      resize: vertical;
      user-select: text;
      -webkit-user-select: text;
    }
  </style>
</head>

    </div>

    <div id="editorView" aria-hidden="true">
      <div class="editor-actions editor-primary-actions">
        <button id="editorBackBtn">Volver al juego</button>
        <button id="editorSaveBtn" class="editor-save">Guardar pantalla</button>
      </div>
      <div class="editor-layout">
        <section class="editor-board-section">
          <div id="editorGrid"></div>
        </section>
        <div id="paletteGrid" class="palette-grid"></div>
        <div class="editor-actions">
          <button id="editorImportBtn">Cargar pantalla</button>
          <button id="editorClearBtn">Borrar todo</button>
        </div>
        <section class="editor-card">
          <h3>Cadena de texto de la pantalla</h3>
          <p>Pega aquí un nivel (13x13) y pulsa "Cargar pantalla" para importarlo.</p>

        </section>
      </div>
    </div>
  </div>

const LEVEL_SIZE = 13;
const ALLOWED = new Set(['#','=','V','.','P','H','C','B','~','R','A','M','K','G','L','T','S','D','N','U','E','O']);
function parseLevelRows(raw) {
  const rows = raw.trim().split('\n').map(r => r.trim());
  const h = rows.length;
  const w = rows[0]?.length ?? 0;
  if (!h || !w) throw new Error('Nivel inválido: vacío.');
  if (h !== LEVEL_SIZE || w !== LEVEL_SIZE) {
    throw new Error(`Nivel inválido: debe ser de ${LEVEL_SIZE}x${LEVEL_SIZE}.`);
  }
  for (const row of rows) {
    if (row.length !== w) throw new Error('Nivel inválido: ancho inconsistente.');
    for (const ch of row) if (!ALLOWED.has(ch)) throw new Error('Tile inválido: ' + ch);
  }
  return rows;
}

function createDragonSpriteImage(src) {
  const img = new Image();
  img.src = src;
  return img;
}

function applyDragonReferenceSprites() {
  for (const [name, src] of Object.entries(DRAGON_SPRITE_SOURCES)) {
    sprites[name] = createDragonSpriteImage(src);
  }
  sprites.dragon_n = sprites.dragon_n_closed;
  sprites.dragon_s = sprites.dragon_s_closed;
  sprites.dragon_e = sprites.dragon_e_closed;
  sprites.dragon_o = sprites.dragon_o_closed;

      Math.abs(data[i] - bg.r) <= 1 &&
      Math.abs(data[i + 1] - bg.g) <= 1 &&
      Math.abs(data[i + 2] - bg.b) <= 1
    ) {
      data[i + 3] = 0;
    }
  }
  targetCtx.putImageData(imageData, 0, 0);
  return targetCanvas;
}

function makeTransparentFromPalette(source, targetCanvas, palette, tolerance = 2) {
  if (!source.naturalWidth || !source.naturalHeight) return null;
  targetCanvas.width = source.naturalWidth;
  targetCanvas.height = source.naturalHeight;
  const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
  targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
  targetCtx.drawImage(source, 0, 0);

  const imageData = targetCtx.getImageData(0, 0, targetCanvas.width, targetCanvas.height);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    for (const color of palette) {
      if (
        Math.abs(data[i] - color[0]) <= tolerance &&
        Math.abs(data[i + 1] - color[1]) <= tolerance &&
        Math.abs(data[i + 2] - color[2]) <= tolerance
      ) {
        data[i + 3] = 0;
        break;
      }
    }
  }
  targetCtx.putImageData(imageData, 0, 0);
  return targetCanvas;
}

function applyArdillaPreviewSprite() {
  if (!ARDILLA_PREVIEW.complete || !ARDILLA_PREVIEW.naturalWidth) return;
  sprites.ardilla = makeColorKeyTransparent(ARDILLA_PREVIEW, ARDILLA_PREVIEW_CANVAS) || ARDILLA_PREVIEW;
  refreshEditorVisualsIfVisible();
}

function rebuildArdillaSheetTransparency() {
  if (!ARDILLA_SHEET.naturalWidth || !ARDILLA_SHEET.naturalHeight) return;
  makeColorKeyTransparent(ARDILLA_SHEET, ARDILLA_SHEET_CANVAS);
  ARDILLA_SHEET_READY = true;
  refreshEditorVisualsIfVisible();
}

const LEEPER_SHEET = new Image();
const LEEPER_SHEET_CANVAS = document.createElement('canvas');
const LEEPER_PREVIEW_CANVAS = document.createElement('canvas');
const LEEPER_SLEEP_PREVIEW_CANVAS = document.createElement('canvas');
let LEEPER_SHEET_READY = false;

const LEEPER_SPRITE = {
  originX: 1,
  originY: 133,
  frameW: 32,
  frameH: 32,
  stepX: 33,
  walkFrameMs: 120,
  sleepFrameMs: 300,
  directions: {
    down: { idle: 0, walk: [0, 1, 0, 1] },
    right: { idle: 2, walk: [2, 3, 2, 3], flip: true },
    left: { idle: 2, walk: [2, 3, 2, 3] },
    up: { idle: 4, walk: [4, 5, 4, 5] },
  },
  sleep: { idle: 6, cycle: [6, 7, 6, 7] },
};

function getLeeperFrameRect(index) {
  return {
    sx: LEEPER_SPRITE.originX + index * LEEPER_SPRITE.stepX,
    sy: LEEPER_SPRITE.originY,
    sw: LEEPER_SPRITE.frameW,
    sh: LEEPER_SPRITE.frameH,
  };
}

function makeLeeperPreviewImage(frameIndex, flip = false, targetCanvas = null) {
  if (!LEEPER_SHEET_READY) return null;
  const frame = getLeeperFrameRect(frameIndex);
  const canvas = targetCanvas ?? document.createElement('canvas');
  canvas.width = LEEPER_SPRITE.frameW;
  canvas.height = LEEPER_SPRITE.frameH;
  const previewCtx = canvas.getContext('2d');
  if (!previewCtx) return null;
  previewCtx.clearRect(0, 0, canvas.width, canvas.height);
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.save();
  if (flip) {
    previewCtx.translate(canvas.width, 0);
    previewCtx.scale(-1, 1);
    previewCtx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, canvas.width, canvas.height);
  } else {
    previewCtx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, canvas.width, canvas.height);
  }
  previewCtx.restore();
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  return img;

function getLeeperFacingDirection(leeper) {
  const [dx, dy] = leeper.facing || leeper.dir || [0, 1];
  if (Math.abs(dx) > Math.abs(dy)) return dx < 0 ? 'left' : 'right';
  if (dy < 0) return 'up';
  if (dy > 0) return 'down';
  return 'down';
}

function setLeeperAnimation(leeper, fromX, fromY, toX, toY, duration = SKULL_STEP_MS) {
  const dx = Math.sign(toX - fromX);
  const dy = Math.sign(toY - fromY);
  if (dx || dy) leeper.facing = [dx, dy];
  leeper.anim = {
    fromX,
    fromY,
    toX,
    toY,
    startedAt: performance.now(),
    duration,
  };
}

function getLeeperDrawPosition(leeper, now = performance.now()) {
  if (!leeper.anim) return { x: leeper.x, y: leeper.y };
  const elapsed = now - leeper.anim.startedAt;
  const t = Math.max(0, Math.min(1, elapsed / Math.max(1, leeper.anim.duration)));
  if (t >= 1) {
    leeper.anim = null;
    return { x: leeper.x, y: leeper.y };
  }
  return {
    x: leeper.anim.fromX + (leeper.anim.toX - leeper.anim.fromX) * t,
    y: leeper.anim.fromY + (leeper.anim.toY - leeper.anim.fromY) * t,
  };
}

function getLeeperWalkFrameIndex(leeper, now = performance.now()) {
  const directionName = getLeeperFacingDirection(leeper);
  const direction = LEEPER_SPRITE.directions[directionName] ?? LEEPER_SPRITE.directions.down;
  if (!leeper.anim) return direction.idle;
  const elapsed = now - leeper.anim.startedAt;
  const duration = Math.max(1, leeper.anim.duration);
  if (elapsed <= 0) return direction.walk?.[0] ?? direction.idle;
  if (elapsed >= duration) return direction.idle;
  const cycle = direction.walk?.length ? direction.walk : [direction.idle];
  const progress = elapsed / duration;
  const cycleIndex = Math.min(cycle.length - 1, Math.floor(progress * cycle.length));
  return cycle[cycleIndex];
}

function getLeeperSleepFrameIndex(now = performance.now()) {
  const cycle = LEEPER_SPRITE.sleep.cycle;
  const step = Math.floor(now / LEEPER_SPRITE.sleepFrameMs) % cycle.length;
  return cycle[step];
}

function drawLeeperSprite(leeper, now = performance.now()) {
  if (!LEEPER_SHEET_READY) {
    if (!LEEPER_SHEET.complete || !LEEPER_SHEET.naturalWidth) {
      drawSprite(leeper.asleep ? 'leeper_sleep' : 'leeper', leeper.x, leeper.y);
      return;
    }
    rebuildLeeperSheetTransparency();
    if (!LEEPER_SHEET_READY) {
      drawSprite(leeper.asleep ? 'leeper_sleep' : 'leeper', leeper.x, leeper.y);
      return;
    }
  }

  const isSleeping = leeper.asleep && !leeper.anim;
  const frameIndex = isSleeping
    ? getLeeperSleepFrameIndex(now)
    : getLeeperWalkFrameIndex(leeper, now);
  const directionName = getLeeperFacingDirection(leeper);
  const direction = LEEPER_SPRITE.directions[directionName] ?? LEEPER_SPRITE.directions.down;
  const frame = getLeeperFrameRect(frameIndex);
  const pos = getLeeperDrawPosition(leeper, now);
  const px = board.x + pos.x * board.t;
  const py = board.y + pos.y * board.t;

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (!isSleeping && direction.flip) {
    ctx.translate(px + board.t, py);
    ctx.scale(-1, 1);
    ctx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, board.t, board.t);
  } else {
    ctx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, px, py, board.t, board.t);
  }
  ctx.restore();
}

function key(x,y){ return `${x},${y}`; }
function has(set,x,y){ return set.has(key(x,y)); }
function setFromArr(arr){ return new Set(arr.map(p => key(p.x,p.y))); }
function arrFromSet(set){ return [...set].map(s=>{ const [x,y] = s.split(',').map(Number); return {x,y}; }); }
function inBounds(x,y){ return x>=0 && y>=0 && x<W && y<H; }
function isWallTile(tile){ return tile === '#' || tile === '='; }
function baseWallAt(x,y){
  return inBounds(x,y) && isWallTile(state.base[y][x]);
}
function getWallSpriteName(x,y){
  const tile = state.base[y][x];
  if (!isWallTile(tile)) return 'wall_left';

  const forceTop = tile === '=';
  const up = !forceTop && baseWallAt(x, y - 1);
  const down = baseWallAt(x, y + 1);
  const left = baseWallAt(x - 1, y);
  const right = baseWallAt(x + 1, y);

  const exposedUp = !up;
  const exposedDown = !down;
  const exposedLeft = !left;
  const exposedRight = !right;

  if (exposedUp && exposedLeft) return 'wall_top_left';
  if (exposedUp && exposedRight) return 'wall_top_right';
  if (exposedDown && exposedLeft) return 'wall_bottom_left';
  if (exposedDown && exposedRight) return 'wall_bottom_right';
  if (exposedUp) return 'wall_top';
  if (exposedDown) return 'wall_bottom';
  if (exposedLeft) return 'wall_left';
  if (exposedRight) return 'wall_right';
  return forceTop ? 'wall_top' : 'wall_left';
}
function chestOpen(){ return state.hearts.size === 0; }
function enemyAt(x,y){ return state.enemies.find(e => e.x===x && e.y===y); }
function fireballAt(x,y){ return state.fireballs.find(f => Math.round(f.x)===x && Math.round(f.y)===y); }

function getPlayerDrawPosition(now = performance.now()){
  if (!playerAnim) return { x: state.player.x + keyboardOffset.x, y: state.player.y + keyboardOffset.y };
  const elapsed = now - playerAnim.startedAt;
  const t = Math.max(0, Math.min(1, elapsed / Math.max(1, playerAnim.duration)));
  if (t >= 1) {
    playerAnim = null;
    return { x: state.player.x + keyboardOffset.x, y: state.player.y + keyboardOffset.y };
  }
  const easedT = t;
  return {
    x: playerAnim.fromX + (playerAnim.toX - playerAnim.fromX) * easedT,
    y: playerAnim.fromY + (playerAnim.toY - playerAnim.fromY) * easedT,
  };
}

function isFireballTouchingPlayer(fireball, now = performance.now()){
  const fireTileX = Math.round(fireball.x);
  const fireTileY = Math.round(fireball.y);
  if (fireTileX === state.player.x && fireTileY === state.player.y) return true;

  const playerPos = getPlayerDrawPosition(now);
  const dx = fireTileX - playerPos.x;
  const dy = fireTileY - playerPos.y;
  return (dx * dx + dy * dy) <= 0.35;
}

function parseLevel(){
  const base = Array.from({ length:H }, () => Array(W).fill('.'));
  const hearts = [];
  const blocks = [];
  const enemies = [];
  let player = null;
  let chest = null;
  let door = null;

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const ch = LEVEL[y][x];
    if ('#=V.~TCDSR'.includes(ch)) base[y][x] = ch;
    if (ch === 'P') player = { x, y, facing:[1,0] };
    if (ch === 'H') hearts.push({ x, y });
    if (ch === 'A') enemies.push({ type:'ardilla', x, y, charge:0, alert:false });
    if (ch === 'M') enemies.push({ type:'medusa', x, y, charge:0, alert:false });
    if (ch === 'K') enemies.push({ type:'rocky', x, y, dir:[1,0], facing:[1,0], mode:'patrol', anim:null });
    if (ch === 'G') enemies.push({ type:'skull', x, y, dir:[1,0], pendingTurns:[], prefHorizontal:1, prefVertical:1 });
    if (ch === 'L') enemies.push({ type:'leeper', x, y, dir:[1,0], facing:[0,1], pendingTurns:[], prefHorizontal:1, prefVertical:1, asleep:false, anim:null });
    if (ch === 'N') enemies.push({ type:'dragon', x, y, dir:[0,-1], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'U') enemies.push({ type:'dragon', x, y, dir:[0,1], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'E') enemies.push({ type:'dragon', x, y, dir:[1,0], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'O') enemies.push({ type:'dragon', x, y, dir:[-1,0], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'B') blocks.push({ x, y });
    if (ch === 'C') chest = { x, y };
    if (ch === 'D') door = { x, y };
  }
  return { base, player, chest, door, hearts:setFromArr(hearts), blocks:setFromArr(blocks), filledWater:new Set(), enemies };
}

function snapshot(){
  return {
    player: { ...state.player },
    hearts: arrFromSet(state.hearts),
    shots: state.shots,
    blocks: arrFromSet(state.blocks),
    eggs: arrFromSet(state.eggs),
    eggTimers: [...state.eggTimers.entries()].map(([pos, hatchAt]) => { const [x,y] = pos.split(',').map(Number); return { x, y, hatchAt }; }),
    filledWater: arrFromSet(state.filledWater),
    enemies: state.enemies.map(e => ({ ...e })),
    doorOpen: state.doorOpen,
    frozenUntil: state.frozenUntil,
    medusaShot: state.medusaShot ? { ...state.medusaShot } : null,
    fireballs: state.fireballs.map(f => ({ ...f })),
    keyCollected: Boolean(state.keyCollected),
    explosions: state.explosions.map(explosion => ({ ...explosion })),
  };
}

function restore(s){
  state.player = { ...s.player };
  state.hearts = setFromArr(s.hearts);
  state.shots = s.shots ?? 0;
  state.blocks = setFromArr(s.blocks);
  state.eggs = setFromArr(s.eggs);
  state.eggTimers = new Map((s.eggTimers ?? []).map(t => [key(t.x, t.y), t.hatchAt]));
  state.filledWater = setFromArr(s.filledWater);
  state.enemies = s.enemies.map(e => ({ ...e }));
  state.doorOpen = Boolean(s.doorOpen);
  state.won = false;
  state.deadUntil = 0;
  state.frozenUntil = 0;
  state.medusaShot = null;
  state.fireballs = (s.fireballs ?? []).map(f => ({ ...f }));
  state.resetFlashUntil = 0;
  state.keyCollected = Boolean(s.keyCollected);
  state.explosions = (s.explosions ?? []).map(explosion => ({ ...explosion }));
  keyboardOffset = { x: 0, y: 0 };
  clearPlayerAnimation();
}

function triggerEnemyExplosion(){
  const now = performance.now();
  const exploded = [];
  for (const enemy of state.enemies) exploded.push({ x: enemy.x, y: enemy.y, startedAt: now, life: EXPLOSION_FLASH_MS });
  for (const egg of arrFromSet(state.eggs)) exploded.push({ x: egg.x, y: egg.y, startedAt: now, life: EXPLOSION_FLASH_MS });
  if (!exploded.length) return;
  state.explosions.push(...exploded);
  state.enemies = [];
  state.eggs = new Set();
  state.eggTimers = new Map();
  state.medusaShot = null;
  state.fireballs = [];
  state.frozenUntil = 0;
  setHudMessage('¡La llave destruyó a todos los enemigos!');
  navigator.vibrate?.([20, 20, 45]);
}

function passableForPlayer(x,y,ignorePushables=false){
  if (!inBounds(x,y)) return false;
  if (!ignorePushables) {
    if (has(state.blocks,x,y)) return false;
    if (has(state.eggs,x,y) && !has(state.filledWater,x,y)) return false;
  }
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S') return false;
  if (b === '~' && !has(state.filledWater,x,y)) return false;
  if (b === 'C' && !chestOpen()) return false;
  if (b === 'D' && !state.doorOpen) return false;
  return !enemyAt(x,y) && !fireballAt(x,y);
}

function isPlayerFrozen(){
  return state.frozenUntil && performance.now() < state.frozenUntil;
}

function killPlayer(){
  if (state.deadUntil || state.won) return;
  const now = performance.now();
  state.deadUntil = now + 350;

    currentLevelRaw = LEVELS_RAW[currentLevelIndex];
    startLevel();
