  }, 450);
}

function attemptPush(setRef, fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  if (isWallTile(t) || t === 'V' || t === 'T' || t === 'C' || t === 'D' || t === 'S') return false;
  if (setRef === state.eggs && t === 'H') return false;
  const fromKey = key(fromX,fromY);
  const toKey = key(nx,ny);
  const eggHatchAt = setRef === state.eggs ? state.eggTimers.get(fromKey) : null;
  setRef.delete(fromKey);
  if (setRef === state.eggs) state.eggTimers.delete(fromKey);
  if (t === '~' && !has(state.filledWater,nx,ny)) {
    state.filledWater.add(toKey);
    if (setRef === state.eggs) {
      setRef.add(toKey);
    }
  } else {
    setRef.add(toKey);
    if (setRef === state.eggs && eggHatchAt != null) state.eggTimers.set(toKey, eggHatchAt);
  }
  return true;
}

function tryMovePlayer(dx,dy){
  if (isPlayerFrozen()) return false;
  const tx = state.player.x + dx;
  const ty = state.player.y + dy;
  if (!inBounds(tx,ty)) return false;
  state.player.facing = [dx,dy];

  if (enemyAt(tx,ty)) return false;

  if (has(state.blocks,tx,ty)) {
    if (!attemptPush(state.blocks, tx, ty, dx, dy)) return false;
  } else if (has(state.eggs,tx,ty)) {
    if (!has(state.filledWater,tx,ty)) {
      if (!attemptPush(state.eggs, tx, ty, dx, dy)) return false;
    }
  } else if (!passableForPlayer(tx,ty,true)) {
    return false;
  }

  const fromX = state.player.x;
  const fromY = state.player.y;
  state.player.x = tx;
  state.player.y = ty;
  setPlayerAnimation(fromX, fromY, tx, ty);
  const heartKey = key(tx,ty);
  if (state.hearts.has(heartKey)) {
    state.hearts.delete(heartKey);
    state.shots += 1;
    setHudMessage('¡Ganaste 1 disparo!');
  }
  if (!state.doorOpen && chestOpen() && state.chest && tx === state.chest.x && ty === state.chest.y) {
    if (!state.keyCollected) {
      state.keyCollected = true;
      triggerEnemyExplosion();
    }
    state.doorOpen = true;
    setHudMessage('¡Puerta abierta!');
  }
  if (state.doorOpen && state.door && tx === state.door.x && ty === state.door.y) return winLevel(), true;
  if (state.fireballs.some(fireball => isFireballTouchingPlayer(fireball))) killPlayer();
  const now = performance.now();
  updateDragonThreat(now);
  resolveMedusaThreat(now, true);
  return true;
}

function shoot(){
  if (isPlayerFrozen()) return false;
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  const [dx,dy] = state.player.facing;
  if (!dx && !dy) return false;
  const x = state.player.x + dx;
  const y = state.player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit && (hit.type === 'ardilla' || hit.type === 'leeper' || hit.type === 'skull')) {
    state.enemies = state.enemies.filter(v => v !== hit);
    const eggPos = key(x,y);
    state.eggs.add(eggPos);
    state.eggTimers.set(eggPos, performance.now() + EGG_HATCH_MS);
    state.shots -= 1;
    setHudMessage('¡Enemigo convertido en huevo!');
    navigator.vibrate?.(20);
    return true;
  }
  if (has(state.eggs,x,y)) {
    const eggPos = key(x,y);
    state.eggs.delete(eggPos);
    state.eggTimers.delete(eggPos);
    state.shots -= 1;
    setHudMessage('¡Huevo eliminado!');
    navigator.vibrate?.(15);
    return true;
  }
  setHudMessage('Acércate a una ardilla, leeper, calavera o huevo para disparar');
  return false;
}

function interactAdjacent(dx,dy){
  if (isPlayerFrozen()) return false;
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  const x = state.player.x + dx;
  const y = state.player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit && (hit.type === 'ardilla' || hit.type === 'leeper' || hit.type === 'skull')) {
    state.enemies = state.enemies.filter(v => v !== hit);
    const eggPos = key(x,y);
    state.eggs.add(eggPos);
    state.eggTimers.set(eggPos, performance.now() + EGG_HATCH_MS);
    state.shots -= 1;
    setHudMessage('¡Enemigo convertido en huevo!');
    navigator.vibrate?.(20);
    return true;
  }
  if (has(state.eggs,x,y)) {
    const eggPos = key(x,y);
    state.eggs.delete(eggPos);
    state.eggTimers.delete(eggPos);
    state.shots -= 1;
    setHudMessage('¡Huevo eliminado!');
    navigator.vibrate?.(15);
    return true;
  }
  return false;
}

function tryKeyboardShot(){
  const [facingDx, facingDy] = state.player.facing;
  if (interactAdjacent(facingDx, facingDy)) return true;

  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    if (dx === facingDx && dy === facingDy) continue;
    if (interactAdjacent(dx, dy)) {
      state.player.facing = [dx, dy];
      return true;
    }
  }

  return shoot();
}

function getAdjacentShootableTargets(){
  if (state.shots <= 0 || isPlayerFrozen()) return [];
  const targets = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx,dy] of dirs) {
    const x = state.player.x + dx;
    const y = state.player.y + dy;
    if (!inBounds(x,y)) continue;
    const hit = enemyAt(x,y);
    if ((hit && (hit.type === 'ardilla' || hit.type === 'leeper' || hit.type === 'skull')) || has(state.eggs,x,y)) targets.push({ x, y });
  }
  return targets;
}

function tapToTile(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - board.x) / board.t;
  const y = (clientY - rect.top - board.y) / board.t;
  return {
    x: Math.max(0, Math.min(W-1, Math.round(x - 0.5))),
    y: Math.max(0, Math.min(H-1, Math.round(y - 0.5))),
  };
}

function canDragThrough(x,y){
  if (x === state.player.x && y === state.player.y) return true;
  return passableForPlayer(x,y,true);
}

function appendStepToPath(path, tile){
  const last = path[path.length - 1];
  if (!last) {
    path.push(tile);
    return;
  }
  if (last.x === tile.x && last.y === tile.y) return;

  let cx = last.x;
  let cy = last.y;
  while (cx !== tile.x || cy !== tile.y) {
    const dx = tile.x - cx;
    const dy = tile.y - cy;

    const horizontalFirst = Math.abs(dx) >= Math.abs(dy);
    const candidates = [];
    if (horizontalFirst) {
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
    } else {
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
    }

    const next = candidates.find(c => canDragThrough(c.x, c.y));
    if (!next) break;

    cx = next.x;
    cy = next.y;
    if (path[path.length - 1].x !== cx || path[path.length - 1].y !== cy) path.push({ x: cx, y: cy });
  }
}


function isPlanningDragActive(){
  return activePointerId !== null && dragPath.length > 0;
}

function getRenderNow(){
  return performance.now();
}
function clearPathInput(){
  activePointerId = null;
  dragPath = [];
  activePointerTile = null;
  dragFreezeNow = null;
  dragQueuedStepIndex = 0;
  lastDragStepReadyAt = 0;
}

function getDragAvailableTiles(){
  if (!dragPath.length) return [];
  const tip = dragPath[dragPath.length - 1];
  const options = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    const nx = tip.x + dx;
    const ny = tip.y + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
    if (canDragThrough(nx, ny)) options.push({ x: nx, y: ny });
  }
  if (dragPath.length > 1) {
    const prev = dragPath[dragPath.length - 2];
    if (!options.some(v => v.x === prev.x && v.y === prev.y)) options.push({ x: prev.x, y: prev.y });
  }
  return options;
}

function clearKeyboardInput(){
  keyboardHoldAcc = 0;
  keyboardRepeatDelayMs = 0;
  activeKeyboardDirKey = null;
  pressedMovementKeys.clear();
}

function canPushAt(fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  return !(isWallTile(t) || t === 'V' || t === 'T' || t === 'C' || t === 'D' || t === 'S');
}

function canAdvanceKeyboard(dx, dy){
  const tx = state.player.x + dx;
  const ty = state.player.y + dy;
  if (!inBounds(tx,ty) || enemyAt(tx,ty)) return false;
  if (has(state.blocks,tx,ty)) return canPushAt(tx, ty, dx, dy);
  if (has(state.eggs,tx,ty) && !has(state.filledWater,tx,ty)) return canPushAt(tx, ty, dx, dy);
  return passableForPlayer(tx,ty,true);
}

function performKeyboardHalfStep(dx, dy){
  if (state.won || state.deadUntil || isPlayerFrozen() || isEditorOpen) return false;
  if (queuedMoves.length) queuedMoves = [];
  keyboardOffset = { x: 0, y: 0 };
  if (!canAdvanceKeyboard(dx, dy)) return false;
  const fromAbsX = state.player.x;
  const fromAbsY = state.player.y;
  const undoSnapshot = snapshot();
  pushUndoSnapshot(undoSnapshot);
  if (!tryMovePlayer(dx, dy)) {
    state.undo.pop();
    return false;
  }
  setPlayerAnimationCustom(fromAbsX, fromAbsY, state.player.x, state.player.y, KEYBOARD_HALF_STEP_MS);
  return true;
}

function performDirectionalMove(dx, dy){
  if (state.won || state.deadUntil || isPlayerFrozen() || isEditorOpen) return false;
  if (queuedMoves.length) queuedMoves = [];
  state.player.facing = [dx, dy];
  const undoSnapshot = snapshot();
  if (interactAdjacent(dx, dy)) {
    pushUndoSnapshot(undoSnapshot);
    return true;
  }
  enqueueMove(dx, dy, undoSnapshot);
  return true;
}

function clearDirectionalHold(){
  if (directionalHoldInterval) {
    clearInterval(directionalHoldInterval);
    directionalHoldInterval = null;
  }
  directionalPointerStart = null;
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  activeDirectionalButton = null;
  activeDirectionalPointerId = null;
}

function clearDirectionalFocus(){
  const active = document.activeElement;
  if (active?.classList?.contains('dir-btn')) active.blur();
}

function triggerDirectionalButton(button){
  if (!button) return false;
  const dx = Number(button.dataset.dx);
  const dy = Number(button.dataset.dy);
  if (!Number.isFinite(dx) || !Number.isFinite(dy)) return false;
  return performDirectionalMove(dx, dy);
}

function setDirectionalHold(button, pointerId){
  if (!button) return;
  activeDirectionalButton = button;
  activeDirectionalPointerId = pointerId;
  clearInterval(directionalHoldInterval);
  directionalHoldInterval = setInterval(() => {
    if (!activeDirectionalButton) return;
    triggerDirectionalButton(activeDirectionalButton);
  }, DIRECTIONAL_HOLD_INTERVAL);
}

function getDirectionalButtonFromPoint(clientX, clientY){
  const target = document.elementFromPoint(clientX, clientY);
  return target?.closest?.('.dir-btn') ?? null;
}

function getDirectionalButtonFromDelta(dx, dy){
  if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return null;
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0 ? moveRightBtn : moveLeftBtn;
  }
  return dy > 0 ? moveDownBtn : moveUpBtn;
}

function getDirectionalButtonFromControlCenter(clientX, clientY){
  if (!directionalControls) return null;
  const rect = directionalControls.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  const dx = clientX - centerX;
  const dy = clientY - centerY;
  if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return null;
  if (Math.abs(dx) >= Math.abs(dy)) {
    return dx >= 0 ? moveRightBtn : moveLeftBtn;
  }
  return dy >= 0 ? moveDownBtn : moveUpBtn;
}

function enqueueMove(dx, dy, undoSnapshot = null, intervalMs = MOVE_INTERVAL, readyAt = null){
  queuedMoves.push({ dx, dy, undoSnapshot, intervalMs, readyAt });
  if (queuedMoves.length === 1 && readyAt === null) moveAcc = intervalMs;
}

function queueDraggedPath(now = performance.now()){
  if (dragPath.length < 2) return;
  while (dragQueuedStepIndex < dragPath.length - 1) {
    const prev = dragPath[dragQueuedStepIndex];
    const next = dragPath[dragQueuedStepIndex + 1];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    if (Math.abs(dx) + Math.abs(dy) === 1) {
      const readyAt = Math.max(lastDragStepReadyAt + DRAG_PATH_MOVE_INTERVAL, now + DRAG_PATH_DELAY_MS);
      enqueueMove(dx, dy, null, DRAG_PATH_MOVE_INTERVAL, readyAt);
      lastDragStepReadyAt = readyAt;
    }
    dragQueuedStepIndex += 1;
  }
}

function rebaseDragPathFromPlayer(now = performance.now()){
  if (!isPlanningDragActive()) return;
  dragPath = [{ x: state.player.x, y: state.player.y }];
  dragQueuedStepIndex = 0;
  lastDragStepReadyAt = now;
  if (activePointerTile) appendStepToPath(dragPath, activePointerTile);
  queueDraggedPath(now);
}

function processQueuedMove(){
  if (!queuedMoves.length || state.won || state.deadUntil || isPlayerFrozen()) return false;
  const nextMove = queuedMoves.shift();
  const undoSnapshot = nextMove.undoSnapshot ?? snapshot();
  pushUndoSnapshot(undoSnapshot);
  if (!tryMovePlayer(nextMove.dx, nextMove.dy)) {
    state.undo.pop();
    if (isPlanningDragActive()) {
      queuedMoves = [];
      rebaseDragPathFromPlayer();
    }
  }
  return true;
}

canvas.addEventListener('pointerdown', e => {
  if (state.won || isEditorOpen || isPlayerFrozen()) return;
  const t = tapToTile(e.clientX, e.clientY);
  if (t.x === state.player.x && t.y === state.player.y) {
    activePointerId = e.pointerId;
    queuedMoves = [];
    dragPath = [{ x: state.player.x, y: state.player.y }];
    dragQueuedStepIndex = 0;
    lastDragStepReadyAt = 0;
    activePointerTile = t;
    canvas.setPointerCapture(e.pointerId);
    return;
  }

  const dx = t.x - state.player.x;
  const dy = t.y - state.player.y;
  if (Math.abs(dx) + Math.abs(dy) === 1) {
    const stepX = Math.sign(dx);
    const stepY = Math.sign(dy);
    state.player.facing = [stepX, stepY];
    const undoSnapshot = snapshot();
    if (interactAdjacent(stepX, stepY)) {
      pushUndoSnapshot(undoSnapshot);
      return;
    }
    enqueueMove(stepX, stepY, undoSnapshot);
    return;
  }
  if (dx === 0 || dy === 0) {
    state.player.facing = [Math.sign(dx), Math.sign(dy)];
    pushUndo();
    if (!shoot()) state.undo.pop();
  }
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointerId || !dragPath.length) return;
  const tile = tapToTile(e.clientX, e.clientY);
  activePointerTile = tile;
  appendStepToPath(dragPath, tile);
  queueDraggedPath();
});

function handlePointerEnd(e){
  if (e.pointerId !== activePointerId) return;
  queuedMoves = [];
  clearPathInput();
}

canvas.addEventListener('pointerup', handlePointerEnd);
canvas.addEventListener('pointercancel', handlePointerEnd);

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (isEditorOpen || state.won || state.deadUntil || isPlayerFrozen()) return;
    pushUndo();
    if (!tryKeyboardShot()) state.undo.pop();
    return;
  }

  const movement = KEY_DIRECTIONS[e.key];
  if (!movement) return;
  e.preventDefault();
  if (isEditorOpen || state.won || state.deadUntil || isPlayerFrozen()) return;
  if (e.repeat && pressedMovementKeys.has(e.key)) return;
  pressedMovementKeys.add(e.key);
  activeKeyboardDirKey = e.key;
  keyboardHoldAcc = 0;
  keyboardRepeatDelayMs = KEYBOARD_REPEAT_INITIAL_DELAY;
  const [dx, dy] = movement;
  performKeyboardHalfStep(dx, dy);
});

document.addEventListener('keyup', (e) => {
  if (!KEY_DIRECTIONS[e.key]) return;
  pressedMovementKeys.delete(e.key);
  if (activeKeyboardDirKey === e.key) {
    const remaining = [...pressedMovementKeys];
    activeKeyboardDirKey = remaining.length ? remaining[remaining.length - 1] : null;
    keyboardRepeatDelayMs = activeKeyboardDirKey ? KEYBOARD_REPEAT_INITIAL_DELAY : 0;
  }
  keyboardHoldAcc = 0;
});

window.addEventListener('blur', () => {
  clearKeyboardInput();
  clearDirectionalHold();
});

function blockedForDragonSight(x,y){
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'C' || b === 'D' || b === 'S' || b === 'T') return true;
  if (has(state.blocks,x,y) || has(state.eggs,x,y)) return true;
  if (enemyAt(x,y)) return true;
  return false;
}


function sameDir(a, b){
  return a && b && a[0] === b[0] && a[1] === b[1];
}

function rotateRockyRight(dir){
  const idx = ROCKY_DIRS.findIndex(v => sameDir(v, dir));
  const next = idx >= 0 ? (idx + 1) % ROCKY_DIRS.length : 0;
  return [...ROCKY_DIRS[next]];
}

function isRockyBaseBlocked(x,y){
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S') return true;
  if (b === '~' && !has(state.filledWater,x,y)) return true;
  if (b === 'C' || b === 'D') return true;
  return false;
}

function enemyAtExcluding(x, y, ignored){
  return state.enemies.find(e => e !== ignored && e.x === x && e.y === y);
}

function canRockyOccupy(x, y, rocky, allowPlayer = false){
  if (!inBounds(x, y)) return false;
  if (isRockyBaseBlocked(x, y)) return false;
  if (has(state.hearts, x, y)) return false;
  if (has(state.blocks, x, y) || has(state.eggs, x, y)) return false;
  if (enemyAtExcluding(x, y, rocky)) return false;
  if (!allowPlayer && state.player.x === x && state.player.y === y) return false;
  return true;
}

function canSkullOccupy(x, y, skull){
  if (!inBounds(x, y)) return false;
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S' || b === 'C' || b === 'D') return false;
  if (b === '~' && !has(state.filledWater, x, y)) return false;
  if (has(state.blocks, x, y) || has(state.eggs, x, y)) return false;
  if (enemyAtExcluding(x, y, skull)) return false;
  return true;
}

function dirKey(dir){
  return `${dir[0]},${dir[1]}`;
}

function addPendingTurn(skull, dir){
  if (!dir) return;
  const pending = skull.pendingTurns ?? [];
  const k = dirKey(dir);
  if (pending.some(p => dirKey(p) === k)) {
    skull.pendingTurns = pending;
    return;
  }
  pending.push([...dir]);
  skull.pendingTurns = pending;
}

function chooseSkullDir(skull, canOccupy = canSkullOccupy){
  const current = skull.dir && (skull.dir[0] || skull.dir[1]) ? skull.dir : [1, 0];
  skull.dir = [...current];

  const offsetX = state.player.x - skull.x;
  const offsetY = state.player.y - skull.y;
  const horizontal = offsetX === 0 ? (skull.prefHorizontal ?? 1) : Math.sign(offsetX);
  const vertical = offsetY === 0 ? (skull.prefVertical ?? 1) : Math.sign(offsetY);
  skull.prefHorizontal = horizontal;
  skull.prefVertical = vertical;

  const reverse = [-current[0], -current[1]];
  const pending = skull.pendingTurns ?? [];
  if (pending.length) {
    const deferred = pending[0];
    const candidates = [deferred, current, [-deferred[0], -deferred[1]], reverse];
    for (let i = 0; i < candidates.length; i++) {
      const [dx, dy] = candidates[i];
      const tx = skull.x + dx;
      const ty = skull.y + dy;
      if (!canOccupy(tx, ty, skull)) {
        if (i <= 1) addPendingTurn(skull, [dx, dy]);
        continue;
      }
      if (sameDir([dx, dy], deferred)) pending.shift();
      skull.pendingTurns = pending;
      return [dx, dy];
    }
    skull.pendingTurns = pending;
    return current;
  }

  const movingHorizontal = current[0] !== 0;
  const targetAlongAxis = movingHorizontal ? horizontal : vertical;
  const goingGood = movingHorizontal ? current[0] === targetAlongAxis : current[1] === targetAlongAxis;
  const towardPerpendicular = movingHorizontal ? [0, vertical] : [horizontal, 0];
  const oppositePerpendicular = [-towardPerpendicular[0], -towardPerpendicular[1]];

  const candidates = goingGood
    ? [current, towardPerpendicular, oppositePerpendicular, reverse]
    : [towardPerpendicular, current, oppositePerpendicular, reverse];

  for (const [dx, dy] of candidates) {
    const tx = skull.x + dx;
    const ty = skull.y + dy;
    if (canOccupy(tx, ty, skull)) return [dx, dy];
  }
  return current;
}

function canLeeperOccupy(x, y, leeper){
  if (!canSkullOccupy(x, y, leeper)) return false;
  const b = state.base[y][x];
  if (b === 'T' || b === 'S') return false;
  return true;
}

function isOrthogonallyAdjacentToPlayer(enemy){
  const distance = Math.abs(enemy.x - state.player.x) + Math.abs(enemy.y - state.player.y);
  return distance === 1;
}

function updateSkulls(now = performance.now()){
  if (state.won || state.deadUntil) return;
  const skullsActive = chestOpen() && !state.keyCollected;

  for (const enemy of state.enemies) {
    if (enemy.type !== 'skull' && enemy.type !== 'leeper') continue;
    if (enemy.type === 'skull' && !skullsActive) continue;
    if (enemy.type === 'leeper' && enemy.asleep) continue;

    if (enemy.type === 'leeper' && isOrthogonallyAdjacentToPlayer(enemy)) {
      enemy.asleep = true;
      enemy.pendingTurns = [];
      enemy.dir = [0, 0];
      continue;
    }

    if ((enemy.nextStepAt ?? 0) > now) continue;

    enemy.nextStepAt = now + SKULL_STEP_MS;
    const canOccupy = enemy.type === 'leeper' ? canLeeperOccupy : canSkullOccupy;
    const [dx, dy] = chooseSkullDir(enemy, canOccupy);
    enemy.dir = [dx, dy];
    if (enemy.type === 'leeper' && (dx || dy)) {
      enemy.facing = [dx, dy];
    }
    const tx = enemy.x + dx;
    const ty = enemy.y + dy;
    if (!canOccupy(tx, ty, enemy)) continue;

    const fromX = enemy.x;
    const fromY = enemy.y;
    enemy.x = tx;
    enemy.y = ty;
    if (enemy.type === 'leeper') {
      setLeeperAnimation(enemy, fromX, fromY, tx, ty, Math.max(140, SKULL_STEP_MS - 36));
    }
    if (enemy.x === state.player.x && enemy.y === state.player.y) {
      if (enemy.type === 'leeper') {
        enemy.asleep = true;
        enemy.pendingTurns = [];
        enemy.dir = [0, 0];
        continue;
      }
      killPlayer();
      return;
    }

    if (enemy.type === 'leeper' && isOrthogonallyAdjacentToPlayer(enemy)) {
      enemy.asleep = true;
      enemy.pendingTurns = [];
      enemy.dir = [0, 0];
    }
  }
}

function isRockyNearPlayer(rocky){
  const offsetX = state.player.x - rocky.x;
  const offsetY = state.player.y - rocky.y;
  if (offsetX !== 0 && offsetY !== 0) return false;
  const distance = Math.abs(offsetX) + Math.abs(offsetY);
  if (distance > ROCKY_BLOCK_DISTANCE) return false;

  if (!rocky.dir || !ROCKY_DIRS.some(v => sameDir(v, rocky.dir))) {
    return true;
  }

  const facingDot = offsetX * rocky.dir[0] + offsetY * rocky.dir[1];
  return facingDot >= 0;
}

function getRockyChargeDir(rocky){
  let dx = 0;
  let dy = 0;
  if (rocky.x === state.player.x) {
    dy = Math.sign(state.player.y - rocky.y);
  } else if (rocky.y === state.player.y) {
    dx = Math.sign(state.player.x - rocky.x);
  } else {
    return null;
  }

  if (!dx && !dy) return null;
  if (!rocky.dir || !sameDir(rocky.dir, [dx, dy])) return null;

  for (let x = rocky.x + dx, y = rocky.y + dy; x !== state.player.x || y !== state.player.y; x += dx, y += dy) {
    if (!canRockyOccupy(x, y, rocky)) return null;
  }
  return [dx, dy];
}

function tryRockyPushPlayer(chargeDir){
  const nx = state.player.x + chargeDir[0];
  const ny = state.player.y + chargeDir[1];
  if (!passableForPlayer(nx, ny)) return false;
  const fromX = state.player.x;
  const fromY = state.player.y;
  state.player.x = nx;
  state.player.y = ny;
  setPlayerAnimation(fromX, fromY, nx, ny);
  return true;
}

function updateRocky(rocky, now){
  const chargeDir = getRockyChargeDir(rocky);
  if (chargeDir) {
    rocky.mode = 'charge';
    rocky.dir = [...chargeDir];
    rocky.facing = [...chargeDir];
  } else if (isRockyNearPlayer(rocky)) {
    rocky.mode = 'block';
  } else if (rocky.mode !== 'charge') {
    rocky.mode = 'patrol';
  }

  if (rocky.mode === 'charge') {
    if ((rocky.nextChargeAt ?? 0) > now) return;
    rocky.nextChargeAt = now + PLAYER_MOVE_MS;
    const [dx, dy] = rocky.dir || [0, 1];
    rocky.facing = [dx, dy];
    const tx = rocky.x + dx;
    const ty = rocky.y + dy;
    if (tx === state.player.x && ty === state.player.y) {
      if (has(state.hearts, tx, ty)) {
        rocky.mode = 'block';
        return;
      }
      if (!tryRockyPushPlayer([dx, dy])) {
        rocky.mode = 'block';
        return;
      }
      setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, PLAYER_MOVE_MS);
      rocky.x = tx;
      rocky.y = ty;
      return;
    }
    if (!canRockyOccupy(tx, ty, rocky)) {
      rocky.mode = 'patrol';
      return;
    }
    setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, PLAYER_MOVE_MS);
    rocky.x = tx;
    rocky.y = ty;
    return;
  }

  if (rocky.mode === 'block') {
    rocky.nextChargeAt = 0;
    const sideBySide = Math.abs(rocky.x - state.player.x) === 1 && rocky.y === state.player.y;
    if (sideBySide && state.player.facing && state.player.facing[0] === 0 && state.player.facing[1] !== 0) {
      const [, dy] = state.player.facing;
      const tx = rocky.x;
      const ty = rocky.y + dy;
      if (canRockyOccupy(tx, ty, rocky)) {
        setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, ROCKY_PATROL_STEP_MS);
        rocky.y = ty;
      }
    }
    return;
  }

  rocky.nextChargeAt = 0;
  if ((rocky.nextPatrolAt ?? 0) > now) return;
  rocky.nextPatrolAt = now + ROCKY_PATROL_STEP_MS;

  if (!rocky.dir || !ROCKY_DIRS.some(v => sameDir(v, rocky.dir))) rocky.dir = [1, 0];
  for (let i = 0; i < 4; i++) {
    const [dx, dy] = rocky.dir;
    rocky.facing = [dx, dy];
    const tx = rocky.x + dx;
    const ty = rocky.y + dy;
    if (canRockyOccupy(tx, ty, rocky)) {
      setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, ROCKY_PATROL_STEP_MS);
      rocky.x = tx;
      rocky.y = ty;
      return;
    }
    rocky.dir = rotateRockyRight(rocky.dir);
  }
}

function runRockyTurn(now = performance.now()){
  for (const enemy of state.enemies) {
    if (enemy.type !== 'rocky') continue;
    updateRocky(enemy, now);
  }
}

function isPlayerInDragonFireDirection(dragon){
  const [dx, dy] = dragon.dir || [0, 0];
  if (!dx && !dy) return false;
  if (dx !== 0) {
    if (state.player.y !== dragon.y) return false;
    return (state.player.x - dragon.x) * dx > 0;
  }
  if (state.player.x !== dragon.x) return false;
  return (state.player.y - dragon.y) * dy > 0;
}


function triggerExplosionAt(x, y, now = performance.now()){
  state.explosions.push({ x, y, startedAt: now, life: EXPLOSION_FLASH_MS * 0.55 });
}

function spawnDragonFireball(dragon, now){
  const [dx, dy] = dragon.dir || [0, 0];
  const x = dragon.x + dx;
  const y = dragon.y + dy;
  if (!inBounds(x, y)) return;
  if (blockedForDragonSight(x, y)) {
    triggerExplosionAt(x, y, now);
    return;
  }
  const fireball = { x, y, dx, dy, lastStepAt: now };
  state.fireballs.push(fireball);
  if (isFireballTouchingPlayer(fireball, now)) killPlayer();
}

function updateDragonThreat(now = performance.now()){
  if (!chestOpen() || state.keyCollected || state.won || state.deadUntil) return;
  for (const enemy of state.enemies) {
    if (enemy.type !== 'dragon') continue;
    const seesPlayer = isPlayerInDragonFireDirection(enemy);
    if (!seesPlayer) {
      enemy.wasSeeingPlayer = false;
      continue;
    }
    const justSpottedPlayer = !enemy.wasSeeingPlayer;
    enemy.wasSeeingPlayer = true;
    if (!justSpottedPlayer && (enemy.coolDownUntil ?? 0) > now) continue;
    enemy.coolDownUntil = now + DRAGON_FIRE_COOLDOWN_MS;
    spawnDragonFireball(enemy, now);
  }
}

function advanceDragonFireballs(now = performance.now()){
  const next = [];
  for (const fireball of state.fireballs) {
    if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) continue;
    let stepped = false;
    while (now - fireball.lastStepAt >= DRAGON_FIREBALL_STEP_MS) {
      fireball.lastStepAt += DRAGON_FIREBALL_STEP_MS;
      fireball.x += fireball.dx;
      fireball.y += fireball.dy;
      stepped = true;
      if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) break;
      const tx = Math.round(fireball.x);
      const ty = Math.round(fireball.y);
      if (isFireballTouchingPlayer(fireball, fireball.lastStepAt)) {
        killPlayer();
        break;
      }
      if (blockedForDragonSight(tx, ty)) {
        triggerExplosionAt(tx, ty, fireball.lastStepAt);
        break;
      }
    }
    if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) continue;
    const tx = Math.round(fireball.x);
    const ty = Math.round(fireball.y);
    if (isFireballTouchingPlayer(fireball, now)) continue;
    if (stepped && blockedForDragonSight(tx, ty)) continue;
    next.push(fireball);
  }
  state.fireballs = next;
}

function getFireballRenderPosition(fireball, now = performance.now()){
  const progress = Math.max(0, Math.min(1, (now - fireball.lastStepAt) / DRAGON_FIREBALL_STEP_MS));
  return {
    x: fireball.x + fireball.dx * progress,
    y: fireball.y + fireball.dy * progress,
  };
}

function blockedForMedusaShot(x,y){
  const b = state.base[y][x];
  return isWallTile(b) || b === 'V' || b === 'C' || b === 'D' || b === 'S' || has(state.blocks,x,y) || has(state.eggs,x,y);
}

function hasLineOfSightToPlayer(medusa){
  if (medusa.x !== state.player.x && medusa.y !== state.player.y) return null;
  if (medusa.x === state.player.x) {
    const step = Math.sign(state.player.y - medusa.y);
    for (let y = medusa.y + step; y !== state.player.y; y += step) {
      if (blockedForMedusaShot(medusa.x, y)) return null;
    }
    return { dx: 0, dy: step };
  }
  const step = Math.sign(state.player.x - medusa.x);
  for (let x = medusa.x + step; x !== state.player.x; x += step) {
    if (blockedForMedusaShot(x, medusa.y)) return null;
  }
  return { dx: step, dy: 0 };
}

function isPlayerAlignedWithMedusa(medusa){
  return medusa.x === state.player.x || medusa.y === state.player.y;
}

function medusaVisionTiles(medusa){
  const tiles = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx,dy] of dirs) {
    let x = medusa.x + dx;
    let y = medusa.y + dy;
    while (inBounds(x,y) && !blockedForMedusaShot(x,y)) {
      tiles.push({x,y});
      x += dx;
      y += dy;
    }
  }
  return tiles;
}

function isPlayerAdjacentToVision(medusa){
  return medusaVisionTiles(medusa).some(v => Math.abs(v.x - state.player.x) + Math.abs(v.y - state.player.y) === 1);
}

function resolveMedusaThreat(now = performance.now(), instantKill = false){
  state.medusaShot = null;
  for (const e of state.enemies) {
    if (e.type !== 'medusa') {
      e.alert = false;
      continue;
    }
    const sight = hasLineOfSightToPlayer(e);
    const warning = isPlayerAdjacentToVision(e);
    const aligned = isPlayerAlignedWithMedusa(e);
    e.alert = Boolean(aligned || warning);
    if (!sight) {
      e.charge = 0;
      continue;
    }
    if (!e.charge) e.charge = now;
    if (instantKill) e.charge = Math.min(e.charge, now - MEDUSA_FREEZE_BEFORE_SHOT_MS);
    const elapsed = now - e.charge;
    state.frozenUntil = Math.max(state.frozenUntil, e.charge + MEDUSA_FREEZE_BEFORE_SHOT_MS + MEDUSA_SHOT_FLASH_MS);
    if (elapsed < MEDUSA_FREEZE_BEFORE_SHOT_MS) continue;

    const shotStartedAt = e.charge + MEDUSA_FREEZE_BEFORE_SHOT_MS;
    const shotAge = now - shotStartedAt;
    state.medusaShot = {
      fromX: e.x,
      fromY: e.y,
      toX: state.player.x,
      toY: state.player.y,
      chargeRatio: 1,
      ts: shotStartedAt,
      life: MEDUSA_SHOT_FLASH_MS,
    };
    if (shotAge >= MEDUSA_SHOT_FLASH_MS * 0.35 || instantKill) {
      killPlayer();
      return;
    }
  }
}

function tick(){
  const now = performance.now();
  if (state.deadUntil && now >= state.deadUntil) return resetLevel({ fromDeath: true });
  if (state.won) return;
  if (state.frozenUntil && now >= state.frozenUntil) state.frozenUntil = 0;

  for (const [pos, hatchAt] of state.eggTimers.entries()) {
    if (now < hatchAt) continue;
    const [x,y] = pos.split(',').map(Number);
    state.eggTimers.delete(pos);
    if (!state.eggs.has(pos)) continue;
    state.eggs.delete(pos);
    if (!enemyAt(x,y)) state.enemies.push({ type:'ardilla', x, y, charge:0, alert:false });
  }

  state.explosions = state.explosions.filter(explosion => now - explosion.startedAt < explosion.life);

  runRockyTurn(now);
  updateSkulls(now);
  updateDragonThreat(now);
  advanceDragonFireballs(now);
  resolveMedusaThreat(now);
}

function resize(){
  const r = boardWrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled = false;

  const w = r.width;
  const h = r.height;
  board.t = Math.max(12, Math.floor(Math.min((w - 4) / W, (h - 4) / H)));
  board.x = Math.floor((w - W * board.t) / 2);
  board.y = Math.floor((h - H * board.t) / 2);
}
window.addEventListener('resize', resize);

function drawSprite(name, x, y){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
  } else { 
    ctx.fillStyle = '#000'; 
    ctx.fillRect(px,py,board.t,board.t); 
  }
}

function getWaterSpriteName(now, x, y){
  const frame = (Math.floor(now / 260) + (x % 2) + (y % 3)) % 4;
  return frame === 0 ? 'water' : `water_${frame}`;
}

function dragonDirectionCode(dragon){
  const [dx, dy] = dragon.dir || [0, -1];
  if (dx === 1) return 'e';
  if (dx === -1) return 'o';
  if (dy === 1) return 's';
  return 'n';
}

function dragonIsActive(){
  return chestOpen() && !state.keyCollected && !state.won && !state.deadUntil;
}

function drawDragonSprite(dragon){
  const dir = dragonDirectionCode(dragon);
  const stateKey = dragonIsActive() ? 'open' : 'closed';
  const spriteName = `dragon_${dir}_${stateKey}`;
  const px = board.x + dragon.x * board.t;
  const py = board.y + dragon.y * board.t;
  const img = sprites[spriteName];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
    return;
  }
  drawSprite(`dragon_${dir}`, dragon.x, dragon.y);
}

function draw(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  const now = getRenderNow();

  // Capa 0: Suelo en todas partes
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      drawSprite('floor', x, y);
    }
  }

  // Capa 1: Elementos base
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      const b = state.base[y][x];
      if (isWallTile(b)) drawSprite(getWallSpriteName(x,y),x,y);
      else if (b === 'V') {
        const px = board.x + x * board.t;
        const py = board.y + y * board.t;
        ctx.fillStyle = '#000';
        ctx.fillRect(px, py, board.t, board.t);
      }
      else if (b === '~') drawSprite(getWaterSpriteName(now, x, y),x,y);
      else if (b === 'R') {
        drawSprite(getWaterSpriteName(now, x, y),x,y);
        drawSprite('bridge',x,y);
      }
      else if (b === 'T') drawSprite('tree',x,y);
      else if (b === 'S') drawSprite('stone',x,y);
      else if (b === 'C') {
        drawSprite(chestOpen() ? 'chest_open' : 'chest',x,y);
        if (chestOpen() && !state.keyCollected) {
          const px = board.x + x * board.t;
          const py = board.y + y * board.t;
          const pulse = 0.5 + Math.abs(Math.sin(now * 0.01)) * 0.5;
          const glow = ctx.createRadialGradient(
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * 0.1,
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * (0.9 + pulse * 0.55)
          );
          glow.addColorStop(0, `rgba(255, 255, 180, ${0.28 + pulse * 0.22})`);
          glow.addColorStop(0.6, `rgba(255, 212, 92, ${0.24 + pulse * 0.2})`);
          glow.addColorStop(1, 'rgba(255, 212, 92, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px - board.t * 0.75, py - board.t * 0.75, board.t * 2.5, board.t * 2.5);
        }
      }
      else if (b === 'D') {
        drawSprite('door',x,y);
        const px = board.x + x * board.t;
        const py = board.y + y * board.t;
        if (!state.doorOpen) {
          ctx.fillStyle = 'rgba(20, 12, 4, 0.6)';
          ctx.fillRect(px, py, board.t, board.t);
        } else {
          const pulse = 0.45 + Math.abs(Math.sin(now * 0.008 + 1.2)) * 0.55;
          const glow = ctx.createRadialGradient(
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * 0.15,
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * (1.05 + pulse * 0.5)
          );
          glow.addColorStop(0, `rgba(170, 240, 255, ${0.26 + pulse * 0.18})`);
          glow.addColorStop(0.65, `rgba(75, 192, 255, ${0.18 + pulse * 0.22})`);
          glow.addColorStop(1, 'rgba(75, 192, 255, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px - board.t * 0.8, py - board.t * 0.8, board.t * 2.6, board.t * 2.6);
        }
      }
    }
  }

  // Capa 2: Elementos interactivos
  for (const b of arrFromSet(state.blocks)) drawSprite('block',b.x,b.y);
  for (const hrt of arrFromSet(state.hearts)) drawSprite('heart',hrt.x,hrt.y);
  for (const egg of arrFromSet(state.eggs)) drawSprite('egg',egg.x,egg.y);
  for (const e of state.enemies) {
    if (e.type === 'dragon') {
      drawDragonSprite(e);
      continue;
    }
    if (e.type === 'rocky') {
      drawRockySprite(e, now);
      continue;
    }
    if (e.type === 'ardilla') {
      drawArdillaSprite(e, now);
      continue;
    }
    if (e.type === 'medusa') {
      if (e.alert) {
        const px = board.x + e.x * board.t;
        const py = board.y + e.y * board.t;
        const t = now * 0.012;
        const pulse = 0.45 + Math.abs(Math.sin(t)) * 0.55;
        const radius = board.t * (0.5 + pulse * 0.32);
        const glow = ctx.createRadialGradient(
          px + board.t * 0.5,
          py + board.t * 0.5,
          board.t * 0.2,
          px + board.t * 0.5,
          py + board.t * 0.5,
          radius
        );
        glow.addColorStop(0, `rgba(246, 240, 107, ${0.24 + pulse * 0.22})`);
        glow.addColorStop(1, 'rgba(246, 240, 107, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(px - board.t * 0.4, py - board.t * 0.4, board.t * 1.8, board.t * 1.8);
      }
      drawMedusaSprite(e, now);
      continue;
    }
    if (e.type === 'skull') {
      drawSprite('skull', e.x, e.y);
      continue;
    }
    if (e.type === 'leeper') {
      drawLeeperSprite(e, now);
      continue;
    }
    drawSprite(e.type, e.x, e.y);
  }

  const adjacentShootableTargets = getAdjacentShootableTargets();
  if (adjacentShootableTargets.length) {
    const pulse = 0.45 + Math.abs(Math.sin(now * 0.013)) * 0.55;
    for (const target of adjacentShootableTargets) {
      const px = board.x + target.x * board.t;
      const py = board.y + target.y * board.t;
      const glow = ctx.createRadialGradient(
        px + board.t * 0.5,
        py + board.t * 0.5,
        board.t * 0.12,
        px + board.t * 0.5,
        py + board.t * 0.5,
        board.t * (0.65 + pulse * 0.55)
      );
      glow.addColorStop(0, `rgba(255, 82, 82, ${0.26 + pulse * 0.26})`);
      glow.addColorStop(0.6, `rgba(255, 36, 36, ${0.22 + pulse * 0.22})`);
      glow.addColorStop(1, 'rgba(255, 24, 24, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(px - board.t * 0.6, py - board.t * 0.6, board.t * 2.2, board.t * 2.2);
      const centerX = px + board.t * 0.5;
      const centerY = py + board.t * 0.5;
      const ringRadius = board.t * (0.28 + pulse * 0.07);
      const ringWidth = Math.max(1.5, board.t * 0.08);
      ctx.strokeStyle = `rgba(255, 98, 98, ${0.58 + pulse * 0.32})`;
      ctx.lineWidth = ringWidth;
      ctx.beginPath();
      ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
      ctx.stroke();

      const armInner = ringRadius + ringWidth * 0.4;
      const armOuter = board.t * 0.47;
      ctx.beginPath();
      ctx.moveTo(centerX - armOuter, centerY);
      ctx.lineTo(centerX - armInner, centerY);
      ctx.moveTo(centerX + armInner, centerY);
      ctx.lineTo(centerX + armOuter, centerY);
      ctx.moveTo(centerX, centerY - armOuter);
      ctx.lineTo(centerX, centerY - armInner);
      ctx.moveTo(centerX, centerY + armInner);
      ctx.lineTo(centerX, centerY + armOuter);
      ctx.stroke();

      ctx.fillStyle = `rgba(255, 190, 190, ${0.65 + pulse * 0.25})`;
      ctx.beginPath();
      ctx.arc(centerX, centerY, Math.max(1.2, board.t * 0.045), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (const explosion of state.explosions) {
    const life = Math.max(1, explosion.life);
    const progress = Math.max(0, Math.min(1, (now - explosion.startedAt) / life));
    const alpha = 1 - progress;
    const px = board.x + (explosion.x + 0.5) * board.t;
    const py = board.y + (explosion.y + 0.5) * board.t;
    const radius = board.t * (0.2 + progress * 0.85);

    const blast = ctx.createRadialGradient(px, py, board.t * 0.04, px, py, radius);
    blast.addColorStop(0, `rgba(255, 255, 255, ${0.95 * alpha})`);
    blast.addColorStop(0.4, `rgba(255, 214, 94, ${0.8 * alpha})`);
    blast.addColorStop(0.8, `rgba(255, 92, 64, ${0.5 * alpha})`);
    blast.addColorStop(1, 'rgba(255, 92, 64, 0)');
    ctx.fillStyle = blast;
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const fireball of state.fireballs) {
    const renderPos = getFireballRenderPosition(fireball, now);
    const px = board.x + (renderPos.x + 0.5) * board.t;
    const py = board.y + (renderPos.y + 0.5) * board.t;
    const glow = ctx.createRadialGradient(px, py, board.t * 0.05, px, py, board.t * 0.45);
    glow.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
    glow.addColorStop(0.35, 'rgba(255, 204, 83, 0.95)');
    glow.addColorStop(1, 'rgba(200, 32, 0, 0.2)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(3, board.t * 0.22), 0, Math.PI * 2);
    ctx.fill();
  }

  if (state.medusaShot) {
    const { fromX, fromY, toX, toY, chargeRatio = 1, ts = now, life = MEDUSA_SHOT_FLASH_MS } = state.medusaShot;
    const fromPx = board.x + (fromX + 0.5) * board.t;
    const fromPy = board.y + (fromY + 0.5) * board.t;
    const toPx = board.x + (toX + 0.5) * board.t;
    const toPy = board.y + (toY + 0.5) * board.t;

    const progress = Math.max(0, Math.min(1, (now - ts) / Math.max(1, life)));
    const head = Math.min(1, 0.92 + progress * 0.2);
    const sx = fromPx;
    const sy = fromPy;
    const ex = fromPx + (toPx - fromPx) * head;
    const ey = fromPy + (toPy - fromPy) * head;

    const grad = ctx.createLinearGradient(sx, sy, ex, ey);
    grad.addColorStop(0, 'rgba(153, 230, 255, 0.25)');
    grad.addColorStop(0.45, 'rgba(246, 240, 107, 0.92)');
    grad.addColorStop(1, 'rgba(255, 255, 255, 1)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(2, board.t * (0.24 + chargeRatio * 0.08));
    ctx.lineCap = 'round';
    ctx.shadowBlur = board.t * (0.7 + (1 - progress) * 0.8);
    ctx.shadowColor = 'rgba(246, 240, 107, 0.9)';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath();
    ctx.arc(ex, ey, Math.max(1.5, board.t * 0.11), 0, Math.PI * 2);
    ctx.fill();
  }

  if (dragPath.length > 1) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = Math.max(2, board.t * 0.2);
    ctx.lineCap = 'square';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < dragPath.length; i++) {
      const p = dragPath[i];
      const cx = board.x + (p.x + 0.5) * board.t;
      const cy = board.y + (p.y + 0.5) * board.t;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  if (dragPath.length) {
    const dragAvailableTiles = getDragAvailableTiles();
    ctx.fillStyle = 'rgba(116, 255, 140, 0.3)';
    for (const tile of dragAvailableTiles) {
      const px = board.x + tile.x * board.t;
      const py = board.y + tile.y * board.t;
      ctx.fillRect(px, py, board.t, board.t);
    }
  }

  if (activePointerTile) {
    const px = board.x + activePointerTile.x * board.t;
    const py = board.y + activePointerTile.y * board.t;
    ctx.fillStyle = 'rgba(255, 246, 114, 0.45)';
    ctx.fillRect(px, py, board.t, board.t);
    ctx.strokeStyle = 'rgba(255, 246, 114, 0.95)';
    ctx.lineWidth = Math.max(2, board.t * 0.12);
    ctx.strokeRect(px + 1, py + 1, board.t - 2, board.t - 2);
  }

  const playerDraw = getPlayerDrawPosition(now);
  drawPlayerSprite(playerDraw.x, playerDraw.y, now);
  if (state.frozenUntil) {
    const px = board.x + playerDraw.x * board.t;
    const py = board.y + playerDraw.y * board.t;
    ctx.fillStyle = 'rgba(120, 210, 255, 0.4)';
    ctx.fillRect(px, py, board.t, board.t);
  }

  if (state.deadUntil) {
    const blink = 0.25 + Math.abs(Math.sin(now * 0.04)) * 0.35;
    ctx.fillStyle = `rgba(255, 44, 44, ${blink})`;
    ctx.fillRect(board.x, board.y, board.t * W, board.t * H);
  }

  if (state.resetFlashUntil) {
    const remain = state.resetFlashUntil - now;
    if (remain <= 0) state.resetFlashUntil = 0;
    else {
      const p = remain / DEATH_RESET_FLASH_MS;
      ctx.fillStyle = `rgba(200, 245, 255, ${0.5 * p})`;
      ctx.fillRect(board.x, board.y, board.t * W, board.t * H);
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.95 * p})`;
      ctx.lineWidth = Math.max(2, board.t * 0.16);
      ctx.strokeRect(board.x, board.y, board.t * W, board.t * H);
    }
  }

  hudShots.textContent = `✦ ${state.shots}`;
  hudLevel.textContent = `Nivel ${currentLevelIndex + 1} ▾`;
  if (!state.won && state.hearts.size === 0 && !state.doorOpen) {
    setHudMessage('¡Pasa por el cofre abierto para abrir la puerta!');
  }
}


function spriteNameForTile(tile){
  if (tile === '#') return 'wall_left';
  if (tile === '=') return 'wall_top';
  if (tile === 'V') return 'void';
  if (tile === 'T') return 'tree';
  if (tile === 'S') return 'stone';
  if (tile === '~') return 'water';
  if (tile === 'R') return 'bridge';
  if (tile === 'B') return 'block';
  if (tile === 'H') return 'heart';
  if (tile === 'C') return 'chest';
  if (tile === 'D') return 'door';
  if (tile === 'A') return 'ardilla';
  if (tile === 'M') return 'medusa';
  if (tile === 'K') return 'rocky';
  if (tile === 'G') return 'skull';
  if (tile === 'L') return 'leeper';
  if (tile === 'N') return 'dragon_n';
  if (tile === 'U') return 'dragon_s';
  if (tile === 'E') return 'dragon_e';
  if (tile === 'O') return 'dragon_o';
  if (tile === 'P') return 'player';
  return 'floor';
}

function buildPaletteSpritePreview(tile){
  const previewSize = 16;
  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = previewSize;
  previewCanvas.height = previewSize;
  const previewCtx = previewCanvas.getContext('2d');
  if (!previewCtx) return null;
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.fillStyle = '#000';
  previewCtx.fillRect(0, 0, previewSize, previewSize);

  if (tile === 'V') return previewCanvas.toDataURL();

  const floorSprite = sprites.floor;
  if (floorSprite?.complete) {
    previewCtx.drawImage(floorSprite, 0, 0, previewSize, previewSize);
  }

  if (tile === 'A' && ARDILLA_SHEET_READY) {
    const frame = getArdillaFrameRect(getArdillaFrameIndex());
    previewCtx.drawImage(ARDILLA_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, previewSize, previewSize);
    return previewCanvas.toDataURL();
  }

  if (tile === 'K' && ROCKY_SHEET_READY) {
    const direction = ROCKY_SPRITE.directions.right ?? ROCKY_SPRITE.directions.down;
    const frame = getRockyFrameRect(direction.idle, direction.row ?? 0);
    previewCtx.save();
    if (direction.flip) {
      previewCtx.translate(previewSize, 0);
      previewCtx.scale(-1, 1);
    }
    previewCtx.drawImage(ROCKY_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, previewSize, previewSize);
    previewCtx.restore();
    return previewCanvas.toDataURL();
  }

  if (tile === 'L' && LEEPER_SHEET_READY) {
    const frame = getLeeperFrameRect(LEEPER_SPRITE.directions.down.idle);
    previewCtx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, previewSize, previewSize);
    return previewCanvas.toDataURL();
  }

  if (tile !== '.') {
    const spriteName = tile === '~' ? getWaterSpriteName(0, 0, 0) : spriteNameForTile(tile);
    const sprite = sprites[spriteName];
    if (sprite?.complete) {
      previewCtx.drawImage(sprite, 0, 0, previewSize, previewSize);
    }
  }

  return previewCanvas.toDataURL();
}

function getPaletteSpritePreview(tile){
  if (!editorPaletteSpritePreviewCache.has(tile)) {
    const preview = buildPaletteSpritePreview(tile);
    editorPaletteSpritePreviewCache.set(tile, preview);
  }
  return editorPaletteSpritePreviewCache.get(tile);
}

function getSpriteBackgroundLayer(sprite){
  if (!sprite) return '';
  if (typeof sprite.src === 'string' && sprite.src) return `url("${sprite.src}")`;
  if (typeof sprite.toDataURL === 'function') return `url("${sprite.toDataURL()}")`;
  return '';
}

function applyEditorCellVisual(cell, tile, x, y){
  const meta = TILE_META[tile] ?? TILE_META['.'];
  const floorSprite = sprites.floor;
  const sprite = sprites[spriteNameForTile(tile)] ?? floorSprite;
  cell.textContent = '';
  cell.title = `${meta.label} (${tile}) - [${x},${y}]`;
  const floorLayer = getSpriteBackgroundLayer(floorSprite);
  const spriteLayer = getSpriteBackgroundLayer(sprite);
  if (tile === 'V') {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = 'none';
  } else if (tile === '.' || !spriteLayer) {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = floorLayer || 'none';
  } else {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = `${spriteLayer}, ${floorLayer}`;
  }
}

function moveEditorTile(fromX, fromY, toX, toY){
  if (fromX === toX && fromY === toY) return;
  const tile = editorRows[fromY]?.[fromX];
  if (!tile || tile === '.') return;
  editorRows[fromY][fromX] = '.';
  editorRows[toY][toX] = tile;
  const fromCell = editorGrid.querySelector(`.editor-cell[data-x="${fromX}"][data-y="${fromY}"]`);
  const toCell = editorGrid.querySelector(`.editor-cell[data-x="${toX}"][data-y="${toY}"]`);
  if (fromCell) applyEditorCellVisual(fromCell, '.', fromX, fromY);
  if (toCell) applyEditorCellVisual(toCell, tile, toX, toY);
  editorText.value = editorToRaw(editorRows);
}

function setEditorDropTarget(x, y){
  if (editorDropTarget && editorDropTarget.x === x && editorDropTarget.y === y) return;
  if (editorDropTarget) {
    const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorDropTarget.x}"][data-y="${editorDropTarget.y}"]`);
    prev?.classList.remove('drop-target');
  }
  editorDropTarget = { x, y };
  const next = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  next?.classList.add('drop-target');
}

function clearEditorDropTarget(){
  if (!editorDropTarget) return;
  const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorDropTarget.x}"][data-y="${editorDropTarget.y}"]`);
  prev?.classList.remove('drop-target');
  editorDropTarget = null;
}

function setEditorHoverTarget(x, y){
  if (editorHoverTarget && editorHoverTarget.x === x && editorHoverTarget.y === y) return;
  if (editorHoverTarget) {
    const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorHoverTarget.x}"][data-y="${editorHoverTarget.y}"]`);
    prev?.classList.remove('hover-target');
  }
  editorHoverTarget = { x, y };
  const next = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  next?.classList.add('hover-target');
}

function clearEditorHoverTarget(){
  if (!editorHoverTarget) return;
  const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorHoverTarget.x}"][data-y="${editorHoverTarget.y}"]`);
  prev?.classList.remove('hover-target');
  editorHoverTarget = null;
}

function getEditorTileFromPointerEvent(e, clamp=false){
  const rect = editorGrid.getBoundingClientRect();
  if (!rect.width || !rect.height) return null;
  const relX = (e.clientX - rect.left) / rect.width;
  const relY = (e.clientY - rect.top) / rect.height;
  if (!clamp && (relX < 0 || relX > 1 || relY < 0 || relY > 1)) return null;
  const x = clamp
    ? Math.max(0, Math.min(W - 1, Math.floor(relX * W)))
    : Math.floor(relX * W);
  const y = clamp
    ? Math.max(0, Math.min(H - 1, Math.floor(relY * H)))
    : Math.floor(relY * H);
  return { x, y };
}

function getEditorTileFromClientPoint(clientX, clientY, clamp=false){
  return getEditorTileFromPointerEvent({ clientX, clientY }, clamp);
}

function frame(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  acc += dt;
  moveAcc += dt;
  if (activeKeyboardDirKey && !state.won && !state.deadUntil && !isPlayerFrozen() && !isEditorOpen) {
    let repeatDt = dt;
    if (keyboardRepeatDelayMs > 0) {
      keyboardRepeatDelayMs -= dt;
      repeatDt = keyboardRepeatDelayMs < 0 ? -keyboardRepeatDelayMs : 0;
    }
    keyboardHoldAcc += repeatDt;
    const movement = KEY_DIRECTIONS[activeKeyboardDirKey];
    while (movement && keyboardHoldAcc >= KEYBOARD_HALF_STEP_INTERVAL) {
      const [dx, dy] = movement;
      const stepped = performKeyboardHalfStep(dx, dy);
      keyboardHoldAcc -= KEYBOARD_HALF_STEP_INTERVAL;
      if (!stepped) {
        keyboardHoldAcc = 0;
        break;
      }
    }
  }
  while (queuedMoves.length) {
    const nextMove = queuedMoves[0];
    if (typeof nextMove.readyAt === 'number') {
      if (ts < nextMove.readyAt) break;
      const processed = processQueuedMove();
      if (!processed) break;
      continue;
    }
    const intervalMs = nextMove.intervalMs ?? MOVE_INTERVAL;
    if (moveAcc < intervalMs) break;
    const processed = processQueuedMove();
    if (!processed) break;
    moveAcc -= intervalMs;
  }
  while (acc >= TICK) {
    tick();
    acc -= TICK;
  }
  draw();
  requestAnimationFrame(frame);
}

function setEditorStatus(message, isError=false) {
  console[isError ? 'warn' : 'info'](`[Editor] ${message}`);
}

function editorToRaw(rows){
  return rows.map(r => r.join('')).join('\n');
}

function validateEditorRows(rows){
  const players = rows.flat().filter(ch => ch === 'P').length;
  const chests = rows.flat().filter(ch => ch === 'C').length;
  if (players !== 1) throw new Error('Debe existir exactamente 1 jugador (P).');
  if (chests > 1) throw new Error('Solo puede haber 1 cofre (C).');
}

function paintEditorCell(x, y){
  if (!editorTile) return;
  if (!editorRows[y] || !editorRows[y][x]) return;
  if (editorRows[y][x] === editorTile) return;
  editorRows[y][x] = editorTile;
  const cell = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  if (cell) applyEditorCellVisual(cell, editorTile, x, y);
  editorText.value = editorToRaw(editorRows);
}

function paintEditorFromPointerEvent(e){
  const tilePos = getEditorTileFromPointerEvent(e);
  if (!tilePos) return;
  const { x, y } = tilePos;
  if (editorDrag && editorMouseDown && (x !== editorDrag.fromX || y !== editorDrag.fromY) && editorDrag.tile !== '.') {
    editorDrag.moved = true;
  }
  if (editorDrag?.isMove) return;
  paintEditorCell(x, y);
}

function renderEditorGrid(){
  editorGrid.innerHTML = '';
  editorGrid.style.gridTemplateColumns = `repeat(${W}, var(--editor-cell-size))`;
  editorGrid.style.width = 'max-content';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const tile = editorRows[y][x];
      const cell = document.createElement('button');
      cell.className = 'editor-cell';
      cell.type = 'button';
      cell.dataset.x = String(x);
      cell.dataset.y = String(y);
      applyEditorCellVisual(cell, tile, x, y);
      cell.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        editorMouseDown = true;
        editorActivePointerId = e.pointerId;
        const sourceTile = editorRows[y][x];
        const canMoveTile = sourceTile !== '.' && (!editorTile || sourceTile === editorTile);
        editorDrag = { fromX: x, fromY: y, moved: false, tile: sourceTile, isMove: canMoveTile };
        editorGrid.setPointerCapture(e.pointerId);
        if (editorDrag.isMove) setEditorDropTarget(x, y);
        if (!editorDrag.isMove) paintEditorCell(x, y);
      });
      editorGrid.appendChild(cell);
    }
  }
  clearEditorDropTarget();
  clearEditorHoverTarget();
  editorText.value = editorToRaw(editorRows);
}

editorGrid.addEventListener('pointermove', (e) => {
  if (!editorMouseDown && editorTile) {
    const hoverTile = getEditorTileFromPointerEvent(e);
    if (hoverTile) setEditorHoverTarget(hoverTile.x, hoverTile.y);
    else clearEditorHoverTarget();
  }
  if (!editorMouseDown) return;
  if (e.pointerId !== editorActivePointerId) return;
  if ((e.buttons & 1) !== 1) return;
  if (editorDrag?.isMove) {
    const target = getEditorTileFromPointerEvent(e);
    if (target) setEditorDropTarget(target.x, target.y);
    else clearEditorDropTarget();
  }
  paintEditorFromPointerEvent(e);
});

editorGrid.addEventListener('pointerleave', () => {
  clearEditorHoverTarget();
});

function refreshEditorVisualsIfVisible(){
  if (!isEditorOpen) return;
  renderEditorGrid();
  renderPalette();
}

function renderPalette(){
  paletteGrid.innerHTML = '';
  editorPaletteSpritePreviewCache.clear();
  for (const tile of PALETTE_ORDER) {
    const meta = TILE_META[tile];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `palette-tile ${tile === editorTile ? 'active' : ''}`;
    const preview = getPaletteSpritePreview(tile);
    btn.style.backgroundColor = '#000';
    btn.style.backgroundImage = preview ? `url("${preview}")` : 'none';
    btn.title = `${meta.label} (${tile})`;
    btn.setAttribute('aria-label', `${meta.label} (${tile})`);
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      editorPaletteDrag = {
        pointerId: e.pointerId,
        tile,
        moved: false,
        startX: e.clientX,
        startY: e.clientY,
      };
      paletteGrid.setPointerCapture?.(e.pointerId);
    });
    paletteGrid.appendChild(btn);
  }
}

function loadEditorFromRaw(raw){
  const rows = parseLevelRows(raw).map(r => r.split(''));
  if (rows.length !== H || rows[0].length !== W) {
    throw new Error(`La pantalla debe mantener tamaño ${W}x${H}.`);
  }
  validateEditorRows(rows);
  editorRows = rows;
  renderEditorGrid();
}

function openEditor(){
  clearKeyboardInput();
  isEditorOpen = true;
  editorView.classList.add('visible');
  editorView.setAttribute('aria-hidden', 'false');
  loadEditorFromRaw(currentLevelRaw);
  editorTile = null;
  renderPalette();
  setEditorStatus('Editor abierto. Ninguna pieza seleccionada. Arrastra una pieza del tablero para moverla o elige una en la paleta.');
}

function closeEditor(){
  clearKeyboardInput();
  isEditorOpen = false;
  editorView.classList.remove('visible');
  editorView.setAttribute('aria-hidden', 'true');
  editorMouseDown = false;
  editorActivePointerId = null;
  editorDrag = null;
  editorPaletteDrag = null;
  clearEditorDropTarget();
  clearEditorHoverTarget();
}

function startLevel(){
  LEVEL = parseLevelRows(currentLevelRaw);
  const p = parseLevel();
  state.base = p.base;
  state.player = p.player;
  state.chest = p.chest;
  state.door = p.door;
  state.hearts = p.hearts;
  state.blocks = p.blocks;
  state.eggs = new Set();
  state.eggTimers = new Map();
  state.filledWater = p.filledWater;
  state.enemies = p.enemies;
  state.won = false;
  state.doorOpen = false;
  state.shots = 0;
  state.deadUntil = 0;
  state.frozenUntil = 0;
  state.medusaShot = null;
  state.fireballs = [];
  state.resetFlashUntil = 0;
  state.keyCollected = false;
  state.explosions = [];
  state.undo = [];
  queuedMoves = [];
  keyboardOffset = { x: 0, y: 0 };
  clearKeyboardInput();
  clearPlayerAnimation();
  dragPath = [];
  activePointerId = null;
  setHudMessage('');
  state.initialSnapshot = snapshot();
}

function resetLevel({ fromDeath = false } = {}){
  restore(state.initialSnapshot);
  state.undo = [];
  queuedMoves = [];
  keyboardOffset = { x: 0, y: 0 };
  clearKeyboardInput();
  clearPlayerAnimation();
  dragPath = [];
  activePointerId = null;
  state.explosions = [];
  if (fromDeath) state.resetFlashUntil = performance.now() + DEATH_RESET_FLASH_MS;
  setHudMessage('');
}

document.getElementById('undoBtn').onclick = () => {
  if (!state.undo.length || state.won) return;
  queuedMoves = [];
  clearPathInput();
  clearKeyboardInput();
  keyboardOffset = { x: 0, y: 0 };
  restore(state.undo.pop());
};
document.getElementById('resetBtn').onclick = () => resetLevel();
document.getElementById('editBtn').onclick = () => openEditor();

[moveUpBtn, moveDownBtn, moveLeftBtn, moveRightBtn].forEach((button) => {
  if (button) button.style.touchAction = 'none';
});

directionalControls?.addEventListener('pointerdown', (e) => {
  const button = e.target.closest('.dir-btn');
  e.preventDefault();
  directionalControls.setPointerCapture(e.pointerId);
  directionalPointerStart = { x: e.clientX, y: e.clientY };
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  if (button) {
    clearDirectionalFocus();
    triggerDirectionalButton(button);
    setDirectionalHold(button, e.pointerId);
    directionalPointerTriggered = true;
    return;
  }
  activeDirectionalPointerId = e.pointerId;
  activeDirectionalButton = null;
  clearInterval(directionalHoldInterval);
  directionalHoldInterval = null;
});

directionalControls?.addEventListener('pointermove', (e) => {
  if (activeDirectionalPointerId !== e.pointerId) return;
  const buttonFromTouch = getDirectionalButtonFromPoint(e.clientX, e.clientY);
  const pointerDx = e.clientX - (directionalPointerStart?.x ?? e.clientX);
  const pointerDy = e.clientY - (directionalPointerStart?.y ?? e.clientY);
  if (Math.abs(pointerDx) >= 8 || Math.abs(pointerDy) >= 8) directionalPointerMoved = true;
  const button = buttonFromTouch ?? getDirectionalButtonFromDelta(pointerDx, pointerDy);
  if (!button || button === activeDirectionalButton) return;
  triggerDirectionalButton(button);
  setDirectionalHold(button, e.pointerId);
  directionalPointerTriggered = true;
});

directionalControls?.addEventListener('pointerup', (e) => {
  if (activeDirectionalPointerId !== e.pointerId) return;
  if (!directionalPointerTriggered && !directionalPointerMoved) {
    const fallbackButton = getDirectionalButtonFromControlCenter(e.clientX, e.clientY);
    triggerDirectionalButton(fallbackButton);
  }
  directionalPointerStart = null;
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  clearDirectionalFocus();
  clearDirectionalHold();
});

directionalControls?.addEventListener('pointercancel', (e) => {
  if (activeDirectionalPointerId !== e.pointerId) return;
  directionalPointerStart = null;
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  clearDirectionalFocus();
  clearDirectionalHold();
});


function releaseEditorPointer(e){
  if (editorActivePointerId === null) return;
  if (e && e.pointerId !== editorActivePointerId) return;
  if (editorDrag && editorDrag.isMove && editorDrag.moved && e) {
    const target = getEditorTileFromPointerEvent(e, true);
    if (target) moveEditorTile(editorDrag.fromX, editorDrag.fromY, target.x, target.y);
  }
  editorMouseDown = false;
  editorActivePointerId = null;
  editorDrag = null;
  clearEditorDropTarget();
  clearEditorHoverTarget();
}

function releaseEditorPalettePointer(e){
  if (!editorPaletteDrag) return;
  if (e.pointerId !== editorPaletteDrag.pointerId) return;
  const { tile, moved } = editorPaletteDrag;
  const target = getEditorTileFromClientPoint(e.clientX, e.clientY);
  if (!moved) {
    if (editorTile === tile) {
      editorTile = null;
      clearEditorHoverTarget();
      setEditorStatus('Ninguna pieza seleccionada. Arrastra una pieza del tablero para moverla.');
    } else {
      editorTile = tile;
      const meta = TILE_META[tile] ?? { label: tile };
      setEditorStatus(`Pieza activa: ${meta.label} (${tile}).`);
    }
    renderPalette();
  } else if (target) {
    if (editorTile !== tile) {
      editorTile = tile;
      renderPalette();
    }
    paintEditorCell(target.x, target.y);
  }
  if (paletteGrid.hasPointerCapture?.(e.pointerId)) {
    paletteGrid.releasePointerCapture(e.pointerId);
  }
  editorPaletteDrag = null;
  clearEditorHoverTarget();
}

document.addEventListener('pointerup', releaseEditorPointer);
document.addEventListener('pointercancel', releaseEditorPointer);

document.addEventListener('pointermove', (e) => {
  if (!editorPaletteDrag || e.pointerId !== editorPaletteDrag.pointerId) return;
  if ((e.buttons & 1) !== 1) return;
  const moveX = Math.abs(e.clientX - editorPaletteDrag.startX);
  const moveY = Math.abs(e.clientY - editorPaletteDrag.startY);
  if (moveX > 4 || moveY > 4) editorPaletteDrag.moved = true;
  const target = getEditorTileFromClientPoint(e.clientX, e.clientY);
  if (!target) {
    clearEditorHoverTarget();
    return;
  }
  setEditorHoverTarget(target.x, target.y);
});

document.addEventListener('pointerup', releaseEditorPalettePointer);
document.addEventListener('pointercancel', releaseEditorPalettePointer);

document.getElementById('editorBackBtn').onclick = () => closeEditor();
document.getElementById('editorSaveBtn').onclick = () => {
  try {
    validateEditorRows(editorRows);
    currentLevelRaw = editorToRaw(editorRows);
    startLevel();
    resize();
    closeEditor();
  } catch (err) {
    setEditorStatus(`No se pudo guardar: ${err.message}`, true);
  }
};

document.getElementById('editorImportBtn').onclick = () => {
  try {
    loadEditorFromRaw(editorText.value);
    setEditorStatus('Pantalla importada correctamente. Revisa y guarda para aplicarla.');
  } catch (err) {
    setEditorStatus(`Importación inválida: ${err.message}`, true);
  }
};

document.getElementById('editorClearBtn').onclick = () => {
  editorRows = editorRows.map(row => row.map(() => '.'));
  renderEditorGrid();
  setEditorStatus('Pantalla vaciada. Coloca al menos 1 jugador (P) antes de guardar.');
};


function renderLevelDropdown(){
  levelDropdown.innerHTML = '';
  LEVELS_RAW.forEach((_, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'level-option';
    btn.textContent = `Nivel ${idx + 1}`;
    btn.onclick = () => {
      currentLevelIndex = idx;
      currentLevelRaw = LEVELS_RAW[currentLevelIndex];
      startLevel();
      resize();
      levelDropdown.classList.remove('visible');
      levelDropdown.setAttribute('aria-hidden', 'true');
    };
    levelDropdown.appendChild(btn);
  });
}

hudLevel.addEventListener('click', (e) => {
  e.stopPropagation();
  const willShow = !levelDropdown.classList.contains('visible');
  levelDropdown.classList.toggle('visible', willShow);
  levelDropdown.setAttribute('aria-hidden', willShow ? 'false' : 'true');
});

document.addEventListener('pointerdown', (e) => {
  if (e.target === hudLevel || levelDropdown.contains(e.target)) return;
  levelDropdown.classList.remove('visible');
  levelDropdown.setAttribute('aria-hidden', 'true');
});

startLevel();
renderLevelDropdown();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
