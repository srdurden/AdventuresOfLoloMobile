<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Lolo Touch - Retro Edition</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #boardWrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas { 
      width: 100%; 
      height: 100%; 
      display: block; 
      touch-action: none; 
      image-rendering: pixelated; 
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      flex-wrap: wrap;
    }
    .pill {
      background: #000;
      border: 2px solid #666;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px #000;
    }
    #controls {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      border: 2px solid #fff;
      min-height: 46px;
      font-size: 16px;
      color: #fff;
      background: #000;
      font-weight: bold;
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 2px 2px 0px #000;
      cursor: pointer;
    }
    #controls button {
      min-height: 38px;
      font-size: 13px;
      padding: 4px;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
      background: #333;
    }

    #editorView {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #050505;
      color: #fff;
      display: none;
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px);
      overflow: auto;
    }
    #editorView.visible {
      display: block;
    }
    .editor-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .editor-actions button {
      min-height: 42px;
      font-size: 13px;
    }
    #editorStatus {
      margin: 0 0 10px;
      font-size: 14px;
      border: 1px dashed #666;
      padding: 6px;
      min-height: 34px;
    }
    .editor-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .editor-card {
      border: 2px solid #666;
      padding: 8px;
      background: #111;
    }
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(62px, 1fr));
      gap: 6px;
    }
    .palette-tile.active {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    #editorGrid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 1px;
      background: #333;
      border: 2px solid #666;
      touch-action: none;
    }
    .editor-cell {
      border: 0;
      min-height: 20px;
      height: 20px;
      box-shadow: none;
      font-size: 11px;
      font-weight: bold;
      text-transform: none;
      padding: 0;
    }
    .editor-cell:active {
      transform: none;
      box-shadow: none;
    }
    #editorText {
      width: 100%;
      min-height: 150px;
      background: #000;
      color: #fff;
      border: 2px solid #666;
      font-family: inherit;
      padding: 8px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="boardWrap">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">
        <div class="pill">Nivel 1</div>
        <div class="pill" id="hudHearts">❤ 0</div>
        <div class="pill" id="hudShots">✦ 0</div>
      </div>
    </div>
    <div id="controls">
      <button id="undoBtn">Deshacer</button>
      <button id="resetBtn">Reiniciar</button>
      <button id="editBtn">Editar pantalla</button>
    </div>

    <div id="editorView" aria-hidden="true">
      <div class="editor-actions">
        <button id="editorBackBtn">Volver al juego</button>
        <button id="editorSaveBtn">Guardar pantalla</button>
        <button id="editorExportBtn">Exportar pantalla</button>
        <button id="editorImportBtn">Importar pantalla</button>
        <button id="editorClearBtn">Borrar todo</button>
      </div>
      <p id="editorStatus">Editor listo. Elige una pieza y toca la cuadrícula para pintar.</p>
      <div class="editor-layout">
        <section class="editor-card">
          <h3>Paleta de piezas</h3>
          <div id="paletteGrid" class="palette-grid"></div>
        </section>
        <section class="editor-card">
          <h3>Diseño de pantalla</h3>
          <div id="editorGrid"></div>
        </section>
        <section class="editor-card">
          <h3>Cadena de texto de la pantalla</h3>
          <p>Puedes exportar para copiarla o importar pegando aquí una nueva pantalla (20x20).</p>
          <textarea id="editorText" spellcheck="false"></textarea>
        </section>
      </div>
    </div>
  </div>

<script>
// Mapa actualizado: Retirada la Medusa y añadida la Ardilla (A) en el centro.
const DEFAULT_LEVEL_RAW = `##############
#......T.....#
#......T.....#
#......T.....#
#......T.....#
#......T.....#
#......T.....#
#......T.....#
#......T.....#
#..P.H.A.H.C.#

##############`;

const ALLOWED = new Set(['#','.','P','H','C','B','~','A','T','S']);
function parseLevelRows(raw) {
  const rows = raw.trim().split('\n').map(r => r.trim());
  const h = rows.length;
  const w = rows[0]?.length ?? 0;
  if (!h || !w) throw new Error('Nivel inválido: vacío.');
  for (const row of rows) {
    if (row.length !== w) throw new Error('Nivel inválido: ancho inconsistente.');
    for (const ch of row) if (!ALLOWED.has(ch)) throw new Error('Tile inválido: ' + ch);
  }
  return rows;
}

let currentLevelRaw = DEFAULT_LEVEL_RAW;
let LEVEL = parseLevelRows(currentLevelRaw);
const H = LEVEL.length;
const W = LEVEL[0].length;

document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const hudShots = document.getElementById('hudShots');
const editorView = document.getElementById('editorView');
const editorGrid = document.getElementById('editorGrid');
const paletteGrid = document.getElementById('paletteGrid');
const editorText = document.getElementById('editorText');
const editorStatus = document.getElementById('editorStatus');
const setHudMessage = () => {};

const MAX_UNDO = 200;
const TICK = 100;
const MOVE_INTERVAL = 75;
let lastTs = 0;
let acc = 0;
let moveAcc = 0;
let board = { x: 0, y: 0, t: 20 };
let activePointerId = null;
let dragPath = [];
let queuedMoves = [];
let queuedSnapshot = null;
let queuedMoved = false;
let isEditorOpen = false;

const TILE_META = {

  'T': { label: 'Árbol', color: '#0c6515', text: '#fff' },
  'S': { label: 'Piedra', color: '#8a8a8a', text: '#111' },
};
const PALETTE_ORDER = ['.','#','T','S','~','B','H','C','A','P'];
let editorTile = 'P';
let editorRows = LEVEL.map(r => r.split(''));
let editorMouseDown = false;
let editorActivePointerId = null;

const state = {
  base: null,
  player: null,
  chest: null,
  door: null,
  hearts: new Set(),
  blocks: new Set(),
  filledWater: new Set(),
  enemies: [],
  eggs: new Set(),
  won: false,
  shots: 0,
  deadUntil: 0,
  undo: [],

// --- MOTOR DE SPRITES PIXEL ART 16x16 ---

    heart: ['#000000', '#F83800', '#FFFFFF', 'transparent'],
    chest: ['transparent', '#000000', '#F83800', '#FFFFFF', '#880000'],
    chest_open: ['transparent', '#000000', '#F83800', '#FFFFFF', '#880000'],
    ardilla: ['transparent', '#000000', '#00A800', '#F83800', '#FFFFFF'],

initSprites();
// ----------------------------------------

function key(x,y){ return `${x},${y}`; }
function has(set,x,y){ return set.has(key(x,y)); }
function setFromArr(arr){ return new Set(arr.map(p => key(p.x,p.y))); }
function arrFromSet(set){ return [...set].map(s=>{ const [x,y] = s.split(',').map(Number); return {x,y}; }); }
function inBounds(x,y){ return x>=0 && y>=0 && x<W && y<H; }
function chestOpen(){ return state.hearts.size === 0; }
function enemyAt(x,y){ return state.enemies.find(e => e.x===x && e.y===y); }

function parseLevel(){
  const base = Array.from({ length:H }, () => Array(W).fill('.'));
  const hearts = [];
  const blocks = [];
  const enemies = [];
  let player = null;
  let chest = null;
  let door = null;

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const ch = LEVEL[y][x];
    if ('#.~TCDS'.includes(ch)) base[y][x] = ch;
    if (ch === 'P') player = { x, y, facing:[1,0] };
    if (ch === 'H') hearts.push({ x, y });
    if (ch === 'A') enemies.push({ type:'ardilla', x, y, charge:0 });
    if (ch === 'B') blocks.push({ x, y });
    if (ch === 'C') chest = { x, y };
    if (ch === 'D') door = { x, y };
  }
  return { base, player, chest, door, hearts:setFromArr(hearts), blocks:setFromArr(blocks), filledWater:new Set(), enemies };
}

function snapshot(){
  return {
    player: { ...state.player },
    hearts: arrFromSet(state.hearts),
    shots: state.shots,
    blocks: arrFromSet(state.blocks),
    eggs: arrFromSet(state.eggs),
    filledWater: arrFromSet(state.filledWater),
    enemies: state.enemies.map(e => ({ ...e })),
  };
}

function restore(s){
  state.player = { ...s.player };
  state.hearts = setFromArr(s.hearts);
  state.shots = s.shots ?? 0;
  state.blocks = setFromArr(s.blocks);
  state.eggs = setFromArr(s.eggs);
  state.filledWater = setFromArr(s.filledWater);
  state.enemies = s.enemies.map(e => ({ ...e }));
  state.won = false;
  state.deadUntil = 0;
}

function pushUndo(){
  state.undo.push(snapshot());
  if (state.undo.length > MAX_UNDO) state.undo.shift();
}

function passableForPlayer(x,y,ignorePushables=false){
  if (!inBounds(x,y)) return false;
  if (!ignorePushables && (has(state.blocks,x,y) || has(state.eggs,x,y))) return false;
  const b = state.base[y][x];
  if (b === '#' || b === 'T' || b === 'S') return false;
  if (b === '~' && !has(state.filledWater,x,y)) return false;
  if (b === 'C' && !chestOpen()) return false;
  return !enemyAt(x,y);
}

function killPlayer(){
  if (state.deadUntil || state.won) return;
  state.deadUntil = performance.now() + 350;
  navigator.vibrate?.(40);
}

function winLevel(){
  state.won = true;
  setHudMessage('¡Completado!');
  navigator.vibrate?.([30,30,60]);
}

function attemptPush(setRef, fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  if (t === '#' || t === 'T' || t === 'C' || t === 'D' || t === 'S') return false;
  setRef.delete(key(fromX,fromY));
  if (t === '~' && !has(state.filledWater,nx,ny)) state.filledWater.add(key(nx,ny));
  else setRef.add(key(nx,ny));
  return true;
}

function tryMovePlayer(dx,dy){
  const tx = state.player.x + dx;
  const ty = state.player.y + dy;
  if (!inBounds(tx,ty)) return false;
  state.player.facing = [dx,dy];

  if (enemyAt(tx,ty)) return killPlayer(), false;

  if (has(state.blocks,tx,ty)) {
    if (!attemptPush(state.blocks, tx, ty, dx, dy)) return false;
  } else if (has(state.eggs,tx,ty)) {
    if (!attemptPush(state.eggs, tx, ty, dx, dy)) return false;
  } else if (!passableForPlayer(tx,ty,true)) {
    return false;
  }

  state.player.x = tx;
  state.player.y = ty;
  const heartKey = key(tx,ty);
  if (state.hearts.has(heartKey)) {
    state.hearts.delete(heartKey);
    state.shots += 1;
    setHudMessage('¡Ganaste 1 disparo!');
  }
  if (chestOpen() && state.chest && tx === state.chest.x && ty === state.chest.y) return winLevel(), true;
  return true;
}

function shoot(){
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  const [dx,dy] = state.player.facing;
  if (!dx && !dy) return false;
  const x = state.player.x + dx;
  const y = state.player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit) {
    state.enemies = state.enemies.filter(v => v !== hit);
    state.eggs.add(key(x,y));
    state.shots -= 1;
    setHudMessage('¡Enemigo convertido en huevo!');
    navigator.vibrate?.(20);
    return true;
  }
  setHudMessage('Acércate a un enemigo para disparar');
  return false;
}

function tapToTile(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - board.x) / board.t;
  const y = (clientY - rect.top - board.y) / board.t;
  return {
    x: Math.max(0, Math.min(W-1, Math.round(x - 0.5))),
    y: Math.max(0, Math.min(H-1, Math.round(y - 0.5))),
  };
}

function canDragThrough(x,y){
  if (x === state.player.x && y === state.player.y) return true;
  return passableForPlayer(x,y,true);
}

function appendStepToPath(path, tile){
  const last = path[path.length - 1];
  if (!last) {
    path.push(tile);
    return;
  }
  if (last.x === tile.x && last.y === tile.y) return;

  let cx = last.x;
  let cy = last.y;
  while (cx !== tile.x || cy !== tile.y) {
    const dx = tile.x - cx;
    const dy = tile.y - cy;

    const horizontalFirst = Math.abs(dx) >= Math.abs(dy);
    const candidates = [];
    if (horizontalFirst) {
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
    } else {
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
    }

    const next = candidates.find(c => canDragThrough(c.x, c.y));
    if (!next) break;

    cx = next.x;
    cy = next.y;
    if (path[path.length - 1].x !== cx || path[path.length - 1].y !== cy) path.push({ x: cx, y: cy });
  }
}

function clearPathInput(){
  activePointerId = null;
  dragPath = [];
}

function queueDraggedPath(){
  if (dragPath.length < 2) return;
  const steps = [];
  for (let i = 1; i < dragPath.length; i++) {
    const prev = dragPath[i - 1];
    const next = dragPath[i];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    if (Math.abs(dx) + Math.abs(dy) !== 1) continue;
    steps.push([dx, dy]);
  }
  if (!steps.length) return;
  queuedMoves = steps;
  queuedSnapshot = snapshot();
  queuedMoved = false;
  moveAcc = MOVE_INTERVAL;
}

function processQueuedMove(){
  if (!queuedMoves.length || state.won || state.deadUntil) return;
  if (!queuedSnapshot) {
    queuedMoves = [];
    return;
  }
  if (!queuedMoved) state.undo.push(queuedSnapshot);
  const [dx,dy] = queuedMoves.shift();
  if (!tryMovePlayer(dx,dy)) {
    if (!queuedMoved && state.undo[state.undo.length - 1] === queuedSnapshot) state.undo.pop();
    queuedMoves = [];
    queuedSnapshot = null;
    queuedMoved = false;
    return;
  }
  queuedMoved = true;
  if (!queuedMoves.length) queuedSnapshot = null;
}

canvas.addEventListener('pointerdown', e => {
  if (state.won || isEditorOpen) return;
  const t = tapToTile(e.clientX, e.clientY);
  if (t.x === state.player.x && t.y === state.player.y) {
    activePointerId = e.pointerId;
    queuedMoves = [];
    queuedSnapshot = null;
    queuedMoved = false;
    dragPath = [{ x: state.player.x, y: state.player.y }];
    canvas.setPointerCapture(e.pointerId);
    return;
  }

  const dx = t.x - state.player.x;
  const dy = t.y - state.player.y;
  if (Math.abs(dx) + Math.abs(dy) === 1) {
    pushUndo();
    if (!tryMovePlayer(Math.sign(dx), Math.sign(dy))) state.undo.pop();
    return;
  }
  if (dx === 0 || dy === 0) {
    state.player.facing = [Math.sign(dx), Math.sign(dy)];
    pushUndo();
    if (!shoot()) state.undo.pop();
  }
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointerId || !dragPath.length) return;
  const tile = tapToTile(e.clientX, e.clientY);
  appendStepToPath(dragPath, tile);
});

function handlePointerEnd(e){
  if (e.pointerId !== activePointerId) return;
  queueDraggedPath();
  clearPathInput();
}

canvas.addEventListener('pointerup', handlePointerEnd);
canvas.addEventListener('pointercancel', handlePointerEnd);

function blockedForMedusaShot(x,y){
  const b = state.base[y][x];
  return b === '#' || b === 'C' || b === 'D' || has(state.blocks,x,y) || has(state.eggs,x,y);
}

function tick(){
  if (state.deadUntil && performance.now() >= state.deadUntil) return resetLevel();
  if (state.won) return;

  for (const e of state.enemies) {
    if (e.type !== 'medusa') continue; // ardilla is passive, no lasers
    const aligned = e.x === state.player.x || e.y === state.player.y;
    let clear = false;
    if (aligned) {
      clear = true;
      if (e.x === state.player.x) {
        const [a,b] = [e.y,state.player.y].sort((m,n)=>m-n);
        for (let y=a+1; y<b; y++) if (blockedForMedusaShot(e.x,y)) clear = false;
      } else {
        const [a,b] = [e.x,state.player.x].sort((m,n)=>m-n);
        for (let x=a+1; x<b; x++) if (blockedForMedusaShot(x,e.y)) clear = false;
      }
    }
    e.charge = clear ? e.charge + TICK : 0;
    if (e.charge > 400) return killPlayer();
  }
}

function resize(){
  const r = boardWrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = r.width;
  const h = r.height;
  board.t = Math.max(12, Math.floor(Math.min((w - 4) / W, (h - 4) / H)));
  board.x = Math.floor((w - W * board.t) / 2);
  board.y = Math.floor((h - H * board.t) / 2);
}
window.addEventListener('resize', resize);

function drawSprite(name, x, y){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
  } else { 
    ctx.fillStyle = '#000'; 
    ctx.fillRect(px,py,board.t,board.t); 
  }
}

function draw(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  // Capa 0: Suelo en todas partes
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      drawSprite('floor', x, y);
    }
  }

  // Capa 1: Elementos base
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      const b = state.base[y][x];
      if (b === '#') drawSprite('wall',x,y);
      else if (b === '~' && !has(state.filledWater,x,y)) drawSprite('water',x,y);
      else if (b === 'T') drawSprite('tree',x,y);
      else if (b === 'S') drawSprite('stone',x,y);
      else if (b === 'C') drawSprite(chestOpen() ? 'chest_open' : 'chest',x,y);
      else if (b === 'D') drawSprite('door',x,y);
    }
  }

  // Capa 2: Elementos interactivos
  for (const b of arrFromSet(state.blocks)) drawSprite('block',b.x,b.y);
  for (const hrt of arrFromSet(state.hearts)) drawSprite('heart',hrt.x,hrt.y);
  for (const egg of arrFromSet(state.eggs)) drawSprite('egg',egg.x,egg.y);
  for (const e of state.enemies) drawSprite(e.type, e.x, e.y);

  if (dragPath.length > 1) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = Math.max(2, board.t * 0.2);
    ctx.lineCap = 'square';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < dragPath.length; i++) {
      const p = dragPath[i];
      const cx = board.x + (p.x + 0.5) * board.t;
      const cy = board.y + (p.y + 0.5) * board.t;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  drawSprite('player',state.player.x,state.player.y);

  hudHearts.textContent = `❤ ${state.hearts.size}`;
  hudShots.textContent = `✦ ${state.shots}`;
  if (!state.won && state.hearts.size === 0) setHudMessage('¡Abre el cofre para terminar!');
}

function frame(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  acc += dt;
  moveAcc += dt;
  while (moveAcc >= MOVE_INTERVAL) {
    processQueuedMove();
    moveAcc -= MOVE_INTERVAL;
  }
  while (acc >= TICK) {
    tick();
    acc -= TICK;
  }
  draw();
  requestAnimationFrame(frame);
}

function setEditorStatus(message, isError=false) {
  editorStatus.textContent = message;
  editorStatus.style.borderColor = isError ? '#d33' : '#666';
  editorStatus.style.color = isError ? '#ff9f9f' : '#fff';
}

function editorToRaw(rows){
  return rows.map(r => r.join('')).join('\n');
}

function validateEditorRows(rows){
  const players = rows.flat().filter(ch => ch === 'P').length;
  const chests = rows.flat().filter(ch => ch === 'C').length;
  if (players !== 1) throw new Error('Debe existir exactamente 1 jugador (P).');
  if (chests > 1) throw new Error('Solo puede haber 1 cofre (C).');
}

function paintEditorCell(x, y){
  if (!editorRows[y] || !editorRows[y][x]) return;
  if (editorRows[y][x] === editorTile) return;
  editorRows[y][x] = editorTile;
  const cell = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  if (cell) {
    const meta = TILE_META[editorTile] ?? TILE_META['.'];
    cell.textContent = editorTile;
    cell.title = `${meta.label} (${editorTile}) - [${x},${y}]`;
    cell.style.background = meta.color;
    cell.style.color = meta.text;
  }
  editorText.value = editorToRaw(editorRows);
}

function paintEditorFromPointerEvent(e){
  const rect = editorGrid.getBoundingClientRect();
  if (!rect.width || !rect.height) return;
  const relX = (e.clientX - rect.left) / rect.width;
  const relY = (e.clientY - rect.top) / rect.height;
  if (relX < 0 || relX > 1 || relY < 0 || relY > 1) return;
  const x = Math.max(0, Math.min(W - 1, Math.floor(relX * W)));
  const y = Math.max(0, Math.min(H - 1, Math.floor(relY * H)));
  paintEditorCell(x, y);
}

function renderEditorGrid(){
  editorGrid.innerHTML = '';
  editorGrid.style.gridTemplateColumns = `repeat(${W}, 1fr)`;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const tile = editorRows[y][x];
      const cell = document.createElement('button');
      const meta = TILE_META[tile] ?? TILE_META['.'];
      cell.className = 'editor-cell';
      cell.type = 'button';
      cell.dataset.x = String(x);
      cell.dataset.y = String(y);
      cell.textContent = tile;
      cell.title = `${meta.label} (${tile}) - [${x},${y}]`;
      cell.style.background = meta.color;
      cell.style.color = meta.text;
      cell.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        editorMouseDown = true;
        editorActivePointerId = e.pointerId;
        editorGrid.setPointerCapture(e.pointerId);
        paintEditorFromPointerEvent(e);
      });
      editorGrid.appendChild(cell);
    }
  }
  editorText.value = editorToRaw(editorRows);
}

editorGrid.addEventListener('pointermove', (e) => {
  if (!editorMouseDown) return;
  if (e.pointerId !== editorActivePointerId) return;
  if ((e.buttons & 1) !== 1) return;
  paintEditorFromPointerEvent(e);
});

function renderPalette(){
  paletteGrid.innerHTML = '';
  for (const tile of PALETTE_ORDER) {
    const meta = TILE_META[tile];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `palette-tile ${tile === editorTile ? 'active' : ''}`;
    btn.textContent = `${tile} ${meta.label}`;
    btn.style.background = meta.color;
    btn.style.color = meta.text;
    btn.onclick = () => {
      editorTile = tile;
      renderPalette();
      setEditorStatus(`Pieza activa: ${meta.label} (${tile}).`);
    };
    paletteGrid.appendChild(btn);
  }
}

function loadEditorFromRaw(raw){
  const rows = parseLevelRows(raw).map(r => r.split(''));
  if (rows.length !== H || rows[0].length !== W) {
    throw new Error(`La pantalla debe mantener tamaño ${W}x${H}.`);
  }
  validateEditorRows(rows);
  editorRows = rows;
  renderEditorGrid();
}

function openEditor(){
  isEditorOpen = true;
  editorView.classList.add('visible');
  editorView.setAttribute('aria-hidden', 'false');
  loadEditorFromRaw(currentLevelRaw);
  renderPalette();
  setEditorStatus('Editor abierto. Arrastra el dedo para pintar rápido.');
}

function closeEditor(){
  isEditorOpen = false;
  editorView.classList.remove('visible');
  editorView.setAttribute('aria-hidden', 'true');
  editorMouseDown = false;
  editorActivePointerId = null;
}

function startLevel(){
  LEVEL = parseLevelRows(currentLevelRaw);
  const p = parseLevel();
  state.base = p.base;
  state.player = p.player;
  state.chest = p.chest;
  state.door = p.door;
  state.hearts = p.hearts;
  state.blocks = p.blocks;
  state.eggs = new Set();
  state.filledWater = p.filledWater;
  state.enemies = p.enemies;
  state.won = false;
  state.shots = 0;
  state.deadUntil = 0;
  state.undo = [];
  queuedMoves = [];
  queuedSnapshot = null;
  queuedMoved = false;
  dragPath = [];
  activePointerId = null;
  setHudMessage('');
  state.initialSnapshot = snapshot();
}

function resetLevel(){
  restore(state.initialSnapshot);
  state.undo = [];
  queuedMoves = [];
  queuedSnapshot = null;
  queuedMoved = false;
  dragPath = [];
  activePointerId = null;
  setHudMessage('');
}

document.getElementById('undoBtn').onclick = () => {
  if (!state.undo.length || state.won) return;
  restore(state.undo.pop());
};
document.getElementById('resetBtn').onclick = () => resetLevel();
document.getElementById('editBtn').onclick = () => openEditor();

function releaseEditorPointer(e){
  if (e && editorActivePointerId !== null && e.pointerId !== editorActivePointerId) return;
  editorMouseDown = false;
  editorActivePointerId = null;
}

document.addEventListener('pointerup', releaseEditorPointer);
document.addEventListener('pointercancel', releaseEditorPointer);

document.getElementById('editorBackBtn').onclick = () => closeEditor();
document.getElementById('editorSaveBtn').onclick = () => {
  try {
    validateEditorRows(editorRows);
    currentLevelRaw = editorToRaw(editorRows);
    startLevel();
    resize();
    closeEditor();
  } catch (err) {
    setEditorStatus(`No se pudo guardar: ${err.message}`, true);
  }
};

document.getElementById('editorExportBtn').onclick = async () => {
  const raw = editorToRaw(editorRows);
  editorText.value = raw;
  try {
    await navigator.clipboard.writeText(raw);
    setEditorStatus('Pantalla exportada y copiada al portapapeles.');
  } catch {
    setEditorStatus('Pantalla exportada. Copia el texto manualmente desde la caja.');
  }
};

document.getElementById('editorImportBtn').onclick = () => {
  try {
    loadEditorFromRaw(editorText.value);
    setEditorStatus('Pantalla importada correctamente. Revisa y guarda para aplicarla.');
  } catch (err) {
    setEditorStatus(`Importación inválida: ${err.message}`, true);
  }
};

document.getElementById('editorClearBtn').onclick = () => {
  editorRows = editorRows.map(row => row.map(() => '.'));
  renderEditorGrid();
  setEditorStatus('Pantalla vaciada. Coloca al menos 1 jugador (P) antes de guardar.');
};

startLevel();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
