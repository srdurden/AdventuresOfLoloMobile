<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Lolo Touch - Retro Edition</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #boardWrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas { 
      width: 100%; 
      height: 100%; 
      display: block; 
      touch-action: none; 
      image-rendering: pixelated; 
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      flex-wrap: wrap;
    }
    .pill {
      background: #000;
      border: 2px solid #666;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px #000;
    }
    #controls {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    button {
      border: 2px solid #fff;
      min-height: 46px;
      font-size: 16px;
      color: #fff;
      background: #000;
      font-weight: bold;
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 2px 2px 0px #000;
      cursor: pointer;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
      background: #333;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="boardWrap">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">
        <div class="pill">Nivel 1</div>
        <div class="pill" id="hudHearts">❤ 0</div>
        <div class="pill" id="hudShots">✦ 0</div>
        <div class="pill" id="hudMsg" style="flex-basis: 100%; margin-top: 4px;"></div>
      </div>
    </div>
    <div id="controls">
      <button id="undoBtn">Deshacer</button>
      <button id="resetBtn">Reiniciar</button>
    </div>
  </div>

<script>
// Mapa actualizado: Retirada la Medusa y añadida la Ardilla (A) en el centro.
const LEVEL_RAW = `##############\n#............#\n#............#\n#............#\n#SSSSSSSSTTT.#\n#S...H...SSSS#\n#S.TTT.T..SSS#\n#S..SSS....SS#\n#S.PSSS..A.HS#\n#S...SSS....S#\n#STTT....TTTS#\n#STTT....TTTS#\n#S....C.....S#\n#STTT...TTT.S#\n#STTT...TTT.S#\n#SSSSSSSSSSSS#\n#............#\n#............#\n#............#\n##############`;

const LEVEL = LEVEL_RAW.split('\n');
const H = LEVEL.length;
const W = LEVEL[0].length;
const ALLOWED = new Set(['#','.','P','H','C','B','~','A','T','S']);
for (const row of LEVEL) {
  if (row.length !== W) throw new Error('Nivel inválido: ancho inconsistente.');
  for (const ch of row) if (!ALLOWED.has(ch)) throw new Error('Tile inválido: ' + ch);
}

document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const boardWrap = document.getElementById('boardWrap');
const hudHearts = document.getElementById('hudHearts');
const hudShots = document.getElementById('hudShots');
const hudMsg = document.getElementById('hudMsg');

const MAX_UNDO = 200;
const TICK = 100;
const MOVE_INTERVAL = 75;
let lastTs = 0;
let acc = 0;
let moveAcc = 0;
let board = { x: 0, y: 0, t: 20 };
let activePointerId = null;
let dragPath = [];
let queuedMoves = [];
let queuedSnapshot = null;
let queuedMoved = false;

const state = {
  base: null,
  player: null,
  chest: null,
  door: null,
  hearts: new Set(),
  blocks: new Set(),
  filledWater: new Set(),
  enemies: [],
  eggs: new Set(),
  won: false,
  shots: 0,
  deadUntil: 0,
  undo: [],
  initialSnapshot: null,
};

// --- MOTOR DE SPRITES PIXEL ART 16x16 ---
const sprites = {};
function initSprites() {
  const pal = {
    floor: ['transparent', '#580000', '#A00000', '#D82800'],
    wall: ['#000000', '#F8B800', '#F87800', '#D83800', '#881400'],
    player: ['transparent', '#000000', '#0088FF', '#FFFFFF'],
    tree: ['transparent', '#000000', '#0B6E16', '#1ED233', '#C8F8C8', '#F8C8C8'],
    stone: ['transparent', '#000000', '#F7D6AD', '#FCE9CC', '#D45A00', '#A63C00'],
    heart: ['#000000', '#F83800', '#FFFFFF', 'transparent'],
    chest: ['transparent', '#000000', '#F83800', '#FFFFFF', '#880000'],
    chest_open: ['transparent', '#000000', '#F83800', '#FFFFFF', '#880000'],
    ardilla: ['transparent', '#000000', '#00A800', '#F83800', '#FFFFFF'],
    egg: ['transparent', '#000000', '#FFFFFF', '#AAAAAA', '#555555'],
    door: ['#000000', '#503000', '#805000', '#F8B800'],
    water: ['#000000', '#0058F8', '#3CBCFC', '#FFFFFF']
  };

  const art = {
    floor: "2222222022222220\n2111111021111110\n2111111021111110\n2111111021111110\n0000000000000000\n2220222222202222\n2110211111102111\n2110211111102111\n2110211111102111\n0000000000000000\n2222222022222220\n2111111021111110\n2111111021111110\n2111111021111110\n0000000000000000\n2220222222202222",
    wall: "0000000000000000\n0111111111111110\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0122222222222230\n0133333333333330\n0000000000000000\n0444444444444440",
    player: "0000111111100000\n0011222222211000\n0122222222222100\n0123332223332100\n1231132231132210\n1231132231132210\n1233332233332210\n1222222222222210\n1222111111122210\n1222133333122210\n0122133333122100\n0122211111222100\n1112222222221110\n1331110000111331\n1331000000001331\n1110000000000111",
    tree: "0000000000000000\n0000003333300000\n0000332222233300\n0003223333322330\n0032333333332233\n0323332333333333\n0323333333333333\n1333333333333331\n1333323333233331\n1333333333333331\n1133333333333311\n0111111111111110\n0011115555111100\n0000155005510000\n0000000000000000\n0000000000000000",
    stone: "0000000000000000\n0001111111111000\n0012222333332100\n0122233333333210\n1223332232233321\n1233223332332331\n1232233323233321\n1232333322333321\n1223332233333221\n1223333233323221\n1223333333233321\n0123333233333210\n0012444444444100\n0001455444551000\n0000111111110000\n0000000000000000",
    heart: "1111111111111111\n1222222222222221\n1200000000000021\n1200000000000021\n1200110001100021\n1201111011110021\n1201111111110021\n1201111111110021\n1200111111100021\n1200011111000021\n1200001110000021\n1200000100000021\n1200000000000021\n1222222222222221\n1111111111111111\n0000000000000000",
    chest: "0000000000000000\n1111111111111111\n1333333333333331\n1222222222222221\n1222222222222221\n1333333333333331\n1333333333333331\n1222221111222221\n1222221441222221\n1222221441222221\n1222221111222221\n1222222222222221\n1222222222222221\n1333333333333331\n1111111111111111\n0000000000000000",
    chest_open: "0000000000000000\n1111111111111111\n1333333333333331\n1222222222222221\n1222222222222221\n1333333333333331\n1111111111111111\n1444444444444441\n1444444444444441\n1111111111111111\n1222222222222221\n1222222222222221\n1333333333333331\n1111111111111111\n0000000000000000\n0000000000000000",
    ardilla: "0000000111000000\n0000001333100000\n0000013333310000\n0000122222210000\n0001412222221000\n0001412222221000\n0001442211221000\n0001222211221000\n0000122222210000\n0000122222210000\n0000012222100000\n0000012221000000\n0000122221000000\n0001222221100000\n0012222222210000\n0011111111110000",
    egg: "0000001111000000\n0000112222110000\n0001222222221000\n0012222222223100\n0122222222223310\n0122222222223310\n1222222222223331\n1222222222223331\n1222222222223331\n1222222222223331\n1222222222223331\n0122222222223310\n0132222222223310\n0013322222233100\n0001133333331000\n0000111111110000",
    door: "0000000000000000\n0001111001111000\n0012221001222100\n0122221001222210\n0122221001222210\n0111111001111110\n0122221001222210\n0122221001222210\n0122221001222210\n0111111001111110\n0122221001222210\n0122221001222210\n0122231001322210\n0122221001222210\n0111111001111110\n0000000000000000",
    water: "1111111111111111\n1111221111112211\n1122332211223322\n1122332211223322\n1111221111112211\n1111111111111111\n1111111111111111\n1111111111111111\n1111112211111122\n1111223322112233\n1111223322112233\n1111112211111122\n1111111111111111\n1111111111111111\n1111111111111111\n1111111111111111"
  };

  for (const k in art) {
    const lines = art[k].trim().split('\n');
    let rects = '';
    for(let y=0; y<16; y++) {
      for(let x=0; x<16; x++) {
        let c = lines[y][x];
        let color = pal[k][c];
        if (color && color !== 'transparent') {
          // Solapamiento de 1.02 para evitar huecos de sub-píxeles
          rects += `<rect x='${x}' y='${y}' width='1.02' height='1.02' fill='${color}'/>`;
        }
      }
    }
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'>${rects}</svg>`;
    const img = new Image();
    img.src = `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    sprites[k] = img;
  }
}
initSprites();
// ----------------------------------------

function key(x,y){ return `${x},${y}`; }
function has(set,x,y){ return set.has(key(x,y)); }
function setFromArr(arr){ return new Set(arr.map(p => key(p.x,p.y))); }
function arrFromSet(set){ return [...set].map(s=>{ const [x,y] = s.split(',').map(Number); return {x,y}; }); }
function inBounds(x,y){ return x>=0 && y>=0 && x<W && y<H; }
function chestOpen(){ return state.hearts.size === 0; }
function enemyAt(x,y){ return state.enemies.find(e => e.x===x && e.y===y); }

function parseLevel(){
  const base = Array.from({ length:H }, () => Array(W).fill('.'));
  const hearts = [];
  const blocks = [];
  const enemies = [];
  let player = null;
  let chest = null;
  let door = null;

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const ch = LEVEL[y][x];
    if ('#.~TCDS'.includes(ch)) base[y][x] = ch;
    if (ch === 'P') player = { x, y, facing:[1,0] };
    if (ch === 'H') hearts.push({ x, y });
    if (ch === 'A') enemies.push({ type:'ardilla', x, y, charge:0 });
    if (ch === 'C') chest = { x, y };
    if (ch === 'D') door = { x, y };
  }
  return { base, player, chest, door, hearts:setFromArr(hearts), blocks:setFromArr(blocks), filledWater:new Set(), enemies };
}

function snapshot(){
  return {
    player: { ...state.player },
    hearts: arrFromSet(state.hearts),
    shots: state.shots,
    blocks: arrFromSet(state.blocks),
    eggs: arrFromSet(state.eggs),
    filledWater: arrFromSet(state.filledWater),
    enemies: state.enemies.map(e => ({ ...e })),
  };
}

function restore(s){
  state.player = { ...s.player };
  state.hearts = setFromArr(s.hearts);
  state.shots = s.shots ?? 0;
  state.blocks = setFromArr(s.blocks);
  state.eggs = setFromArr(s.eggs);
  state.filledWater = setFromArr(s.filledWater);
  state.enemies = s.enemies.map(e => ({ ...e }));
  state.won = false;
  state.deadUntil = 0;
}

function pushUndo(){
  state.undo.push(snapshot());
  if (state.undo.length > MAX_UNDO) state.undo.shift();
}

function passableForPlayer(x,y,ignorePushables=false){
  if (!inBounds(x,y)) return false;
  if (!ignorePushables && (has(state.blocks,x,y) || has(state.eggs,x,y))) return false;
  const b = state.base[y][x];
  if (b === '#' || b === 'T' || b === 'S') return false;
  if (b === '~' && !has(state.filledWater,x,y)) return false;
  if (b === 'C' && !chestOpen()) return false;
  return !enemyAt(x,y);
}

function killPlayer(){
  if (state.deadUntil || state.won) return;
  state.deadUntil = performance.now() + 350;
  navigator.vibrate?.(40);
}

function winLevel(){
  state.won = true;
  hudMsg.textContent = '¡Completado!';
  navigator.vibrate?.([30,30,60]);
}

function attemptPush(setRef, fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  if (t === '#' || t === 'T' || t === 'C' || t === 'D' || t === 'S') return false;
  setRef.delete(key(fromX,fromY));
  if (t === '~' && !has(state.filledWater,nx,ny)) state.filledWater.add(key(nx,ny));
  else setRef.add(key(nx,ny));
  return true;
}

function tryMovePlayer(dx,dy){
  const tx = state.player.x + dx;
  const ty = state.player.y + dy;
  if (!inBounds(tx,ty)) return false;
  state.player.facing = [dx,dy];

  if (enemyAt(tx,ty)) return killPlayer(), false;

  if (has(state.blocks,tx,ty)) {
    if (!attemptPush(state.blocks, tx, ty, dx, dy)) return false;
  } else if (has(state.eggs,tx,ty)) {
    if (!attemptPush(state.eggs, tx, ty, dx, dy)) return false;
  } else if (!passableForPlayer(tx,ty,true)) {
    return false;
  }

  state.player.x = tx;
  state.player.y = ty;
  const heartKey = key(tx,ty);
  if (state.hearts.has(heartKey)) {
    state.hearts.delete(heartKey);
    state.shots += 1;
    hudMsg.textContent = '¡Ganaste 1 disparo!';
  }
  if (chestOpen() && state.chest && tx === state.chest.x && ty === state.chest.y) return winLevel(), true;
  return true;
}

function shoot(){
  if (state.shots <= 0) {
    hudMsg.textContent = 'Sin disparos: recoge corazones';
    return false;
  }
  const [dx,dy] = state.player.facing;
  if (!dx && !dy) return false;
  const x = state.player.x + dx;
  const y = state.player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit) {
    state.enemies = state.enemies.filter(v => v !== hit);
    state.eggs.add(key(x,y));
    state.shots -= 1;
    hudMsg.textContent = '¡Enemigo convertido en huevo!';
    navigator.vibrate?.(20);
    return true;
  }
  hudMsg.textContent = 'Acércate a un enemigo para disparar';
  return false;
}

function tapToTile(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - board.x) / board.t;
  const y = (clientY - rect.top - board.y) / board.t;
  return {
    x: Math.max(0, Math.min(W-1, Math.round(x - 0.5))),
    y: Math.max(0, Math.min(H-1, Math.round(y - 0.5))),
  };
}

function canDragThrough(x,y){
  if (x === state.player.x && y === state.player.y) return true;
  return passableForPlayer(x,y,true);
}

function appendStepToPath(path, tile){
  const last = path[path.length - 1];
  if (!last) {
    path.push(tile);
    return;
  }
  if (last.x === tile.x && last.y === tile.y) return;

  let cx = last.x;
  let cy = last.y;
  while (cx !== tile.x || cy !== tile.y) {
    const dx = tile.x - cx;
    const dy = tile.y - cy;

    const horizontalFirst = Math.abs(dx) >= Math.abs(dy);
    const candidates = [];
    if (horizontalFirst) {
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
    } else {
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
    }

    const next = candidates.find(c => canDragThrough(c.x, c.y));
    if (!next) break;

    cx = next.x;
    cy = next.y;
    if (path[path.length - 1].x !== cx || path[path.length - 1].y !== cy) path.push({ x: cx, y: cy });
  }
}

function clearPathInput(){
  activePointerId = null;
  dragPath = [];
}

function queueDraggedPath(){
  if (dragPath.length < 2) return;
  const steps = [];
  for (let i = 1; i < dragPath.length; i++) {
    const prev = dragPath[i - 1];
    const next = dragPath[i];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    if (Math.abs(dx) + Math.abs(dy) !== 1) continue;
    steps.push([dx, dy]);
  }
  if (!steps.length) return;
  queuedMoves = steps;
  queuedSnapshot = snapshot();
  queuedMoved = false;
  moveAcc = MOVE_INTERVAL;
}

function processQueuedMove(){
  if (!queuedMoves.length || state.won || state.deadUntil) return;
  if (!queuedSnapshot) {
    queuedMoves = [];
    return;
  }
  if (!queuedMoved) state.undo.push(queuedSnapshot);
  const [dx,dy] = queuedMoves.shift();
  if (!tryMovePlayer(dx,dy)) {
    if (!queuedMoved && state.undo[state.undo.length - 1] === queuedSnapshot) state.undo.pop();
    queuedMoves = [];
    queuedSnapshot = null;
    queuedMoved = false;
    return;
  }
  queuedMoved = true;
  if (!queuedMoves.length) queuedSnapshot = null;
}

canvas.addEventListener('pointerdown', e => {
  if (state.won) return;
  const t = tapToTile(e.clientX, e.clientY);
  if (t.x === state.player.x && t.y === state.player.y) {
    activePointerId = e.pointerId;
    queuedMoves = [];
    queuedSnapshot = null;
    queuedMoved = false;
    dragPath = [{ x: state.player.x, y: state.player.y }];
    canvas.setPointerCapture(e.pointerId);
    return;
  }

  const dx = t.x - state.player.x;
  const dy = t.y - state.player.y;
  if (Math.abs(dx) + Math.abs(dy) === 1) {
    pushUndo();
    if (!tryMovePlayer(Math.sign(dx), Math.sign(dy))) state.undo.pop();
    return;
  }
  if (dx === 0 || dy === 0) {
    state.player.facing = [Math.sign(dx), Math.sign(dy)];
    pushUndo();
    if (!shoot()) state.undo.pop();
  }
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointerId || !dragPath.length) return;
  const tile = tapToTile(e.clientX, e.clientY);
  appendStepToPath(dragPath, tile);
});

function handlePointerEnd(e){
  if (e.pointerId !== activePointerId) return;
  queueDraggedPath();
  clearPathInput();
}

canvas.addEventListener('pointerup', handlePointerEnd);
canvas.addEventListener('pointercancel', handlePointerEnd);

function blockedForMedusaShot(x,y){
  const b = state.base[y][x];
  return b === '#' || b === 'C' || b === 'D' || has(state.blocks,x,y) || has(state.eggs,x,y);
}

function tick(){
  if (state.deadUntil && performance.now() >= state.deadUntil) return resetLevel();
  if (state.won) return;

  for (const e of state.enemies) {
    if (e.type !== 'medusa') continue; // ardilla is passive, no lasers
    const aligned = e.x === state.player.x || e.y === state.player.y;
    let clear = false;
    if (aligned) {
      clear = true;
      if (e.x === state.player.x) {
        const [a,b] = [e.y,state.player.y].sort((m,n)=>m-n);
        for (let y=a+1; y<b; y++) if (blockedForMedusaShot(e.x,y)) clear = false;
      } else {
        const [a,b] = [e.x,state.player.x].sort((m,n)=>m-n);
        for (let x=a+1; x<b; x++) if (blockedForMedusaShot(x,e.y)) clear = false;
      }
    }
    e.charge = clear ? e.charge + TICK : 0;
    if (e.charge > 400) return killPlayer();
  }
}

function resize(){
  const r = boardWrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = r.width;
  const h = r.height;
  board.t = Math.max(12, Math.floor(Math.min((w - 4) / W, (h - 4) / H)));
  board.x = Math.floor((w - W * board.t) / 2);
  board.y = Math.floor((h - H * board.t) / 2);
}
window.addEventListener('resize', resize);

function drawSprite(name, x, y){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
  } else { 
    ctx.fillStyle = '#000'; 
    ctx.fillRect(px,py,board.t,board.t); 
  }
}

function draw(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  // Capa 0: Suelo en todas partes
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      drawSprite('floor', x, y);
    }
  }

  // Capa 1: Elementos base
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      const b = state.base[y][x];
      if (b === '#') drawSprite('wall',x,y);
      else if (b === '~' && !has(state.filledWater,x,y)) drawSprite('water',x,y);
      else if (b === 'T') drawSprite('tree',x,y);
      else if (b === 'S') drawSprite('stone',x,y);
      else if (b === 'C') drawSprite(chestOpen() ? 'chest_open' : 'chest',x,y);
      else if (b === 'D') drawSprite('door',x,y);
    }
  }

  // Capa 2: Elementos interactivos
  for (const b of arrFromSet(state.blocks)) drawSprite('block',b.x,b.y);
  for (const hrt of arrFromSet(state.hearts)) drawSprite('heart',hrt.x,hrt.y);
  for (const egg of arrFromSet(state.eggs)) drawSprite('egg',egg.x,egg.y);
  for (const e of state.enemies) drawSprite(e.type, e.x, e.y);

  if (dragPath.length > 1) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = Math.max(2, board.t * 0.2);
    ctx.lineCap = 'square';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < dragPath.length; i++) {
      const p = dragPath[i];
      const cx = board.x + (p.x + 0.5) * board.t;
      const cy = board.y + (p.y + 0.5) * board.t;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  drawSprite('player',state.player.x,state.player.y);

  hudHearts.textContent = `❤ ${state.hearts.size}`;
  hudShots.textContent = `✦ ${state.shots}`;
  if (!state.won && state.hearts.size === 0) hudMsg.textContent = '¡Abre el cofre para terminar!';
}

function frame(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  acc += dt;
  moveAcc += dt;
  while (moveAcc >= MOVE_INTERVAL) {
    processQueuedMove();
    moveAcc -= MOVE_INTERVAL;
  }
  while (acc >= TICK) {
    tick();
    acc -= TICK;
  }
  draw();
  requestAnimationFrame(frame);
}

function startLevel(){
  const p = parseLevel();
  state.base = p.base;
  state.player = p.player;
  state.chest = p.chest;
  state.door = p.door;
  state.hearts = p.hearts;
  state.blocks = p.blocks;
  state.eggs = new Set();
  state.filledWater = p.filledWater;
  state.enemies = p.enemies;
  state.won = false;
  state.shots = 0;
  state.deadUntil = 0;
  state.undo = [];
  queuedMoves = [];
  queuedSnapshot = null;
  queuedMoved = false;
  dragPath = [];
  activePointerId = null;
  hudMsg.textContent = '';
  state.initialSnapshot = snapshot();
}

function resetLevel(){
  restore(state.initialSnapshot);
  state.undo = [];
  queuedMoves = [];
  queuedSnapshot = null;
  queuedMoved = false;
  dragPath = [];
  activePointerId = null;
  hudMsg.textContent = '';
}

document.getElementById('undoBtn').onclick = () => {
  if (!state.undo.length || state.won) return;
  restore(state.undo.pop());
};
document.getElementById('resetBtn').onclick = () => resetLevel();

startLevel();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
