      const armOuter = board.t * 0.47;
      ctx.beginPath();
      ctx.moveTo(centerX - armOuter, centerY);
      ctx.lineTo(centerX - armInner, centerY);
      ctx.moveTo(centerX + armInner, centerY);
      ctx.lineTo(centerX + armOuter, centerY);
      ctx.moveTo(centerX, centerY - armOuter);
      ctx.lineTo(centerX, centerY - armInner);
      ctx.moveTo(centerX, centerY + armInner);
      ctx.lineTo(centerX, centerY + armOuter);
      ctx.stroke();

      ctx.fillStyle = `rgba(255, 190, 190, ${0.65 + pulse * 0.25})`;
      ctx.beginPath();
      ctx.arc(centerX, centerY, Math.max(1.2, board.t * 0.045), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (const explosion of state.explosions) {
    const life = Math.max(1, explosion.life);
    const progress = Math.max(0, Math.min(1, (now - explosion.startedAt) / life));
    const alpha = 1 - progress;
    const px = board.x + (explosion.x + 0.5) * board.t;
    const py = board.y + (explosion.y + 0.5) * board.t;
    const radius = board.t * (0.2 + progress * 0.85);

    const blast = ctx.createRadialGradient(px, py, board.t * 0.04, px, py, radius);
    blast.addColorStop(0, `rgba(255, 255, 255, ${0.95 * alpha})`);
    blast.addColorStop(0.4, `rgba(255, 214, 94, ${0.8 * alpha})`);
    blast.addColorStop(0.8, `rgba(255, 92, 64, ${0.5 * alpha})`);
    blast.addColorStop(1, 'rgba(255, 92, 64, 0)');
    ctx.fillStyle = blast;
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const fireball of state.fireballs) {
    const renderPos = getFireballRenderPosition(fireball, now);
    const px = board.x + (renderPos.x + 0.5) * board.t;
    const py = board.y + (renderPos.y + 0.5) * board.t;
    const glow = ctx.createRadialGradient(px, py, board.t * 0.05, px, py, board.t * 0.45);
    glow.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
    glow.addColorStop(0.35, 'rgba(255, 204, 83, 0.95)');
    glow.addColorStop(1, 'rgba(200, 32, 0, 0.2)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(3, board.t * 0.22), 0, Math.PI * 2);
    ctx.fill();
  }

  if (state.medusaShot) {
    const { fromX, fromY, toX, toY, chargeRatio = 1, ts = now, life = MEDUSA_SHOT_FLASH_MS } = state.medusaShot;
    const fromPx = board.x + (fromX + 0.5) * board.t;
    const fromPy = board.y + (fromY + 0.5) * board.t;
    const toPx = board.x + (toX + 0.5) * board.t;
    const toPy = board.y + (toY + 0.5) * board.t;

    const progress = Math.max(0, Math.min(1, (now - ts) / Math.max(1, life)));
    const head = Math.min(1, 0.92 + progress * 0.2);
    const sx = fromPx;
    const sy = fromPy;
    const ex = fromPx + (toPx - fromPx) * head;
    const ey = fromPy + (toPy - fromPy) * head;

    const grad = ctx.createLinearGradient(sx, sy, ex, ey);
    grad.addColorStop(0, 'rgba(153, 230, 255, 0.25)');
    grad.addColorStop(0.45, 'rgba(246, 240, 107, 0.92)');
    grad.addColorStop(1, 'rgba(255, 255, 255, 1)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(2, board.t * (0.24 + chargeRatio * 0.08));
    ctx.lineCap = 'round';
    ctx.shadowBlur = board.t * (0.7 + (1 - progress) * 0.8);
    ctx.shadowColor = 'rgba(246, 240, 107, 0.9)';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath();
    ctx.arc(ex, ey, Math.max(1.5, board.t * 0.11), 0, Math.PI * 2);
    ctx.fill();
  }

  if (dragPath.length > 1) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = Math.max(2, board.t * 0.2);
    ctx.lineCap = 'square';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < dragPath.length; i++) {
      const p = dragPath[i];
      const cx = board.x + (p.x + 0.5) * board.t;
      const cy = board.y + (p.y + 0.5) * board.t;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  if (dragPath.length) {
    const dragAvailableTiles = getDragAvailableTiles();
    ctx.fillStyle = 'rgba(116, 255, 140, 0.3)';
    for (const tile of dragAvailableTiles) {
      const px = board.x + tile.x * board.t;
      const py = board.y + tile.y * board.t;
      ctx.fillRect(px, py, board.t, board.t);
    }
  }

  if (activePointerTile) {
    const px = board.x + activePointerTile.x * board.t;
    const py = board.y + activePointerTile.y * board.t;
    ctx.fillStyle = 'rgba(255, 246, 114, 0.45)';
    ctx.fillRect(px, py, board.t, board.t);
    ctx.strokeStyle = 'rgba(255, 246, 114, 0.95)';
    ctx.lineWidth = Math.max(2, board.t * 0.12);
    ctx.strokeRect(px + 1, py + 1, board.t - 2, board.t - 2);
  }

  for (const player of state.players) {
    const playerDraw = getPlayerDrawPosition(now, player);
    if (!playerDraw) continue;
    drawPlayerSprite(playerDraw.x, playerDraw.y, now);
    if (state.frozenUntil) {
      const px = board.x + playerDraw.x * board.t;
      const py = board.y + playerDraw.y * board.t;
      ctx.fillStyle = 'rgba(120, 210, 255, 0.4)';
      ctx.fillRect(px, py, board.t, board.t);
    }
  }

  if (state.deadUntil) {
    const blink = 0.25 + Math.abs(Math.sin(now * 0.04)) * 0.35;
    ctx.fillStyle = `rgba(255, 44, 44, ${blink})`;
    ctx.fillRect(board.x, board.y, board.t * W, board.t * H);
  }

  if (state.resetFlashUntil) {
    const remain = state.resetFlashUntil - now;
    if (remain <= 0) state.resetFlashUntil = 0;
    else {
      const p = remain / DEATH_RESET_FLASH_MS;
      ctx.fillStyle = `rgba(200, 245, 255, ${0.5 * p})`;
      ctx.fillRect(board.x, board.y, board.t * W, board.t * H);
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.95 * p})`;
      ctx.lineWidth = Math.max(2, board.t * 0.16);
      ctx.strokeRect(board.x, board.y, board.t * W, board.t * H);
    }
  }

  hudShots.textContent = `✦ ${state.shots}`;
  hudLevel.textContent = `Nivel ${currentLevelIndex + 1} ▾`;
  if (!state.won && state.hearts.size === 0 && !state.doorOpen) {
    setHudMessage('¡Pasa por el cofre abierto para abrir la puerta!');
  }
}


function spriteNameForTile(tile){
  if (tile === '#') return 'wall_left';
  if (tile === '=') return 'wall_top';
  if (tile === 'V') return 'void';
  if (tile === 'T') return 'tree';
  if (tile === 'S') return 'stone';
  if (tile === '>') return 'arrow_right';
  if (tile === '<') return 'arrow_left';
  if (tile === '^') return 'arrow_up';
  if (tile === 'v') return 'arrow_down';
  if (tile === '~') return 'water';
  if (tile === 'R') return 'bridge';
  if (tile === 'B') return 'block';
  if (tile === 'H') return 'heart';
  if (tile === 'C') return 'chest';
  if (tile === 'D') return 'door';
  if (tile === 'A') return 'ardilla';
  if (tile === 'M') return 'medusa';
  if (tile === 'I') return 'don_medusa_h';
  if (tile === 'J') return 'don_medusa_v';
  if (tile === 'K') return 'rocky';
  if (tile === 'G') return 'skull';
  if (tile === 'L') return 'leeper';
  if (tile === 'N') return 'dragon_n';
  if (tile === 'U') return 'dragon_s';
  if (tile === 'E') return 'dragon_o';
  if (tile === 'O') return 'dragon_e';
  if (tile === 'P') return 'player';
  return 'floor';
}

function buildPaletteSpritePreview(tile){
  const previewSize = 16;
  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = previewSize;
  previewCanvas.height = previewSize;
  const previewCtx = previewCanvas.getContext('2d');
  if (!previewCtx) return null;
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.fillStyle = '#000';
  previewCtx.fillRect(0, 0, previewSize, previewSize);

  if (tile === 'V') return previewCanvas.toDataURL();

  const floorSprite = sprites.floor;
  if (floorSprite?.complete) {
    previewCtx.drawImage(floorSprite, 0, 0, previewSize, previewSize);
  }

  if (tile === 'A' && ARDILLA_SHEET_READY) {
    const frame = getArdillaFrameRect(getArdillaFrameIndex());
    previewCtx.drawImage(ARDILLA_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, previewSize, previewSize);
    return previewCanvas.toDataURL();
  }

  if (tile === 'K' && ROCKY_SHEET_READY) {
    const direction = ROCKY_SPRITE.directions.right ?? ROCKY_SPRITE.directions.down;
    const frame = getRockyFrameRect(direction.idle, direction.row ?? 0);
    previewCtx.save();
    if (direction.flip) {
      previewCtx.translate(previewSize, 0);
      previewCtx.scale(-1, 1);
    }
    previewCtx.drawImage(ROCKY_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, previewSize, previewSize);
    previewCtx.restore();
    return previewCanvas.toDataURL();
  }

  if (tile === 'L' && LEEPER_SHEET_READY) {
    const frame = getLeeperFrameRect(LEEPER_SPRITE.directions.down.idle);
    previewCtx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, previewSize, previewSize);
    return previewCanvas.toDataURL();
  }

  if (tile === '~') {
    previewCtx.drawImage(getProceduralWaterFrame(0), 0, 0, previewSize, previewSize);
  } else if (tile !== '.') {
    const sprite = sprites[spriteNameForTile(tile)];
    if (sprite?.complete) {
      previewCtx.drawImage(sprite, 0, 0, previewSize, previewSize);
    }
  }

  return previewCanvas.toDataURL();
}

function getPaletteSpritePreview(tile){
  if (!editorPaletteSpritePreviewCache.has(tile)) {
    const preview = buildPaletteSpritePreview(tile);
    editorPaletteSpritePreviewCache.set(tile, preview);
  }
  return editorPaletteSpritePreviewCache.get(tile);
}

function getSpriteBackgroundLayer(sprite){
  if (!sprite) return '';
  if (typeof sprite.src === 'string' && sprite.src) return `url("${sprite.src}")`;
  if (typeof sprite.toDataURL === 'function') return `url("${sprite.toDataURL()}")`;
  return '';
}

function applyEditorCellVisual(cell, tile, x, y){
  const meta = TILE_META[tile] ?? TILE_META['.'];
  const floorSprite = sprites.floor;
  const sprite = tile === '~' ? getProceduralWaterFrame(0) : (sprites[spriteNameForTile(tile)] ?? floorSprite);
  cell.textContent = '';
  cell.title = `${meta.label} (${tile}) - [${x},${y}]`;
  const floorLayer = getSpriteBackgroundLayer(floorSprite);
  const spriteLayer = tile === '~' ? `url("${getProceduralWaterPreviewDataUrl(0)}")` : getSpriteBackgroundLayer(sprite);
  if (tile === 'V') {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = 'none';
  } else if (tile === '.' || !spriteLayer) {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = floorLayer || 'none';
  } else if (tile === '~') {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = spriteLayer;
  } else {
    cell.style.backgroundColor = '#000';
    cell.style.backgroundImage = `${spriteLayer}, ${floorLayer}`;
  }
}

function moveEditorTile(fromX, fromY, toX, toY){
  if (fromX === toX && fromY === toY) return;
  const tile = editorRows[fromY]?.[fromX];
  if (!tile || tile === '.') return;
  editorRows[fromY][fromX] = '.';
  editorRows[toY][toX] = tile;
  const fromCell = editorGrid.querySelector(`.editor-cell[data-x="${fromX}"][data-y="${fromY}"]`);
  const toCell = editorGrid.querySelector(`.editor-cell[data-x="${toX}"][data-y="${toY}"]`);
  if (fromCell) applyEditorCellVisual(fromCell, '.', fromX, fromY);
  if (toCell) applyEditorCellVisual(toCell, tile, toX, toY);
  editorText.value = editorToRaw(editorRows);
}

function setEditorDropTarget(x, y){
  if (editorDropTarget && editorDropTarget.x === x && editorDropTarget.y === y) return;
  if (editorDropTarget) {
    const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorDropTarget.x}"][data-y="${editorDropTarget.y}"]`);
    prev?.classList.remove('drop-target');
  }
  editorDropTarget = { x, y };
  const next = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  next?.classList.add('drop-target');
}

function clearEditorDropTarget(){
  if (!editorDropTarget) return;
  const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorDropTarget.x}"][data-y="${editorDropTarget.y}"]`);
  prev?.classList.remove('drop-target');
  editorDropTarget = null;
}

function setEditorHoverTarget(x, y){
  if (editorHoverTarget && editorHoverTarget.x === x && editorHoverTarget.y === y) return;
  if (editorHoverTarget) {
    const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorHoverTarget.x}"][data-y="${editorHoverTarget.y}"]`);
    prev?.classList.remove('hover-target');
  }
  editorHoverTarget = { x, y };
  const next = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  next?.classList.add('hover-target');
}

function clearEditorHoverTarget(){
  if (!editorHoverTarget) return;
  const prev = editorGrid.querySelector(`.editor-cell[data-x="${editorHoverTarget.x}"][data-y="${editorHoverTarget.y}"]`);
  prev?.classList.remove('hover-target');
  editorHoverTarget = null;
}

function getEditorTileFromPointerEvent(e, clamp=false){
  const rect = editorGrid.getBoundingClientRect();
  if (!rect.width || !rect.height) return null;
  const relX = (e.clientX - rect.left) / rect.width;
  const relY = (e.clientY - rect.top) / rect.height;
  if (!clamp && (relX < 0 || relX > 1 || relY < 0 || relY > 1)) return null;
  const x = clamp
    ? Math.max(0, Math.min(W - 1, Math.floor(relX * W)))
    : Math.floor(relX * W);
  const y = clamp
    ? Math.max(0, Math.min(H - 1, Math.floor(relY * H)))
    : Math.floor(relY * H);
  return { x, y };
}

function getEditorTileFromClientPoint(clientX, clientY, clamp=false){
  return getEditorTileFromPointerEvent({ clientX, clientY }, clamp);
}

function frame(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  acc += dt;
  moveAcc += dt;
  if (activeKeyboardDirKey && !state.won && !state.deadUntil && !isPlayerFrozen() && !isEditorOpen) {
    let repeatDt = dt;
    if (keyboardRepeatDelayMs > 0) {
      keyboardRepeatDelayMs -= dt;
      repeatDt = keyboardRepeatDelayMs < 0 ? -keyboardRepeatDelayMs : 0;
    }
    keyboardHoldAcc += repeatDt;
    const movement = KEY_DIRECTIONS[activeKeyboardDirKey];
    while (movement && keyboardHoldAcc >= KEYBOARD_HALF_STEP_INTERVAL) {
      const [dx, dy] = movement;
      const stepped = performKeyboardHalfStep(dx, dy);
      keyboardHoldAcc -= KEYBOARD_HALF_STEP_INTERVAL;
      if (!stepped) {
        keyboardHoldAcc = 0;
        break;
      }
    }
  }
  while (queuedMoves.length) {
    const nextMove = queuedMoves[0];
    if (typeof nextMove.readyAt === 'number') {
      if (ts < nextMove.readyAt) break;
      const processed = processQueuedMove();
      if (!processed) break;
      continue;
    }
    const intervalMs = nextMove.intervalMs ?? MOVE_INTERVAL;
    if (moveAcc < intervalMs) break;
    const processed = processQueuedMove();
    if (!processed) break;
    moveAcc -= intervalMs;
  }
  while (acc >= TICK) {
    tick();
    acc -= TICK;
  }
  draw();
  requestAnimationFrame(frame);
}

function setEditorStatus(message, isError=false) {
  console[isError ? 'warn' : 'info'](`[Editor] ${message}`);
}

function editorToRaw(rows){
  return rows.map(r => r.join('')).join('\n');
}

function validateEditorRows(rows){
  const players = rows.flat().filter(ch => ch === 'P').length;
  const chests = rows.flat().filter(ch => ch === 'C').length;
  if (players < 1) throw new Error('Debe existir al menos 1 jugador (P).');
  if (chests > 1) throw new Error('Solo puede haber 1 cofre (C).');
}

function paintEditorCell(x, y){
  if (!editorTile) return;
  if (!editorRows[y] || !editorRows[y][x]) return;
  if (editorRows[y][x] === editorTile) return;
  editorRows[y][x] = editorTile;
  const cell = editorGrid.querySelector(`.editor-cell[data-x="${x}"][data-y="${y}"]`);
  if (cell) applyEditorCellVisual(cell, editorTile, x, y);
  editorText.value = editorToRaw(editorRows);
}

function paintEditorFromPointerEvent(e){
  const tilePos = getEditorTileFromPointerEvent(e);
  if (!tilePos) return;
  const { x, y } = tilePos;
  if (editorDrag && editorMouseDown && (x !== editorDrag.fromX || y !== editorDrag.fromY) && editorDrag.tile !== '.') {
    editorDrag.moved = true;
  }
  if (editorDrag?.isMove) return;
  paintEditorCell(x, y);
}

function renderEditorGrid(){
  editorGrid.innerHTML = '';
  editorGrid.style.gridTemplateColumns = `repeat(${W}, var(--editor-cell-size))`;
  editorGrid.style.width = 'max-content';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const tile = editorRows[y][x];
      const cell = document.createElement('button');
      cell.className = 'editor-cell';
      cell.type = 'button';
      cell.dataset.x = String(x);
      cell.dataset.y = String(y);
      applyEditorCellVisual(cell, tile, x, y);
      cell.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        editorMouseDown = true;
        editorActivePointerId = e.pointerId;
        const sourceTile = editorRows[y][x];
        const canMoveTile = sourceTile !== '.' && (!editorTile || sourceTile === editorTile);
        editorDrag = { fromX: x, fromY: y, moved: false, tile: sourceTile, isMove: canMoveTile };
        editorGrid.setPointerCapture(e.pointerId);
        if (editorDrag.isMove) setEditorDropTarget(x, y);
        if (!editorDrag.isMove) paintEditorCell(x, y);
      });
      editorGrid.appendChild(cell);
    }
  }
  clearEditorDropTarget();
  clearEditorHoverTarget();
  editorText.value = editorToRaw(editorRows);
}

editorGrid.addEventListener('pointermove', (e) => {
  if (!editorMouseDown && editorTile) {
    const hoverTile = getEditorTileFromPointerEvent(e);
    if (hoverTile) setEditorHoverTarget(hoverTile.x, hoverTile.y);
    else clearEditorHoverTarget();
  }
  if (!editorMouseDown) return;
  if (e.pointerId !== editorActivePointerId) return;
  if ((e.buttons & 1) !== 1) return;
  if (editorDrag?.isMove) {
    const target = getEditorTileFromPointerEvent(e);
    if (target) setEditorDropTarget(target.x, target.y);
    else clearEditorDropTarget();
  }
  paintEditorFromPointerEvent(e);
});

editorGrid.addEventListener('pointerleave', () => {
  clearEditorHoverTarget();
});

function refreshEditorVisualsIfVisible(){
  if (!isEditorOpen) return;
  renderEditorGrid();
  renderPalette();
}

function renderPalette(){
  paletteGrid.innerHTML = '';
  editorPaletteSpritePreviewCache.clear();
  for (const tile of PALETTE_ORDER) {
    const meta = TILE_META[tile];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `palette-tile ${tile === editorTile ? 'active' : ''}`;
    const preview = getPaletteSpritePreview(tile);
    btn.style.backgroundColor = '#000';
    btn.style.backgroundImage = preview ? `url("${preview}")` : 'none';
    btn.title = `${meta.label} (${tile})`;
    btn.setAttribute('aria-label', `${meta.label} (${tile})`);
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      editorPaletteDrag = {
        pointerId: e.pointerId,
        tile,
        moved: false,
        startX: e.clientX,
        startY: e.clientY,
      };
      paletteGrid.setPointerCapture?.(e.pointerId);
    });
    paletteGrid.appendChild(btn);
  }
}

function loadEditorFromRaw(raw){
  const rows = parseLevelRows(raw).map(r => r.split(''));
  if (rows.length !== H || rows[0].length !== W) {
    throw new Error(`La pantalla debe mantener tamaño ${W}x${H}.`);
  }
  validateEditorRows(rows);
  editorRows = rows;
  renderEditorGrid();
}

function openEditor(){
  clearKeyboardInput();
  isEditorOpen = true;
  editorView.classList.add('visible');
  editorView.setAttribute('aria-hidden', 'false');
  loadEditorFromRaw(currentLevelRaw);
  editorTile = null;
  renderPalette();
  setEditorStatus('Editor abierto. Ninguna pieza seleccionada. Arrastra una pieza del tablero para moverla o elige una en la paleta.');
}

function closeEditor(){
  clearKeyboardInput();
  isEditorOpen = false;
  editorView.classList.remove('visible');
  editorView.setAttribute('aria-hidden', 'true');
  editorMouseDown = false;
  editorActivePointerId = null;
  editorDrag = null;
  editorPaletteDrag = null;
  clearEditorDropTarget();
  clearEditorHoverTarget();
}

function startLevel(){
  LEVEL = parseLevelRows(currentLevelRaw);
  const p = parseLevel();
  state.base = p.base;
  state.players = p.players.map(player => ({ ...player }));
  syncPrimaryPlayer();
  state.chest = p.chest;
  state.door = p.door;
  state.hearts = p.hearts;
  state.blocks = p.blocks;
  state.eggs = new Set();
  state.eggTimers = new Map();
  state.filledWater = p.filledWater;
  state.enemies = p.enemies;
  state.won = false;
  state.doorOpen = false;
  state.shots = 0;
  state.deadUntil = 0;
  state.frozenUntil = 0;
  state.medusaShot = null;
  state.fireballs = [];
  state.resetFlashUntil = 0;
  state.keyCollected = false;
  state.explosions = [];
  state.undo = [];
  queuedMoves = [];
  keyboardOffset = { x: 0, y: 0 };
  clearKeyboardInput();
  clearPlayerAnimation();
  dragPath = [];
  activePointerId = null;
  setHudMessage('');
  state.initialSnapshot = snapshot();
}

function resetLevel({ fromDeath = false } = {}){
  restore(state.initialSnapshot);
  state.undo = [];
  queuedMoves = [];
  keyboardOffset = { x: 0, y: 0 };
  clearKeyboardInput();
  clearPlayerAnimation();
  dragPath = [];
  activePointerId = null;
  state.explosions = [];
  if (fromDeath) state.resetFlashUntil = performance.now() + DEATH_RESET_FLASH_MS;
  setHudMessage('');
}

document.getElementById('undoBtn').onclick = () => {
  if (!state.undo.length || state.won) return;
  queuedMoves = [];
  clearPathInput();
  clearKeyboardInput();
  keyboardOffset = { x: 0, y: 0 };
  restore(state.undo.pop());
};
document.getElementById('resetBtn').onclick = () => resetLevel();
document.getElementById('editBtn').onclick = () => openEditor();

[moveUpBtn, moveDownBtn, moveLeftBtn, moveRightBtn].forEach((button) => {
  if (button) button.style.touchAction = 'none';
});

directionalControls?.addEventListener('pointerdown', (e) => {
  const button = e.target.closest('.dir-btn');
  e.preventDefault();
  directionalControls.setPointerCapture(e.pointerId);
  directionalPointerStart = { x: e.clientX, y: e.clientY };
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  if (button) {
    clearDirectionalFocus();
    triggerDirectionalButton(button);
    setDirectionalHold(button, e.pointerId);
    directionalPointerTriggered = true;
    return;
  }
  activeDirectionalPointerId = e.pointerId;
  activeDirectionalButton = null;
  clearInterval(directionalHoldInterval);
  directionalHoldInterval = null;
});

directionalControls?.addEventListener('pointermove', (e) => {
  if (activeDirectionalPointerId !== e.pointerId) return;
  const buttonFromTouch = getDirectionalButtonFromPoint(e.clientX, e.clientY);
  const pointerDx = e.clientX - (directionalPointerStart?.x ?? e.clientX);
  const pointerDy = e.clientY - (directionalPointerStart?.y ?? e.clientY);
  if (Math.abs(pointerDx) >= 8 || Math.abs(pointerDy) >= 8) directionalPointerMoved = true;
  const button = buttonFromTouch ?? getDirectionalButtonFromDelta(pointerDx, pointerDy);
  if (!button || button === activeDirectionalButton) return;
  triggerDirectionalButton(button);
  setDirectionalHold(button, e.pointerId);
  directionalPointerTriggered = true;
});

directionalControls?.addEventListener('pointerup', (e) => {
  if (activeDirectionalPointerId !== e.pointerId) return;
  if (!directionalPointerTriggered && !directionalPointerMoved) {
    const fallbackButton = getDirectionalButtonFromControlCenter(e.clientX, e.clientY);
    triggerDirectionalButton(fallbackButton);
  }
  directionalPointerStart = null;
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  clearDirectionalFocus();
  clearDirectionalHold();
});

directionalControls?.addEventListener('pointercancel', (e) => {
  if (activeDirectionalPointerId !== e.pointerId) return;
  directionalPointerStart = null;
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  clearDirectionalFocus();
  clearDirectionalHold();
});


function releaseEditorPointer(e){
  if (editorActivePointerId === null) return;
  if (e && e.pointerId !== editorActivePointerId) return;
  if (editorDrag && editorDrag.isMove && editorDrag.moved && e) {
    const target = getEditorTileFromPointerEvent(e, true);
    if (target) moveEditorTile(editorDrag.fromX, editorDrag.fromY, target.x, target.y);
  }
  editorMouseDown = false;
  editorActivePointerId = null;
  editorDrag = null;
  clearEditorDropTarget();
  clearEditorHoverTarget();
}

function releaseEditorPalettePointer(e){
  if (!editorPaletteDrag) return;
  if (e.pointerId !== editorPaletteDrag.pointerId) return;
  const { tile, moved } = editorPaletteDrag;
  const target = getEditorTileFromClientPoint(e.clientX, e.clientY);
  if (!moved) {
    if (editorTile === tile) {
      editorTile = null;
      clearEditorHoverTarget();
      setEditorStatus('Ninguna pieza seleccionada. Arrastra una pieza del tablero para moverla.');
    } else {
      editorTile = tile;
      const meta = TILE_META[tile] ?? { label: tile };
      setEditorStatus(`Pieza activa: ${meta.label} (${tile}).`);
    }
    renderPalette();
  } else if (target) {
    if (editorTile !== tile) {
      editorTile = tile;
      renderPalette();
    }
    paintEditorCell(target.x, target.y);
  }
  if (paletteGrid.hasPointerCapture?.(e.pointerId)) {
    paletteGrid.releasePointerCapture(e.pointerId);
  }
  editorPaletteDrag = null;
  clearEditorHoverTarget();
}

document.addEventListener('pointerup', releaseEditorPointer);
document.addEventListener('pointercancel', releaseEditorPointer);

document.addEventListener('pointermove', (e) => {
  if (!editorPaletteDrag || e.pointerId !== editorPaletteDrag.pointerId) return;
  if ((e.buttons & 1) !== 1) return;
  const moveX = Math.abs(e.clientX - editorPaletteDrag.startX);
  const moveY = Math.abs(e.clientY - editorPaletteDrag.startY);
  if (moveX > 4 || moveY > 4) editorPaletteDrag.moved = true;
  const target = getEditorTileFromClientPoint(e.clientX, e.clientY);
  if (!target) {
    clearEditorHoverTarget();
    return;
  }
  setEditorHoverTarget(target.x, target.y);
});

document.addEventListener('pointerup', releaseEditorPalettePointer);
document.addEventListener('pointercancel', releaseEditorPalettePointer);

document.getElementById('editorBackBtn').onclick = () => closeEditor();
document.getElementById('editorSaveBtn').onclick = () => {
  try {
    validateEditorRows(editorRows);
    currentLevelRaw = editorToRaw(editorRows);
    startLevel();
    resize();
    closeEditor();
  } catch (err) {
    setEditorStatus(`No se pudo guardar: ${err.message}`, true);
  }
};

document.getElementById('editorImportBtn').onclick = () => {
  try {
    loadEditorFromRaw(editorText.value);
    setEditorStatus('Pantalla importada correctamente. Revisa y guarda para aplicarla.');
  } catch (err) {
    setEditorStatus(`Importación inválida: ${err.message}`, true);
  }
};

document.getElementById('editorClearBtn').onclick = () => {
  editorRows = editorRows.map(row => row.map(() => '.'));
  renderEditorGrid();
  setEditorStatus('Pantalla vaciada. Coloca al menos 1 jugador (P) antes de guardar.');
};


function renderLevelDropdown(){
  levelDropdown.innerHTML = '';
  LEVELS_RAW.forEach((_, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'level-option';
    btn.textContent = `Nivel ${idx + 1}`;
    btn.onclick = () => {
      currentLevelIndex = idx;
      currentLevelRaw = LEVELS_RAW[currentLevelIndex];
      startLevel();
      resize();
      levelDropdown.classList.remove('visible');
      levelDropdown.setAttribute('aria-hidden', 'true');
    };
    levelDropdown.appendChild(btn);
  });
}

hudLevel.addEventListener('click', (e) => {
  e.stopPropagation();
  const willShow = !levelDropdown.classList.contains('visible');
  levelDropdown.classList.toggle('visible', willShow);
  levelDropdown.setAttribute('aria-hidden', willShow ? 'false' : 'true');
});

document.addEventListener('pointerdown', (e) => {
  if (e.target === hudLevel || levelDropdown.contains(e.target)) return;
  levelDropdown.classList.remove('visible');
  levelDropdown.setAttribute('aria-hidden', 'true');
});

startLevel();
renderLevelDropdown();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
