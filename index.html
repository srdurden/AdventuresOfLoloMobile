<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Lolo Touch - Puzzle 1</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #13100d;
      font-family: "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
    }
    #boardWrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #ffffff22;
      background: radial-gradient(circle at 20% 0%, #4b2615 0%, #2a150c 60%, #1b0f09 100%);
      box-shadow: inset 0 0 30px #00000088;
    }
    #gameCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      font-weight: 700;
    }
    .pill {
      background: linear-gradient(180deg, #3c261aee, #25170fee);
      border: 1px solid #ffffff26;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      text-shadow: 0 1px 1px #000;
      white-space: nowrap;
    }
    #controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    button {
      border: 1px solid #ffffff1f;
      border-radius: 12px;
      min-height: 48px;
      font-size: 16px;
      color: #f7e8d8;
      background: linear-gradient(180deg, #5a3928, #3a2418);
      font-weight: 700;
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div id="app">
    <div id="boardWrap">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">
        <div class="pill">Puzzle 1</div>
        <div class="pill" id="hudHearts">❤ 0</div>
        <div class="pill" id="hudKey">🔒 Sin llave</div>
        <div class="pill" id="hudMsg">Objetivo: abrir puerta</div>
      </div>
    </div>
    <div id="controls">
      <button id="undoBtn">Deshacer</button>
      <button id="resetBtn">Reiniciar</button>
    </div>
  </div>

<script>
const LEVEL_RAW = `######################\n#P....#....M...#....D#\n#.##..#..######.#.##.#\n#..H..#..#....#.#..#.#\n#.....#..#.~B.#.#..#.#\n#..#####.#.~~.#.#..#.#\n#..#...#.#....#.#..#.#\n#..#.S.#.######.#..#.#\n#..#.G.#........#..#.#\n#..#.G.######.###..#.#\n#..#.G.#....#...#..#.#\n#..#...#.H..#...#..#.#\n#..#####....#.C.#..#.#\n#......#....#...#..#.#\n#.####.#.####.###..#.#\n#.#..#.#....#......#.#\n#.#..#.####.########.#\n#.#..#....#....v...#.#\n#.#..####.#.######.#.#\n#.#..#..#.#..^...#.#.#\n#.#..#..#.####.###.#.#\n#.#..#..#....#...#.#.#\n#.#..#..####.#.<.#.#.#\n#....#.......#...#..>#\n#..H...........B....##\n######################`;

const LEVEL = LEVEL_RAW.split('\n');
const H = LEVEL.length;
const W = LEVEL[0].length;
const ALLOWED = new Set(['#','.','P','H','C','D','B','~','S','G','>','<','^','v','M']);

for (const row of LEVEL) {
  if (row.length !== W) throw new Error('Nivel inválido: ancho inconsistente.');
  for (const ch of row) if (!ALLOWED.has(ch)) throw new Error('Tile inválido: ' + ch);
}

document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => { if (e.scale && e.scale !== 1) e.preventDefault(); }, { passive: false });

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const boardWrap = document.getElementById('boardWrap');
const hudHearts = document.getElementById('hudHearts');
const hudKey = document.getElementById('hudKey');
const hudMsg = document.getElementById('hudMsg');

const DIRS = { '>':[1,0], '<':[-1,0], '^':[0,-1], 'v':[0,1] };
const MAX_UNDO = 200;
const TICK = 100;
let lastTs = 0;
let acc = 0;
let board = { x: 0, y: 0, t: 20 };

const state = {
  base: null,
  player: null,
  chest: null,
  door: null,
  hearts: new Set(),
  blocks: new Set(),
  filledWater: new Set(),
  enemies: [],
  gatesOpen: false,
  won: false,
  deadUntil: 0,
  undo: [],
  initialSnapshot: null,
};

function key(x,y){ return `${x},${y}`; }
function has(set,x,y){ return set.has(key(x,y)); }
function setFromArr(arr){ return new Set(arr.map(p => key(p.x,p.y))); }
function arrFromSet(set){ return [...set].map(s=>{ const [x,y] = s.split(',').map(Number); return {x,y}; }); }
function inBounds(x,y){ return x>=0 && y>=0 && x<W && y<H; }
function chestOpen(){ return state.hearts.size === 0; }
function onSwitch(x,y){ return state.base[y]?.[x] === 'S'; }
function onGate(x,y){ return state.base[y]?.[x] === 'G'; }
function enemyAt(x,y){ return state.enemies.find(e => e.x===x && e.y===y); }

function parseLevel(){
  const base = Array.from({ length:H }, () => Array(W).fill('.'));
  const hearts = [];
  const blocks = [];
  const enemies = [];
  let player = null;
  let chest = null;
  let door = null;

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const ch = LEVEL[y][x];
    if ('#.~SGCD'.includes(ch)) base[y][x] = ch;
    if (ch === 'P') player = { x, y, hasKey: false };
    if (ch === 'H') hearts.push({ x, y });
    if (ch === 'B') blocks.push({ x, y });
    if ('><^v'.includes(ch)) enemies.push({ type:'patrol', x, y, prevX:x, prevY:y, dir:ch, moveCounter:0, interval:5, charge:0 });
    if (ch === 'M') enemies.push({ type:'medusa', x, y, prevX:x, prevY:y, dir:'', moveCounter:0, interval:0, charge:0 });
    if (ch === 'C') chest = { x, y };
    if (ch === 'D') door = { x, y };
  }

  return { base, player, chest, door, hearts:setFromArr(hearts), blocks:setFromArr(blocks), filledWater:new Set(), enemies };
}

function snapshot(){
  return {
    player: { ...state.player },
    hearts: arrFromSet(state.hearts),
    blocks: arrFromSet(state.blocks),
    filledWater: arrFromSet(state.filledWater),
    enemies: state.enemies.map(e => ({ ...e })),
    gatesOpen: state.gatesOpen,
  };
}

function restore(s){
  state.player = { ...s.player };
  state.hearts = setFromArr(s.hearts);
  state.blocks = setFromArr(s.blocks);
  state.filledWater = setFromArr(s.filledWater);
  state.enemies = s.enemies.map(e => ({ ...e }));
  state.gatesOpen = s.gatesOpen;
  state.won = false;
  state.deadUntil = 0;
}

function pushUndo(){
  state.undo.push(snapshot());
  if (state.undo.length > MAX_UNDO) state.undo.shift();
}

function updateGates(){
  const switched = onSwitch(state.player.x, state.player.y) || arrFromSet(state.blocks).some(p => onSwitch(p.x,p.y));
  if (!switched) {
    const occupied = onGate(state.player.x,state.player.y) || arrFromSet(state.blocks).some(p=>onGate(p.x,p.y)) || state.enemies.some(e=>onGate(e.x,e.y));
    if (occupied) return;
  }
  state.gatesOpen = switched;
}

function passableForPlayer(x,y,ignoreBlocks=false){
  if (!inBounds(x,y)) return false;
  if (!ignoreBlocks && has(state.blocks,x,y)) return false;
  const b = state.base[y][x];
  if (b === '#') return false;
  if (b === '~' && !has(state.filledWater,x,y)) return false;
  if (b === 'G' && !state.gatesOpen) return false;
  if (b === 'D' && !state.player.hasKey) return false;
  if (b === 'C' && !chestOpen()) return false;
  return true;
}

function passableForEnemy(x,y){
  if (!inBounds(x,y) || has(state.blocks,x,y) || enemyAt(x,y)) return false;
  const b = state.base[y][x];
  if (b === '#' || (b === '~' && !has(state.filledWater,x,y)) || (b === 'G' && !state.gatesOpen) || b === 'C' || b === 'D') return false;
  return true;
}

function isWallLikeForLOS(x,y){
  const b = state.base[y][x];
  return b === '#' || (b === 'G' && !state.gatesOpen);
}

function killPlayer(){
  if (state.deadUntil || state.won) return;
  state.deadUntil = performance.now() + 350;
  navigator.vibrate?.(40);
}

function winLevel(){
  state.won = true;
  hudMsg.textContent = '¡Completado!';
  navigator.vibrate?.([30,30,60]);
}

function tryMovePlayer(dx,dy){
  const tx = state.player.x + dx;
  const ty = state.player.y + dy;
  if (!inBounds(tx,ty)) return false;
  if (enemyAt(tx,ty)) return killPlayer(), false;

  if (has(state.blocks,tx,ty)) {
    const bx = tx + dx;
    const by = ty + dy;
    if (!inBounds(bx,by) || has(state.blocks,bx,by)) return false;
    const t = state.base[by][bx];
    if (t === '#' || (t === 'G' && !state.gatesOpen) || t === 'C' || t === 'D') return false;
    state.blocks.delete(key(tx,ty));
    if (t === '~' && !has(state.filledWater,bx,by)) state.filledWater.add(key(bx,by));
    else state.blocks.add(key(bx,by));
  } else if (!passableForPlayer(tx,ty)) {
    return false;
  }

  state.player.x = tx;
  state.player.y = ty;
  state.hearts.delete(key(tx,ty));
  if (chestOpen() && state.chest && tx === state.chest.x && ty === state.chest.y) state.player.hasKey = true;
  if (state.player.hasKey && state.door && tx === state.door.x && ty === state.door.y) return winLevel(), true;
  updateGates();
  return true;
}

function tapToTile(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - board.x) / board.t;
  const y = (clientY - rect.top - board.y) / board.t;
  return {
    x: Math.max(0, Math.min(W-1, Math.round(x - 0.5))),
    y: Math.max(0, Math.min(H-1, Math.round(y - 0.5))),
  };
}

canvas.addEventListener('pointerdown', e => {
  if (state.won) return;
  const t = tapToTile(e.clientX, e.clientY);
  const dx = t.x - state.player.x;
  const dy = t.y - state.player.y;
  if (Math.abs(dx) + Math.abs(dy) !== 1) return;
  pushUndo();
  if (!tryMovePlayer(Math.sign(dx), Math.sign(dy))) state.undo.pop();
});

function tick(){
  if (state.deadUntil && performance.now() >= state.deadUntil) return resetLevel();
  if (state.won) return;
  updateGates();

  for (const e of state.enemies) {
    e.prevX = e.x;
    e.prevY = e.y;

    if (e.type === 'patrol') {
      e.moveCounter++;
      if (e.moveCounter >= e.interval) {
        e.moveCounter = 0;
        let [dx,dy] = DIRS[e.dir];
        let nx = e.x + dx;
        let ny = e.y + dy;
        if (!passableForEnemy(nx,ny)) {
          e.dir = e.dir === '>' ? '<' : e.dir === '<' ? '>' : e.dir === '^' ? 'v' : '^';
          [dx,dy] = DIRS[e.dir];
          nx = e.x + dx;
          ny = e.y + dy;
        }
        if (passableForEnemy(nx,ny)) {
          e.x = nx;
          e.y = ny;
        }
      }
      if (e.x === state.player.x && e.y === state.player.y) return killPlayer();
    } else {
      const aligned = e.x === state.player.x || e.y === state.player.y;
      let clear = false;
      if (aligned) {
        clear = true;
        if (e.x === state.player.x) {
          const [a,b] = [e.y,state.player.y].sort((m,n)=>m-n);
          for (let y=a+1; y<b; y++) if (isWallLikeForLOS(e.x,y)) clear = false;
        } else {
          const [a,b] = [e.x,state.player.x].sort((m,n)=>m-n);
          for (let x=a+1; x<b; x++) if (isWallLikeForLOS(x,e.y)) clear = false;
        }
      }
      e.charge = clear ? e.charge + TICK : 0;
      if (e.charge > 400) return killPlayer();
    }
  }
}

function resize(){
  const r = boardWrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = r.width;
  const h = r.height;
  board.t = Math.max(8, Math.floor(Math.min((w - 4) / W, (h - 4) / H)));
  board.x = Math.floor((w - W * board.t) / 2);
  board.y = Math.floor((h - H * board.t) / 2);
}
window.addEventListener('resize', resize);

function drawTile(x,y,fill){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  ctx.fillStyle = fill;
  ctx.fillRect(px,py,board.t,board.t);
}

function draw(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const b = state.base[y][x];
    const px = board.x + x * board.t;
    const py = board.y + y * board.t;

    if (b === '#') {
      drawTile(x,y,'#c29768');
      ctx.fillStyle = '#8f633f';
      ctx.fillRect(px+1,py+1,board.t-2,board.t*0.35);
      ctx.fillStyle = '#d6b089';
      ctx.fillRect(px+1,py+board.t*0.45,board.t-2,board.t*0.18);
    } else if (b === '~' && !has(state.filledWater,x,y)) {
      drawTile(x,y,'#2f5f97');
      ctx.fillStyle = '#6cb3ff55';
      ctx.beginPath();
      ctx.arc(px + board.t*0.5, py + board.t*0.5, board.t*0.28, 0, Math.PI*2);
      ctx.fill();
    } else if (b === 'S') {
      drawTile(x,y,'#674322');
      ctx.fillStyle = '#efce5d';
      ctx.fillRect(px+board.t*0.2,py+board.t*0.2,board.t*0.6,board.t*0.6);
    } else if (b === 'G') {
      drawTile(x,y,state.gatesOpen ? '#3f8f55' : '#7f2f3c');
      ctx.strokeStyle = '#ffffff44';
      ctx.strokeRect(px+1,py+1,board.t-2,board.t-2);
    } else if (b === 'C') {
      drawTile(x,y,chestOpen() ? '#b2861f' : '#5d451d');
      ctx.fillStyle = '#f0d274';
      ctx.fillRect(px+board.t*0.1,py+board.t*0.42,board.t*0.8,board.t*0.2);
    } else if (b === 'D') {
      drawTile(x,y,state.player.hasKey ? '#3b8a57' : '#562424');
      ctx.fillStyle = '#e3dbba';
      ctx.fillRect(px+board.t*0.56,py+board.t*0.35,board.t*0.09,board.t*0.12);
    } else {
      drawTile(x,y,((x+y)%2===0) ? '#79261e' : '#6e221b');
    }
    ctx.strokeStyle = '#00000033';
    ctx.strokeRect(px,py,board.t,board.t);
  }

  for (const b of arrFromSet(state.blocks)) {
    const px = board.x + b.x*board.t;
    const py = board.y + b.y*board.t;
    drawTile(b.x,b.y,'#b89464');
    ctx.fillStyle = '#8f6a44';
    ctx.fillRect(px+board.t*0.12,py+board.t*0.12,board.t*0.76,board.t*0.76);
  }

  ctx.fillStyle = '#ff5f97';
  ctx.font = `${Math.floor(board.t*0.65)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const heart of arrFromSet(state.hearts)) {
    ctx.fillText('♥', board.x + heart.x*board.t + board.t/2, board.y + heart.y*board.t + board.t/2 + 1);
  }

  for (const e of state.enemies) {
    const px = board.x + e.x*board.t + board.t/2;
    const py = board.y + e.y*board.t + board.t/2;
    ctx.fillStyle = e.type === 'medusa' ? '#c495ff' : '#f8b35f';
    ctx.beginPath();
    ctx.arc(px, py, board.t*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#2b1a12';
    ctx.fillRect(px-board.t*0.1,py-board.t*0.05,board.t*0.2,board.t*0.08);
  }

  for (const e of state.enemies.filter(v => v.type==='medusa' && v.charge>0)) {
    ctx.strokeStyle = `rgba(255,130,205,${Math.min(.75,e.charge/400)})`;
    ctx.lineWidth = Math.max(2, board.t*0.12);
    ctx.beginPath();
    ctx.moveTo(board.x + (e.x+0.5)*board.t, board.y + (e.y+0.5)*board.t);
    ctx.lineTo(board.x + (state.player.x+0.5)*board.t, board.y + (state.player.y+0.5)*board.t);
    ctx.stroke();
  }

  ctx.fillStyle = state.deadUntil ? '#ff3b4a' : '#67d1ff';
  ctx.fillRect(board.x + state.player.x*board.t + board.t*0.18, board.y + state.player.y*board.t + board.t*0.18, board.t*0.64, board.t*0.64);

  hudHearts.textContent = `❤ ${state.hearts.size}`;
  hudKey.textContent = state.player.hasKey ? '🗝️ Con llave' : '🔒 Sin llave';
}

function frame(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  acc += dt;
  while (acc >= TICK) {
    tick();
    acc -= TICK;
  }
  draw();
  requestAnimationFrame(frame);
}

function startLevel(){
  const p = parseLevel();
  state.base = p.base;
  state.player = p.player;
  state.chest = p.chest;
  state.door = p.door;
  state.hearts = p.hearts;
  state.blocks = p.blocks;
  state.filledWater = p.filledWater;
  state.enemies = p.enemies;
  state.gatesOpen = false;
  state.won = false;
  state.deadUntil = 0;
  state.undo = [];
  updateGates();
  hudMsg.textContent = 'Objetivo: abrir puerta';
  state.initialSnapshot = snapshot();
}

function resetLevel(){
  restore(state.initialSnapshot);
  state.undo = [];
  updateGates();
  hudMsg.textContent = 'Objetivo: abrir puerta';
}

document.getElementById('undoBtn').onclick = () => {
  if (!state.undo.length || state.won) return;
  restore(state.undo.pop());
  updateGates();
};
document.getElementById('resetBtn').onclick = () => resetLevel();

startLevel();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
