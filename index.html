<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Lolo Touch - Retro Edition</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #boardWrap {
      position: absolute;
      inset: 72px 12px 176px;
      overflow: hidden;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }
    #gameCanvas { 
      width: 100%; 
      height: 100%; 
      display: block; 
      touch-action: none; 
      image-rendering: pixelated; 
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      flex-wrap: wrap;
    }
    #hudPrimary {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }
    .pill {
      background: #000;
      border: 2px solid #666;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px #000;
    }
    .pill.interactive {
      pointer-events: auto;
      cursor: pointer;
    }
    #editBtn {
      min-height: 0;
      width: 34px;
      font-size: 17px;
      font-weight: 900;
      line-height: 1;
      padding: 4px 10px;
      border-color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: none;
    }
    #levelDropdown {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 42px);
      left: 8px;
      z-index: 4;
      min-width: 130px;
      border: 2px solid #666;
      background: #000;
      display: none;
      flex-direction: column;
      box-shadow: 2px 2px 0 #000;
    }
    #levelDropdown.visible { display: flex; }
    .level-option {
      border: 0;
      border-bottom: 1px solid #333;
      background: transparent;
      text-align: left;
      padding: 8px;
      min-height: 34px;
      font-size: 13px;
      box-shadow: none;
    }
    .level-option:last-child { border-bottom: 0; }
    #bottomPanel {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      justify-items: center;
      align-items: center;
    }
    #controls {
      position: absolute;
      left: 8px;
      right: 8px;
      top: calc(env(safe-area-inset-top) + 8px);
      z-index: 4;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    #directionalControls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: min(360px, 100%);
    }
    .dir-btn {
      border: 2px solid #666;
      min-height: 42px;
      color: #fff;
      font-size: clamp(18px, 4.8vw, 24px);
      font-weight: 800;
      line-height: 1;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 2px 0 #000;
      background: #000;
      transition: background 120ms ease, border-color 120ms ease;
      text-decoration: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-font-smoothing: none;
      font-variant-emoji: text;
    }
    .dir-btn:focus,
    .dir-btn:focus-visible {
      outline: none;
      text-decoration: none;
    }
    .dir-btn:active {
      background: #333;
      border-color: #fff;
    }
    #moveUpBtn,
    #moveDownBtn {
      grid-column: 2;
    }
    #moveLeftBtn {
      grid-column: 1;
    }
    #moveRightBtn {
      grid-column: 3;
    }
    #moveDownBtn {
      grid-column: 2;
    }
    button {
      border: 2px solid #fff;
      min-height: 46px;
      font-size: 16px;
      color: #fff;
      background: #000;
      font-weight: bold;
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 2px 2px 0px #000;
      cursor: pointer;
    }
    #controls button {
      min-height: 38px;
      height: 38px;
      font-size: 13px;
      padding: 4px;
      border-color: #666;
      text-transform: none;
    }

    #controls #undoBtn,
    #controls #resetBtn {
      border-color: #000;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      text-transform: none;
      font-family: 'Courier New', Courier, monospace;
      -webkit-font-smoothing: none;
      font-variant-emoji: text;
    }
    #controls {
      width: min(420px, 100%);
      justify-self: center;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
      background: #333;
    }

    #editorView {
      --editor-cell-size: clamp(18px, 6vw, 30px);
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #050505;
      color: #fff;
      display: none;
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px);
      overflow: auto;
    }
    #editorView.visible {
      display: block;
    }
    .editor-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 0;
    }
    .editor-primary-actions {
      margin-bottom: 12px;
    }
    .editor-primary-actions .editor-save {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    .editor-actions button {
      min-height: 42px;
      font-size: 13px;
    }
    .editor-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .editor-board-section h3 {
      margin: 0 0 8px;
    }
    .editor-card {
      border: 2px solid #666;
      padding: 8px;
      background: #111;
    }
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, var(--editor-cell-size));
      justify-content: center;
      gap: 6px;
    }
    .palette-tile.active {
      outline: 2px solid #00d4ff;
      outline-offset: 0;
      color: #00d4ff;
    }
    .palette-tile {
      width: var(--editor-cell-size);
      height: var(--editor-cell-size);
      min-height: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
      font-size: 0;
      border: 0;
      box-shadow: none;
    }
    #editorGrid {
      display: grid;
      grid-template-columns: repeat(13, var(--editor-cell-size));
      width: fit-content;
      margin: 0 auto;
      gap: 0;
      background: #000;
      border: 2px solid #666;
      touch-action: none;
    }
    .editor-cell {
      border: 0;
      min-height: var(--editor-cell-size);
      height: var(--editor-cell-size);
      width: var(--editor-cell-size);
      box-shadow: none;
      padding: 0;
      background-color: #000;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
    }
    .editor-cell:active {
      transform: none;
      box-shadow: none;
    }
    .editor-cell.drop-target {
      outline: 2px solid #00d4ff;
      outline-offset: -2px;
      box-shadow: inset 0 0 0 2px rgba(0, 212, 255, 0.35);
    }
    .editor-cell.hover-target {
      outline: 2px dashed #ffe066;
      outline-offset: -2px;
      box-shadow: inset 0 0 0 2px rgba(255, 224, 102, 0.2);
    }
    #editorText {
      width: 100%;
      min-height: 150px;
      background: #000;
      color: #fff;
      border: 2px solid #666;
      font-family: inherit;
      padding: 8px;
      resize: vertical;
      user-select: text;
      -webkit-user-select: text;
    }

    @media (min-width: 1024px) and (pointer: fine) {
      #boardWrap {
        inset: 72px 210px 12px 12px;
      }

      #bottomPanel {
        top: calc(env(safe-area-inset-top) + 56px);
        right: 8px;
        left: auto;
        bottom: auto;
        width: 190px;
        justify-items: stretch;
      }

      #directionalControls {
        width: 100%;
      }
    }
  </style>
</head>

  </div>

const LEVEL_SIZE = 13;
const ALLOWED = new Set(['#','=','V','.','P','H','C','B','~','R','A','M','I','J','K','G','L','T','S','D','N','U','E','O','>','<','^','v']);
function parseLevelRows(raw) {
  const rows = raw.trim().split('\n').map(r => r.trim());
  const h = rows.length;
  const w = rows[0]?.length ?? 0;
  if (!h || !w) throw new Error('Nivel inválido: vacío.');
  if (h !== LEVEL_SIZE || w !== LEVEL_SIZE) {
    throw new Error(`Nivel inválido: debe ser de ${LEVEL_SIZE}x${LEVEL_SIZE}.`);
  }
  for (const row of rows) {
    if (row.length !== w) throw new Error('Nivel inválido: ancho inconsistente.');
    for (const ch of row) if (!ALLOWED.has(ch)) throw new Error('Tile inválido: ' + ch);
  }
  return rows;
}

function syncPrimaryPlayer(){
  state.player = state.players[0] ?? null;
}

function hasPlayersAlive(){
  return state.players.length > 0;
}

function isPlayerAt(x, y, ignoredPlayer = null){
  return state.players.some(player => player !== ignoredPlayer && player.x === x && player.y === y);
}

function nearestPlayerFrom(x, y){
  if (!state.players.length) return null;
  let best = state.players[0];
  let bestDist = Math.abs(best.x - x) + Math.abs(best.y - y);
  for (let i = 1; i < state.players.length; i++) {
    const candidate = state.players[i];
    const dist = Math.abs(candidate.x - x) + Math.abs(candidate.y - y);
    if (dist < bestDist) {
      best = candidate;
      bestDist = dist;
    }
  }
  return best;
}

function buildArrowSprite(direction){
  const canvas = document.createElement('canvas');
  canvas.width = 16;
  canvas.height = 16;
  const c = canvas.getContext('2d');
  if (!c) return null;
  c.clearRect(0, 0, 16, 16);
  c.fillStyle = '#2a1a00';
  if (direction === 'right' || direction === 'left') c.fillRect(4, 7, 8, 2);
  else c.fillRect(7, 4, 2, 8);
  c.beginPath();
  if (direction === 'right') {
    c.moveTo(12, 4); c.lineTo(12, 12); c.lineTo(15, 8);
  } else if (direction === 'left') {
    c.moveTo(4, 4); c.lineTo(4, 12); c.lineTo(1, 8);
  } else if (direction === 'up') {
    c.fillRect(7, 4, 2, 8);
    c.beginPath(); c.moveTo(4, 4); c.lineTo(12, 4); c.lineTo(8, 1);
  } else if (direction === 'down') {
    c.fillRect(7, 4, 2, 8);
    c.beginPath(); c.moveTo(4, 12); c.lineTo(12, 12); c.lineTo(8, 15);
  }
  c.closePath();
  c.fill();

  c.fillStyle = '#ffd447';
  if (direction === 'right' || direction === 'left') c.fillRect(5, 7, 7, 2);
  else c.fillRect(7, 5, 2, 7);
  c.beginPath();
  if (direction === 'right') {
    c.moveTo(11, 5); c.lineTo(11, 11); c.lineTo(14, 8);
  } else if (direction === 'left') {
    c.moveTo(5, 5); c.lineTo(5, 11); c.lineTo(2, 8);
  } else if (direction === 'up') {
    c.beginPath(); c.moveTo(5, 5); c.lineTo(11, 5); c.lineTo(8, 2);
  } else if (direction === 'down') {
    c.beginPath(); c.moveTo(5, 11); c.lineTo(11, 11); c.lineTo(8, 14);
  }
  c.closePath();
  c.fill();

  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  return img;
}

sprites.arrow_right = buildArrowSprite('right');

const SKULL_SHEET = new Image();
const SKULL_SHEET_CANVAS = document.createElement('canvas');
const SKULL_PREVIEW_CANVAS = document.createElement('canvas');
let SKULL_SHEET_READY = false;

const SKULL_SPRITE = {
  originX: 1,
  originY: 67,
  frameW: 32,
  frameH: 32,
  stepX: 33,
  walkFrameMs: 130,
  directions: {
    down: { idle: 0, walk: [0, 1, 0, 1] },
    left: { idle: 2, walk: [2, 3, 2, 3] },
    right: { idle: 2, walk: [2, 3, 2, 3], flip: true },
    up: { idle: 4, walk: [4, 5, 4, 5] },
  },
};

function getSkullFrameRect(index) {
  return {
    sx: SKULL_SPRITE.originX + index * SKULL_SPRITE.stepX,
    sy: SKULL_SPRITE.originY,
    sw: SKULL_SPRITE.frameW,
    sh: SKULL_SPRITE.frameH,
  };
}

function makeSkullPreviewImage(frameIndex, flip = false, targetCanvas = null) {
  if (!SKULL_SHEET_READY) return null;
  const frame = getSkullFrameRect(frameIndex);
  const canvas = targetCanvas ?? document.createElement('canvas');
  canvas.width = SKULL_SPRITE.frameW;
  canvas.height = SKULL_SPRITE.frameH;
  const previewCtx = canvas.getContext('2d');
  if (!previewCtx) return null;
  previewCtx.clearRect(0, 0, canvas.width, canvas.height);
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.save();
  if (flip) {
    previewCtx.translate(canvas.width, 0);
    previewCtx.scale(-1, 1);
    previewCtx.drawImage(SKULL_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, canvas.width, canvas.height);
  } else {
    previewCtx.drawImage(SKULL_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, canvas.width, canvas.height);
  }
  previewCtx.restore();
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  return img;
}

function applySkullPreviewSprite() {
  if (!SKULL_SHEET_READY) return;
  const preview = makeSkullPreviewImage(SKULL_SPRITE.directions.down.idle, false, SKULL_PREVIEW_CANVAS);
  if (preview) sprites.skull = preview;
  refreshEditorVisualsIfVisible();
}

function rebuildSkullSheetTransparency() {
  if (!SKULL_SHEET.naturalWidth || !SKULL_SHEET.naturalHeight) return;
  makeTransparentFromPalette(SKULL_SHEET, SKULL_SHEET_CANVAS, [
    [84, 110, 140],
    [116, 154, 212],
  ], 2);
  SKULL_SHEET_READY = true;
  applySkullPreviewSprite();
}

SKULL_SHEET.addEventListener('load', rebuildSkullSheetTransparency);
SKULL_SHEET.src = SKULL_SHEET_SRC;
if (SKULL_SHEET.complete) rebuildSkullSheetTransparency();

function getSkullFacingDirection(skull) {
  const [dx, dy] = skull.facing || skull.dir || [1, 0];
  if (Math.abs(dx) > Math.abs(dy)) return dx < 0 ? 'left' : 'right';
  if (dy < 0) return 'up';
  if (dy > 0) return 'down';
  return 'right';
}

function setSkullAnimation(skull, fromX, fromY, toX, toY, duration = SKULL_STEP_MS) {
  const dx = Math.sign(toX - fromX);
  const dy = Math.sign(toY - fromY);
  if (dx || dy) skull.facing = [dx, dy];
  skull.anim = {
    fromX,
    fromY,
    toX,
    toY,
    startedAt: performance.now(),
    duration,
  };
}

function getSkullDrawPosition(skull, now = performance.now()) {
  if (!skull.anim) return { x: skull.x, y: skull.y };
  const elapsed = now - skull.anim.startedAt;
  const t = Math.max(0, Math.min(1, elapsed / Math.max(1, skull.anim.duration)));
  if (t >= 1) {
    skull.anim = null;
    return { x: skull.x, y: skull.y };
  }
  return {
    x: skull.anim.fromX + (skull.anim.toX - skull.anim.fromX) * t,
    y: skull.anim.fromY + (skull.anim.toY - skull.anim.fromY) * t,
  };
}

function getSkullFrameIndex(skull, now = performance.now()) {
  const directionName = getSkullFacingDirection(skull);
  const direction = SKULL_SPRITE.directions[directionName] ?? SKULL_SPRITE.directions.right;
  if (!skull.anim) return direction.idle;
  const elapsed = now - skull.anim.startedAt;
  const duration = Math.max(1, skull.anim.duration);
  if (elapsed <= 0) return direction.walk?.[0] ?? direction.idle;
  if (elapsed >= duration) return direction.idle;
  const cycle = direction.walk?.length ? direction.walk : [direction.idle];
  const progress = elapsed / duration;
  const cycleIndex = Math.min(cycle.length - 1, Math.floor(progress * cycle.length));
  return cycle[cycleIndex];
}

function drawSkullSprite(skull, now = performance.now()) {
  if (!SKULL_SHEET_READY) {
    if (!SKULL_SHEET.complete || !SKULL_SHEET.naturalWidth) {
      drawSprite('skull', skull.x, skull.y);
      return;
    }
    rebuildSkullSheetTransparency();
    if (!SKULL_SHEET_READY) {
      drawSprite('skull', skull.x, skull.y);
      return;
    }
  }

  const directionName = getSkullFacingDirection(skull);
  const direction = SKULL_SPRITE.directions[directionName] ?? SKULL_SPRITE.directions.right;
  const frame = getSkullFrameRect(getSkullFrameIndex(skull, now));
  const pos = getSkullDrawPosition(skull, now);
  const px = board.x + pos.x * board.t;
  const py = board.y + pos.y * board.t;

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (direction.flip) {
    ctx.translate(px + board.t, py);
    ctx.scale(-1, 1);
    ctx.drawImage(SKULL_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, board.t, board.t);
  } else {
    ctx.drawImage(SKULL_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, px, py, board.t, board.t);
  }
  ctx.restore();
}

function applyDragonReferenceSprites() {
  for (const [name, src] of Object.entries(DRAGON_SPRITE_SOURCES)) {
    const img = new Image();
    img.src = src;
    sprites[name] = img;
  }

  sprites.dragon_n = sprites.dragon_n_idle;
  sprites.dragon_s = sprites.dragon_s_idle;
  sprites.dragon_e = sprites.dragon_e_idle;
  sprites.dragon_o = sprites.dragon_o_idle;

  sprites.dragon_n_closed = sprites.dragon_n_idle;
  sprites.dragon_s_closed = sprites.dragon_s_idle;
  sprites.dragon_e_closed = sprites.dragon_e_idle;
  sprites.dragon_o_closed = sprites.dragon_o_idle;
}

applyDragonReferenceSprites();

      Math.abs(data[i] - bg.r) <= 1 &&
      Math.abs(data[i + 1] - bg.g) <= 1 &&
      Math.abs(data[i + 2] - bg.b) <= 1
    ) {
      data[i + 3] = 0;
    }
  }
  targetCtx.putImageData(imageData, 0, 0);
  return targetCanvas;
}

function makeTransparentFromPalette(source, targetCanvas, palette, tolerance = 2) {
  if (!source.naturalWidth || !source.naturalHeight) return null;
  targetCanvas.width = source.naturalWidth;
  targetCanvas.height = source.naturalHeight;
  const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
  targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
  targetCtx.drawImage(source, 0, 0);

  const imageData = targetCtx.getImageData(0, 0, targetCanvas.width, targetCanvas.height);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    for (const color of palette) {
      if (
        Math.abs(data[i] - color[0]) <= tolerance &&
        Math.abs(data[i + 1] - color[1]) <= tolerance &&
        Math.abs(data[i + 2] - color[2]) <= tolerance
      ) {
        data[i + 3] = 0;
        break;
      }
    }
  }
  targetCtx.putImageData(imageData, 0, 0);
  return targetCanvas;
}

function applyArdillaPreviewSprite() {
  if (!ARDILLA_PREVIEW.complete || !ARDILLA_PREVIEW.naturalWidth) return;
  sprites.ardilla = makeColorKeyTransparent(ARDILLA_PREVIEW, ARDILLA_PREVIEW_CANVAS) || ARDILLA_PREVIEW;
  refreshEditorVisualsIfVisible();
}

function rebuildArdillaSheetTransparency() {
  if (!ARDILLA_SHEET.naturalWidth || !ARDILLA_SHEET.naturalHeight) return;
  makeColorKeyTransparent(ARDILLA_SHEET, ARDILLA_SHEET_CANVAS);
  ARDILLA_SHEET_READY = true;
  refreshEditorVisualsIfVisible();
}

const LEEPER_SHEET = new Image();
const LEEPER_SHEET_CANVAS = document.createElement('canvas');
const LEEPER_PREVIEW_CANVAS = document.createElement('canvas');
const LEEPER_SLEEP_PREVIEW_CANVAS = document.createElement('canvas');
let LEEPER_SHEET_READY = false;

const LEEPER_SPRITE = {
  originX: 1,
  originY: 133,
  frameW: 32,
  frameH: 32,
  stepX: 33,
  walkFrameMs: 120,
  sleepFrameMs: 300,
  directions: {
    down: { idle: 0, walk: [0, 1, 0, 1] },
    right: { idle: 2, walk: [2, 3, 2, 3], flip: true },
    left: { idle: 2, walk: [2, 3, 2, 3] },
    up: { idle: 4, walk: [4, 5, 4, 5] },
  },
  sleep: { idle: 6, cycle: [6, 7, 6, 7] },
};

function getLeeperFrameRect(index) {
  return {
    sx: LEEPER_SPRITE.originX + index * LEEPER_SPRITE.stepX,
    sy: LEEPER_SPRITE.originY,
    sw: LEEPER_SPRITE.frameW,
    sh: LEEPER_SPRITE.frameH,
  };
}

function makeLeeperPreviewImage(frameIndex, flip = false, targetCanvas = null) {
  if (!LEEPER_SHEET_READY) return null;
  const frame = getLeeperFrameRect(frameIndex);
  const canvas = targetCanvas ?? document.createElement('canvas');
  canvas.width = LEEPER_SPRITE.frameW;
  canvas.height = LEEPER_SPRITE.frameH;
  const previewCtx = canvas.getContext('2d');
  if (!previewCtx) return null;
  previewCtx.clearRect(0, 0, canvas.width, canvas.height);
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.save();
  if (flip) {
    previewCtx.translate(canvas.width, 0);
    previewCtx.scale(-1, 1);
    previewCtx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, canvas.width, canvas.height);
  } else {
    previewCtx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, canvas.width, canvas.height);
  }
  previewCtx.restore();
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  return img;

function getLeeperFacingDirection(leeper) {
  const [dx, dy] = leeper.facing || leeper.dir || [0, 1];
  if (Math.abs(dx) > Math.abs(dy)) return dx < 0 ? 'left' : 'right';
  if (dy < 0) return 'up';
  if (dy > 0) return 'down';
  return 'down';
}

function setLeeperAnimation(leeper, fromX, fromY, toX, toY, duration = SKULL_STEP_MS) {
  const dx = Math.sign(toX - fromX);
  const dy = Math.sign(toY - fromY);
  if (dx || dy) leeper.facing = [dx, dy];
  leeper.anim = {
    fromX,
    fromY,
    toX,
    toY,
    startedAt: performance.now(),
    duration,
  };
}

function getLeeperDrawPosition(leeper, now = performance.now()) {
  if (!leeper.anim) return { x: leeper.x, y: leeper.y };
  const elapsed = now - leeper.anim.startedAt;
  const t = Math.max(0, Math.min(1, elapsed / Math.max(1, leeper.anim.duration)));
  if (t >= 1) {
    leeper.anim = null;
    return { x: leeper.x, y: leeper.y };
  }
  return {
    x: leeper.anim.fromX + (leeper.anim.toX - leeper.anim.fromX) * t,
    y: leeper.anim.fromY + (leeper.anim.toY - leeper.anim.fromY) * t,
  };
}

function getLeeperWalkFrameIndex(leeper, now = performance.now()) {
  const directionName = getLeeperFacingDirection(leeper);
  const direction = LEEPER_SPRITE.directions[directionName] ?? LEEPER_SPRITE.directions.down;
  if (!leeper.anim) return direction.idle;
  const elapsed = now - leeper.anim.startedAt;
  const duration = Math.max(1, leeper.anim.duration);
  if (elapsed <= 0) return direction.walk?.[0] ?? direction.idle;
  if (elapsed >= duration) return direction.idle;
  const cycle = direction.walk?.length ? direction.walk : [direction.idle];
  const progress = elapsed / duration;
  const cycleIndex = Math.min(cycle.length - 1, Math.floor(progress * cycle.length));
  return cycle[cycleIndex];
}

function getLeeperSleepFrameIndex(now = performance.now()) {
  const cycle = LEEPER_SPRITE.sleep.cycle;
  const step = Math.floor(now / LEEPER_SPRITE.sleepFrameMs) % cycle.length;
  return cycle[step];
}

function drawLeeperSprite(leeper, now = performance.now()) {
  if (!LEEPER_SHEET_READY) {
    if (!LEEPER_SHEET.complete || !LEEPER_SHEET.naturalWidth) {
      drawSprite(leeper.asleep ? 'leeper_sleep' : 'leeper', leeper.x, leeper.y);
      return;
    }
    rebuildLeeperSheetTransparency();
    if (!LEEPER_SHEET_READY) {
      drawSprite(leeper.asleep ? 'leeper_sleep' : 'leeper', leeper.x, leeper.y);
      return;
    }
  }

  const isSleeping = leeper.asleep && !leeper.anim;
  const frameIndex = isSleeping
    ? getLeeperSleepFrameIndex(now)
    : getLeeperWalkFrameIndex(leeper, now);
  const directionName = getLeeperFacingDirection(leeper);
  const direction = LEEPER_SPRITE.directions[directionName] ?? LEEPER_SPRITE.directions.down;
  const frame = getLeeperFrameRect(frameIndex);
  const pos = getLeeperDrawPosition(leeper, now);
  const px = board.x + pos.x * board.t;
  const py = board.y + pos.y * board.t;

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (!isSleeping && direction.flip) {
    ctx.translate(px + board.t, py);
    ctx.scale(-1, 1);
    ctx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, 0, 0, board.t, board.t);
  } else {
    ctx.drawImage(LEEPER_SHEET_CANVAS, frame.sx, frame.sy, frame.sw, frame.sh, px, py, board.t, board.t);
  }
  ctx.restore();
}

function key(x,y){ return `${x},${y}`; }
function has(set,x,y){ return set.has(key(x,y)); }
function setFromArr(arr){ return new Set(arr.map(p => key(p.x,p.y))); }
function arrFromSet(set){ return [...set].map(s=>{ const [x,y] = s.split(',').map(Number); return {x,y}; }); }
function inBounds(x,y){ return x>=0 && y>=0 && x<W && y<H; }
function isWallTile(tile){ return tile === '#' || tile === '='; }
function arrowDirectionForTile(tile){
  if (tile === '>') return [1, 0];
  if (tile === '<') return [-1, 0];
  if (tile === '^') return [0, -1];
  if (tile === 'v') return [0, 1];
  return null;
}
function canTraverseArrow(tile, dx, dy){
  const arrowDir = arrowDirectionForTile(tile);
  if (!arrowDir) return true;
  return dx === arrowDir[0] && dy === arrowDir[1];
}
function baseWallAt(x,y){
  return inBounds(x,y) && isWallTile(state.base[y][x]);
}
function getWallSpriteName(x,y){
  const tile = state.base[y][x];
  if (!isWallTile(tile)) return 'wall_left';

  const forceTop = tile === '=';
  const up = !forceTop && baseWallAt(x, y - 1);
  const down = baseWallAt(x, y + 1);
  const left = baseWallAt(x - 1, y);
  const right = baseWallAt(x + 1, y);

  const exposedUp = !up;
  const exposedDown = !down;
  const exposedLeft = !left;
  const exposedRight = !right;

  if (exposedUp && exposedLeft) return 'wall_top_left';
  if (exposedUp && exposedRight) return 'wall_top_right';
  if (exposedDown && exposedLeft) return 'wall_bottom_left';
  if (exposedDown && exposedRight) return 'wall_bottom_right';
  if (exposedUp) return 'wall_top';
  if (exposedDown) return 'wall_bottom';
  if (exposedLeft) return 'wall_left';
  if (exposedRight) return 'wall_right';
  return forceTop ? 'wall_top' : 'wall_left';
}
function chestOpen(){ return state.hearts.size === 0; }
function enemyAt(x,y){ return state.enemies.find(e => e.x===x && e.y===y); }
function fireballAt(x,y){ return state.fireballs.find(f => Math.round(f.x)===x && Math.round(f.y)===y); }

function setPlayerAnimation(fromX, fromY, toX, toY){
  playerAnim = { fromX, fromY, toX, toY, startedAt: performance.now(), duration: PLAYER_MOVE_MS };
}

function setPlayerAnimationCustom(fromX, fromY, toX, toY, duration){
  playerAnim = { fromX, fromY, toX, toY, startedAt: performance.now(), duration };
}

function clearPlayerAnimation(){
  playerAnim = null;
}

function getPlayerDrawPosition(now = performance.now(), player = state.players[0]){
  if (!player) return null;
  if (!playerAnim && player === state.players[0]) return { x: player.x + keyboardOffset.x, y: player.y + keyboardOffset.y };
  if (!playerAnim || player !== state.players[0]) return { x: player.x, y: player.y };
  const elapsed = now - playerAnim.startedAt;
  const t = Math.max(0, Math.min(1, elapsed / Math.max(1, playerAnim.duration)));
  if (t >= 1) {
    playerAnim = null;
    return { x: player.x + keyboardOffset.x, y: player.y + keyboardOffset.y };
  }
  const easedT = t;
  return {
    x: playerAnim.fromX + (playerAnim.toX - playerAnim.fromX) * easedT,
    y: playerAnim.fromY + (playerAnim.toY - playerAnim.fromY) * easedT,
  };
}

function isFireballTouchingAnyPlayer(fireball, now = performance.now()){
  const fireTileX = Math.round(fireball.x);
  const fireTileY = Math.round(fireball.y);
  for (const player of state.players) {
    if (fireTileX === player.x && fireTileY === player.y) return player;
    const playerPos = getPlayerDrawPosition(now, player);
    if (!playerPos) continue;
    const dx = fireTileX - playerPos.x;
    const dy = fireTileY - playerPos.y;
    if ((dx * dx + dy * dy) <= 0.35) return player;
  }
  return null;
}

function parseLevel(){
  const base = Array.from({ length:H }, () => Array(W).fill('.'));
  const hearts = [];
  const blocks = [];
  const enemies = [];
  const players = [];
  let chest = null;
  let door = null;

  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    const ch = LEVEL[y][x];
    if ('#=V.~TCDSR><^v'.includes(ch)) base[y][x] = ch;
    if (ch === 'P') players.push({ x, y, facing:[1,0] });
    if (ch === 'H') hearts.push({ x, y });
    if (ch === 'A') enemies.push({ type:'ardilla', x, y, charge:0, alert:false });
    if (ch === 'M') enemies.push({ type:'medusa', x, y, charge:0, alert:false });
    if (ch === 'I') enemies.push({ type:'don_medusa', axis:'horizontal', x, y, dir:[1,0], charge:0, alert:false, nextStepAt:0 });
    if (ch === 'J') enemies.push({ type:'don_medusa', axis:'vertical', x, y, dir:[0,1], charge:0, alert:false, nextStepAt:0 });
    if (ch === 'K') enemies.push({ type:'rocky', x, y, dir:[1,0], facing:[1,0], mode:'patrol', anim:null });
    if (ch === 'G') enemies.push({ type:'skull', x, y, dir:[1,0], facing:[1,0], pendingTurns:[], prefHorizontal:1, prefVertical:1, anim:null });
    if (ch === 'L') enemies.push({ type:'leeper', x, y, dir:[1,0], facing:[0,1], pendingTurns:[], prefHorizontal:1, prefVertical:1, asleep:false, anim:null });
    if (ch === 'N') enemies.push({ type:'dragon', x, y, dir:[0,-1], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'U') enemies.push({ type:'dragon', x, y, dir:[0,1], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'E') enemies.push({ type:'dragon', x, y, dir:[1,0], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'O') enemies.push({ type:'dragon', x, y, dir:[-1,0], coolDownUntil:0, wasSeeingPlayer:false });
    if (ch === 'B') blocks.push({ x, y });
    if (ch === 'C') chest = { x, y };
    if (ch === 'D') door = { x, y };
  }
  return { base, players, chest, door, hearts:setFromArr(hearts), blocks:setFromArr(blocks), filledWater:new Set(), enemies };
}

function snapshot(){
  return {
    players: state.players.map(player => ({ ...player })),
    hearts: arrFromSet(state.hearts),
    shots: state.shots,
    blocks: arrFromSet(state.blocks),
    eggs: arrFromSet(state.eggs),
    eggTimers: [...state.eggTimers.entries()].map(([pos, hatchAt]) => { const [x,y] = pos.split(',').map(Number); return { x, y, hatchAt }; }),
    filledWater: arrFromSet(state.filledWater),
    enemies: state.enemies.map(e => ({ ...e })),
    doorOpen: state.doorOpen,
    frozenUntil: state.frozenUntil,
    medusaShot: state.medusaShot ? { ...state.medusaShot } : null,
    fireballs: state.fireballs.map(f => ({ ...f })),
    keyCollected: Boolean(state.keyCollected),
    explosions: state.explosions.map(explosion => ({ ...explosion })),
  };
}

function restore(s){
  state.players = (s.players ?? (s.player ? [s.player] : [])).map(player => ({ ...player }));
  syncPrimaryPlayer();
  state.hearts = setFromArr(s.hearts);
  state.shots = s.shots ?? 0;
  state.blocks = setFromArr(s.blocks);
  state.eggs = setFromArr(s.eggs);
  state.eggTimers = new Map((s.eggTimers ?? []).map(t => [key(t.x, t.y), t.hatchAt]));
  state.filledWater = setFromArr(s.filledWater);
  state.enemies = s.enemies.map(e => ({ ...e }));
  state.doorOpen = Boolean(s.doorOpen);
  state.won = false;
  state.deadUntil = 0;
  state.frozenUntil = 0;
  state.medusaShot = null;
  state.fireballs = (s.fireballs ?? []).map(f => ({ ...f }));
  state.resetFlashUntil = 0;
  state.keyCollected = Boolean(s.keyCollected);
  state.explosions = (s.explosions ?? []).map(explosion => ({ ...explosion }));
  keyboardOffset = { x: 0, y: 0 };
  clearPlayerAnimation();
}

function triggerEnemyExplosion(){
  const now = performance.now();
  const exploded = [];
  for (const enemy of state.enemies) exploded.push({ x: enemy.x, y: enemy.y, startedAt: now, life: EXPLOSION_FLASH_MS });
  for (const egg of arrFromSet(state.eggs)) exploded.push({ x: egg.x, y: egg.y, startedAt: now, life: EXPLOSION_FLASH_MS });
  if (!exploded.length) return;
  state.explosions.push(...exploded);
  state.enemies = [];
  state.eggs = new Set();
  state.eggTimers = new Map();
  state.medusaShot = null;
  state.fireballs = [];
  state.frozenUntil = 0;
  setHudMessage('¡La llave destruyó a todos los enemigos!');
  navigator.vibrate?.([20, 20, 45]);
}

function pushUndoSnapshot(undoSnapshot){
  state.undo.push(undoSnapshot);
}

function pushUndo(){
  pushUndoSnapshot(snapshot());
}

function passableForPlayer(x,y,ignorePushables=false,dx=0,dy=0){
  if (!inBounds(x,y)) return false;
  if (!ignorePushables) {
    if (has(state.blocks,x,y)) return false;
    if (has(state.eggs,x,y) && !has(state.filledWater,x,y)) return false;
  }
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S') return false;
  if (b === '~' && !has(state.filledWater,x,y)) return false;
  if (b === 'C' && !chestOpen()) return false;
  if (b === 'D' && !state.doorOpen) return false;
  if (!canTraverseArrow(b, dx, dy)) return false;
  return !enemyAt(x,y) && !fireballAt(x,y);
}

function isPlayerFrozen(){
  return state.frozenUntil && performance.now() < state.frozenUntil;
}

function removePlayer(player){
  if (!player) return;
  const index = state.players.indexOf(player);
  if (index >= 0) state.players.splice(index, 1);
  syncPrimaryPlayer();
}

function killPlayer(player = state.player){
  if (state.won || !player) return;
  removePlayer(player);
  navigator.vibrate?.(40);
  if (hasPlayersAlive()) return;
  const now = performance.now();
  state.deadUntil = now + 350;
  state.frozenUntil = now + 350;
}

function winLevel(){
  state.won = true;
  setHudMessage('¡Pantalla completada!');
  navigator.vibrate?.([30,30,60]);
  window.setTimeout(() => {
    currentLevelIndex = (currentLevelIndex + 1) % LEVELS_RAW.length;
    currentLevelRaw = LEVELS_RAW[currentLevelIndex];
    startLevel();
    resize();
  }, 450);
}

function attemptPush(setRef, fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  if (isWallTile(t) || t === 'V' || t === 'T' || t === 'C' || t === 'D' || t === 'S') return false;
  if (setRef === state.eggs && t === 'H') return false;
  const fromKey = key(fromX,fromY);
  const toKey = key(nx,ny);
  const eggHatchAt = setRef === state.eggs ? state.eggTimers.get(fromKey) : null;
  setRef.delete(fromKey);
  if (setRef === state.eggs) state.eggTimers.delete(fromKey);
  if (t === '~' && !has(state.filledWater,nx,ny)) {
    state.filledWater.add(toKey);
    if (setRef === state.eggs) {
      setRef.add(toKey);
    }
  } else {
    setRef.add(toKey);
    if (setRef === state.eggs && eggHatchAt != null) state.eggTimers.set(toKey, eggHatchAt);
  }
  return true;
}

function tryMoveSinglePlayer(player, dx, dy, animate = false){
  if (!player || isPlayerFrozen()) return false;
  state.player = player;
  const tx = player.x + dx;
  const ty = player.y + dy;
  if (!inBounds(tx,ty)) return false;
  player.facing = [dx,dy];

  if (enemyAt(tx,ty) || isPlayerAt(tx, ty, player)) return false;

  if (has(state.blocks,tx,ty)) {
    if (!attemptPush(state.blocks, tx, ty, dx, dy)) return false;
  } else if (has(state.eggs,tx,ty)) {
    if (!has(state.filledWater,tx,ty)) {
      if (!attemptPush(state.eggs, tx, ty, dx, dy)) return false;
    }
  } else if (!passableForPlayer(tx,ty,true,dx,dy)) {
    return false;
  }

  const fromX = player.x;
  const fromY = player.y;
  player.x = tx;
  player.y = ty;
  if (animate) setPlayerAnimation(fromX, fromY, tx, ty);
  const heartKey = key(tx,ty);
  if (state.hearts.has(heartKey)) {
    state.hearts.delete(heartKey);
    state.shots += 1;
    setHudMessage('¡Ganaste 1 disparo!');
  }
  if (!state.doorOpen && chestOpen() && state.chest && tx === state.chest.x && ty === state.chest.y) {
    if (!state.keyCollected) {
      state.keyCollected = true;
      triggerEnemyExplosion();
    }
    state.doorOpen = true;
    setHudMessage('¡Puerta abierta!');
  }
  if (state.doorOpen && state.door && tx === state.door.x && ty === state.door.y) return winLevel(), true;
  if (state.fireballs.some(fireball => isFireballTouchingAnyPlayer(fireball))) killPlayer(player);
  const now = performance.now();
  updateDragonThreat(now);
  // La amenaza de medusa se resuelve en tick(), después del movimiento enemigo del turno.
  return true;
}

function tryMovePlayer(dx,dy){
  if (isPlayerFrozen() || !hasPlayersAlive()) return false;
  const players = [...state.players];
  let moved = false;
  for (let i = 0; i < players.length; i++) {
    if (!state.players.includes(players[i])) continue;
    if (tryMoveSinglePlayer(players[i], dx, dy, i === 0)) moved = true;
  }
  syncPrimaryPlayer();
  return moved;
}

function shootFromPlayer(player){
  state.player = player;
  const [dx,dy] = player.facing;
  if (!dx && !dy) return false;
  const x = player.x + dx;
  const y = player.y + dy;
  if (!inBounds(x,y)) return false;
  const hit = enemyAt(x,y);
  if (hit && (hit.type === 'ardilla' || hit.type === 'leeper' || hit.type === 'skull' || hit.type === 'dragon')) {
    state.enemies = state.enemies.filter(v => v !== hit);
    const eggPos = key(x,y);
    state.eggs.add(eggPos);
    state.eggTimers.set(eggPos, performance.now() + EGG_HATCH_MS);
    state.shots -= 1;
    setHudMessage('¡Enemigo convertido en huevo!');
    navigator.vibrate?.(20);
    return true;
  }
  if (has(state.eggs,x,y)) {
    const eggPos = key(x,y);
    state.eggs.delete(eggPos);
    state.eggTimers.delete(eggPos);
    state.shots -= 1;
    setHudMessage('¡Huevo eliminado!');
    navigator.vibrate?.(15);
    return true;
  }
  return false;
}

function shoot(){
  if (isPlayerFrozen() || !hasPlayersAlive()) return false;
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  let acted = false;
  for (const player of [...state.players]) {
    if (!state.players.includes(player) || state.shots <= 0) continue;
    if (shootFromPlayer(player)) acted = true;
  }
  syncPrimaryPlayer();
  if (!acted) setHudMessage('Acércate a una ardilla, leeper, calavera, dragón o huevo para disparar');
  return acted;
}

function interactAdjacent(dx,dy){
  if (isPlayerFrozen() || !hasPlayersAlive()) return false;
  if (state.shots <= 0) {
    setHudMessage('Sin disparos: recoge corazones');
    return false;
  }
  let acted = false;
  for (const player of [...state.players]) {
    if (state.shots <= 0) break;
    const x = player.x + dx;
    const y = player.y + dy;
    if (!inBounds(x,y)) continue;
    player.facing = [dx, dy];
    if (shootFromPlayer(player)) acted = true;
  }
  syncPrimaryPlayer();
  return acted;
}

function tryKeyboardShot(){
  if (!state.player || !hasPlayersAlive()) return false;
  const [facingDx, facingDy] = state.player.facing;
  if (interactAdjacent(facingDx, facingDy)) return true;

  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    if (dx === facingDx && dy === facingDy) continue;
    if (interactAdjacent(dx, dy)) {
      state.player.facing = [dx, dy];
      return true;
    }
  }

  return shoot();
}

function getAdjacentShootableTargets(){
  if (state.shots <= 0 || isPlayerFrozen() || !state.player || !hasPlayersAlive()) return [];
  const targets = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx,dy] of dirs) {
    const x = state.player.x + dx;
    const y = state.player.y + dy;
    if (!inBounds(x,y)) continue;
    const hit = enemyAt(x,y);
    if ((hit && (hit.type === 'ardilla' || hit.type === 'leeper' || hit.type === 'skull' || hit.type === 'dragon')) || has(state.eggs,x,y)) targets.push({ x, y });
  }
  return targets;
}

function tapToTile(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - board.x) / board.t;
  const y = (clientY - rect.top - board.y) / board.t;
  return {
    x: Math.max(0, Math.min(W-1, Math.round(x - 0.5))),
    y: Math.max(0, Math.min(H-1, Math.round(y - 0.5))),
  };
}

function canDragThrough(fromX,fromY,x,y){
  if (!state.player) return false;
  if (x === state.player.x && y === state.player.y) return true;
  return passableForPlayer(x,y,true,x - fromX,y - fromY);
}

function appendStepToPath(path, tile){
  const last = path[path.length - 1];
  if (!last) {
    path.push(tile);
    return;
  }
  if (last.x === tile.x && last.y === tile.y) return;

  let cx = last.x;
  let cy = last.y;
  while (cx !== tile.x || cy !== tile.y) {
    const dx = tile.x - cx;
    const dy = tile.y - cy;

    const horizontalFirst = Math.abs(dx) >= Math.abs(dy);
    const candidates = [];
    if (horizontalFirst) {
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
    } else {
      if (dy !== 0) candidates.push({ x: cx, y: cy + Math.sign(dy) });
      if (dx !== 0) candidates.push({ x: cx + Math.sign(dx), y: cy });
    }

    const next = candidates.find(c => canDragThrough(cx, cy, c.x, c.y));
    if (!next) break;

    cx = next.x;
    cy = next.y;
    if (path[path.length - 1].x !== cx || path[path.length - 1].y !== cy) path.push({ x: cx, y: cy });
  }
}


function isPlanningDragActive(){
  return activePointerId !== null && dragPath.length > 0;
}

function getRenderNow(){
  return performance.now();
}
function clearPathInput(){
  activePointerId = null;
  dragPath = [];
  activePointerTile = null;
  dragFreezeNow = null;
  dragQueuedStepIndex = 0;
  lastDragStepReadyAt = 0;
}

function getDragAvailableTiles(){
  if (!dragPath.length) return [];
  const tip = dragPath[dragPath.length - 1];
  const options = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    const nx = tip.x + dx;
    const ny = tip.y + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
    if (canDragThrough(tip.x, tip.y, nx, ny)) options.push({ x: nx, y: ny });
  }
  if (dragPath.length > 1) {
    const prev = dragPath[dragPath.length - 2];
    if (!options.some(v => v.x === prev.x && v.y === prev.y)) options.push({ x: prev.x, y: prev.y });
  }
  return options;
}

function clearKeyboardInput(){
  keyboardHoldAcc = 0;
  keyboardRepeatDelayMs = 0;
  activeKeyboardDirKey = null;
  pressedMovementKeys.clear();
}

function canPushAt(fromX, fromY, dx, dy){
  const nx = fromX + dx;
  const ny = fromY + dy;
  if (!inBounds(nx,ny) || has(state.blocks,nx,ny) || has(state.eggs,nx,ny) || enemyAt(nx,ny)) return false;
  const t = state.base[ny][nx];
  return !(isWallTile(t) || t === 'V' || t === 'T' || t === 'C' || t === 'D' || t === 'S');
}

function canAdvanceKeyboard(dx, dy){
  for (const player of state.players) {
    const tx = player.x + dx;
    const ty = player.y + dy;
    if (!inBounds(tx,ty) || enemyAt(tx,ty) || isPlayerAt(tx, ty, player)) continue;
    if (has(state.blocks,tx,ty)) { if (canPushAt(tx, ty, dx, dy)) return true; continue; }
    if (has(state.eggs,tx,ty) && !has(state.filledWater,tx,ty)) { if (canPushAt(tx, ty, dx, dy)) return true; continue; }
    if (passableForPlayer(tx,ty,true,dx,dy)) return true;
  }
  return false;
}

function performKeyboardHalfStep(dx, dy){
  if (state.won || state.deadUntil || isPlayerFrozen() || isEditorOpen || !state.player) return false;
  if (queuedMoves.length) queuedMoves = [];
  keyboardOffset = { x: 0, y: 0 };
  if (!canAdvanceKeyboard(dx, dy)) return false;
  const fromAbsX = state.player.x;
  const fromAbsY = state.player.y;
  const undoSnapshot = snapshot();
  pushUndoSnapshot(undoSnapshot);
  if (!tryMovePlayer(dx, dy)) {
    state.undo.pop();
    return false;
  }
  if (state.player) {
    setPlayerAnimationCustom(fromAbsX, fromAbsY, state.player.x, state.player.y, KEYBOARD_HALF_STEP_MS);
  }
  return true;
}

function performDirectionalMove(dx, dy){
  if (state.won || state.deadUntil || isPlayerFrozen() || isEditorOpen) return false;
  if (queuedMoves.length) queuedMoves = [];
  state.player.facing = [dx, dy];
  const undoSnapshot = snapshot();
  if (interactAdjacent(dx, dy)) {
    pushUndoSnapshot(undoSnapshot);
    return true;
  }
  enqueueMove(dx, dy, undoSnapshot);
  return true;
}

function clearDirectionalHold(){
  if (directionalHoldInterval) {
    clearInterval(directionalHoldInterval);
    directionalHoldInterval = null;
  }
  directionalPointerStart = null;
  directionalPointerMoved = false;
  directionalPointerTriggered = false;
  activeDirectionalButton = null;
  activeDirectionalPointerId = null;
}

function clearDirectionalFocus(){
  const active = document.activeElement;
  if (active?.classList?.contains('dir-btn')) active.blur();
}

function triggerDirectionalButton(button){
  if (!button) return false;
  const dx = Number(button.dataset.dx);
  const dy = Number(button.dataset.dy);
  if (!Number.isFinite(dx) || !Number.isFinite(dy)) return false;
  return performDirectionalMove(dx, dy);
}

function setDirectionalHold(button, pointerId){
  if (!button) return;
  activeDirectionalButton = button;
  activeDirectionalPointerId = pointerId;
  clearInterval(directionalHoldInterval);
  directionalHoldInterval = setInterval(() => {
    if (!activeDirectionalButton) return;
    triggerDirectionalButton(activeDirectionalButton);
  }, DIRECTIONAL_HOLD_INTERVAL);
}

function getDirectionalButtonFromPoint(clientX, clientY){
  const target = document.elementFromPoint(clientX, clientY);
  return target?.closest?.('.dir-btn') ?? null;
}

function getDirectionalButtonFromDelta(dx, dy){
  if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return null;
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0 ? moveRightBtn : moveLeftBtn;
  }
  return dy > 0 ? moveDownBtn : moveUpBtn;
}

function getDirectionalButtonFromControlCenter(clientX, clientY){
  if (!directionalControls) return null;
  const rect = directionalControls.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  const dx = clientX - centerX;
  const dy = clientY - centerY;
  if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return null;
  if (Math.abs(dx) >= Math.abs(dy)) {
    return dx >= 0 ? moveRightBtn : moveLeftBtn;
  }
  return dy >= 0 ? moveDownBtn : moveUpBtn;
}

function enqueueMove(dx, dy, undoSnapshot = null, intervalMs = MOVE_INTERVAL, readyAt = null){
  queuedMoves.push({ dx, dy, undoSnapshot, intervalMs, readyAt });
  if (queuedMoves.length === 1 && readyAt === null) moveAcc = intervalMs;
}

function queueDraggedPath(now = performance.now()){
  if (dragPath.length < 2) return;
  while (dragQueuedStepIndex < dragPath.length - 1) {
    const prev = dragPath[dragQueuedStepIndex];
    const next = dragPath[dragQueuedStepIndex + 1];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    if (Math.abs(dx) + Math.abs(dy) === 1) {
      const readyAt = Math.max(lastDragStepReadyAt + DRAG_PATH_MOVE_INTERVAL, now + DRAG_PATH_DELAY_MS);
      enqueueMove(dx, dy, null, DRAG_PATH_MOVE_INTERVAL, readyAt);
      lastDragStepReadyAt = readyAt;
    }
    dragQueuedStepIndex += 1;
  }
}

function rebaseDragPathFromPlayer(now = performance.now()){
  if (!isPlanningDragActive()) return;
  dragPath = [{ x: state.player.x, y: state.player.y }];
  dragQueuedStepIndex = 0;
  lastDragStepReadyAt = now;
  if (activePointerTile) appendStepToPath(dragPath, activePointerTile);
  queueDraggedPath(now);
}

function processQueuedMove(){
  if (!queuedMoves.length || state.won || state.deadUntil || isPlayerFrozen()) return false;
  const nextMove = queuedMoves.shift();
  const undoSnapshot = nextMove.undoSnapshot ?? snapshot();
  pushUndoSnapshot(undoSnapshot);
  if (!tryMovePlayer(nextMove.dx, nextMove.dy)) {
    state.undo.pop();
    if (isPlanningDragActive()) {
      queuedMoves = [];
      rebaseDragPathFromPlayer();
    }
  }
  return true;
}

canvas.addEventListener('pointerdown', e => {
  if (state.won || isEditorOpen || isPlayerFrozen()) return;
  const t = tapToTile(e.clientX, e.clientY);
  if (t.x === state.player.x && t.y === state.player.y) {
    activePointerId = e.pointerId;
    queuedMoves = [];
    dragPath = [{ x: state.player.x, y: state.player.y }];
    dragQueuedStepIndex = 0;
    lastDragStepReadyAt = 0;
    activePointerTile = t;
    canvas.setPointerCapture(e.pointerId);
    return;
  }

  const dx = t.x - state.player.x;
  const dy = t.y - state.player.y;
  if (Math.abs(dx) + Math.abs(dy) === 1) {
    const stepX = Math.sign(dx);
    const stepY = Math.sign(dy);
    state.player.facing = [stepX, stepY];
    const undoSnapshot = snapshot();
    if (interactAdjacent(stepX, stepY)) {
      pushUndoSnapshot(undoSnapshot);
      return;
    }
    enqueueMove(stepX, stepY, undoSnapshot);
    return;
  }
  if (dx === 0 || dy === 0) {
    state.player.facing = [Math.sign(dx), Math.sign(dy)];
    pushUndo();
    if (!shoot()) state.undo.pop();
  }
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointerId || !dragPath.length) return;
  const tile = tapToTile(e.clientX, e.clientY);
  activePointerTile = tile;
  appendStepToPath(dragPath, tile);
  queueDraggedPath();
});

function handlePointerEnd(e){
  if (e.pointerId !== activePointerId) return;
  queuedMoves = [];
  clearPathInput();
}

canvas.addEventListener('pointerup', handlePointerEnd);
canvas.addEventListener('pointercancel', handlePointerEnd);

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (isEditorOpen || state.won || state.deadUntil || isPlayerFrozen()) return;
    pushUndo();
    if (!tryKeyboardShot()) state.undo.pop();
    return;
  }

  const movement = KEY_DIRECTIONS[e.key];
  if (!movement) return;
  e.preventDefault();
  if (isEditorOpen || state.won || state.deadUntil || isPlayerFrozen()) return;
  if (e.repeat && pressedMovementKeys.has(e.key)) return;
  pressedMovementKeys.add(e.key);
  activeKeyboardDirKey = e.key;
  keyboardHoldAcc = 0;
  keyboardRepeatDelayMs = KEYBOARD_REPEAT_INITIAL_DELAY;
  const [dx, dy] = movement;
  performKeyboardHalfStep(dx, dy);
});

document.addEventListener('keyup', (e) => {
  if (!KEY_DIRECTIONS[e.key]) return;
  pressedMovementKeys.delete(e.key);
  if (activeKeyboardDirKey === e.key) {
    const remaining = [...pressedMovementKeys];
    activeKeyboardDirKey = remaining.length ? remaining[remaining.length - 1] : null;
    keyboardRepeatDelayMs = activeKeyboardDirKey ? KEYBOARD_REPEAT_INITIAL_DELAY : 0;
  }
  keyboardHoldAcc = 0;
});

window.addEventListener('blur', () => {
  clearKeyboardInput();
  clearDirectionalHold();
});

function blockedForDragonSight(x,y){
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'C' || b === 'D' || b === 'S' || b === 'T') return true;
  if (has(state.blocks,x,y) || has(state.eggs,x,y)) return true;
  if (enemyAt(x,y)) return true;
  return false;
}


function sameDir(a, b){
  return a && b && a[0] === b[0] && a[1] === b[1];
}

function rotateRockyRight(dir){
  const idx = ROCKY_DIRS.findIndex(v => sameDir(v, dir));
  const next = idx >= 0 ? (idx + 1) % ROCKY_DIRS.length : 0;
  return [...ROCKY_DIRS[next]];
}

function isRockyBaseBlocked(x,y){
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S') return true;
  if (b === '~' && !has(state.filledWater,x,y)) return true;
  if (b === 'C' || b === 'D') return true;
  return false;
}

function enemyAtExcluding(x, y, ignored){
  return state.enemies.find(e => e !== ignored && e.x === x && e.y === y);
}

function canRockyOccupy(x, y, rocky, allowPlayer = false){
  if (!inBounds(x, y)) return false;
  if (isRockyBaseBlocked(x, y)) return false;
  if (!canTraverseArrow(state.base[y][x], Math.sign(x - rocky.x), Math.sign(y - rocky.y))) return false;
  if (has(state.hearts, x, y)) return false;
  if (has(state.blocks, x, y) || has(state.eggs, x, y)) return false;
  if (enemyAtExcluding(x, y, rocky)) return false;
  if (!allowPlayer && isPlayerAt(x, y)) return false;
  return true;
}

function canSkullOccupy(x, y, skull, dx = x - skull.x, dy = y - skull.y){
  if (!inBounds(x, y)) return false;
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S' || b === 'C' || b === 'D') return false;
  if (b === '~' && !has(state.filledWater, x, y)) return false;
  if (!canTraverseArrow(b, dx, dy)) return false;
  if (has(state.hearts, x, y)) return false;
  if (has(state.blocks, x, y) || has(state.eggs, x, y)) return false;
  if (enemyAtExcluding(x, y, skull)) return false;
  return true;
}

function dirKey(dir){
  return `${dir[0]},${dir[1]}`;
}

function addPendingTurn(skull, dir){
  if (!dir) return;
  const pending = skull.pendingTurns ?? [];
  const k = dirKey(dir);
  if (pending.some(p => dirKey(p) === k)) {
    skull.pendingTurns = pending;
    return;
  }
  pending.push([...dir]);
  skull.pendingTurns = pending;
}

function chooseSkullDir(skull, canOccupy = canSkullOccupy){
  const current = skull.dir && (skull.dir[0] || skull.dir[1]) ? skull.dir : [1, 0];
  skull.dir = [...current];

  const offsetX = state.player.x - skull.x;
  const offsetY = state.player.y - skull.y;
  const horizontal = offsetX === 0 ? (skull.prefHorizontal ?? 1) : Math.sign(offsetX);
  const vertical = offsetY === 0 ? (skull.prefVertical ?? 1) : Math.sign(offsetY);
  skull.prefHorizontal = horizontal;
  skull.prefVertical = vertical;

  const reverse = [-current[0], -current[1]];
  const pending = skull.pendingTurns ?? [];
  if (pending.length) {
    const deferred = pending[0];
    const candidates = [deferred, current, [-deferred[0], -deferred[1]], reverse];
    for (let i = 0; i < candidates.length; i++) {
      const [dx, dy] = candidates[i];
      const tx = skull.x + dx;
      const ty = skull.y + dy;
      if (!canOccupy(tx, ty, skull, dx, dy)) {
        if (i <= 1) addPendingTurn(skull, [dx, dy]);
        continue;
      }
      if (sameDir([dx, dy], deferred)) pending.shift();
      skull.pendingTurns = pending;
      return [dx, dy];
    }
    skull.pendingTurns = pending;
    return current;
  }

  const movingHorizontal = current[0] !== 0;
  const targetAlongAxis = movingHorizontal ? horizontal : vertical;
  const goingGood = movingHorizontal ? current[0] === targetAlongAxis : current[1] === targetAlongAxis;
  const towardPerpendicular = movingHorizontal ? [0, vertical] : [horizontal, 0];
  const oppositePerpendicular = [-towardPerpendicular[0], -towardPerpendicular[1]];

  const candidates = goingGood
    ? [current, towardPerpendicular, oppositePerpendicular, reverse]
    : [towardPerpendicular, current, oppositePerpendicular, reverse];

  for (const [dx, dy] of candidates) {
    const tx = skull.x + dx;
    const ty = skull.y + dy;
    if (canOccupy(tx, ty, skull, dx, dy)) return [dx, dy];
  }
  return current;
}

function canLeeperOccupy(x, y, leeper, dx = x - leeper.x, dy = y - leeper.y){
  if (!canSkullOccupy(x, y, leeper, dx, dy)) return false;
  const b = state.base[y][x];
  if (b === 'T' || b === 'S') return false;
  return true;
}


function canDonMedusaOccupy(x, y, enemy, dx = x - enemy.x, dy = y - enemy.y){
  if (!inBounds(x, y)) return false;
  const b = state.base[y][x];
  if (isWallTile(b) || b === 'V' || b === 'T' || b === 'S' || b === 'C' || b === 'D') return false;
  if (b === '~' && !has(state.filledWater, x, y)) return false;
  if (!canTraverseArrow(b, dx, dy)) return false;
  if (has(state.blocks, x, y) || has(state.eggs, x, y) || has(state.hearts, x, y)) return false;
  if (enemyAtExcluding(x, y, enemy)) return false;
  return true;
}

function updateDonMedusas(now = performance.now()){
  if (state.won || state.deadUntil || state.frozenUntil) return;
  for (const enemy of state.enemies) {
    if (enemy.type !== 'don_medusa') continue;
    if ((enemy.nextStepAt ?? 0) > now) continue;
    enemy.nextStepAt = now + DON_MEDUSA_STEP_MS;

    let [dx, dy] = enemy.dir ?? (enemy.axis === 'vertical' ? [0, 1] : [1, 0]);
    if (enemy.axis === 'vertical') dx = 0;
    if (enemy.axis === 'horizontal') dy = 0;
    const tx = enemy.x + dx;
    const ty = enemy.y + dy;

    if (!canDonMedusaOccupy(tx, ty, enemy, dx, dy)) {
      dx = -dx;
      dy = -dy;
      enemy.dir = [dx, dy];
      const rx = enemy.x + dx;
      const ry = enemy.y + dy;
      if (!canDonMedusaOccupy(rx, ry, enemy, dx, dy)) continue;
      enemy.x = rx;
      enemy.y = ry;
    } else {
      enemy.dir = [dx, dy];
      enemy.x = tx;
      enemy.y = ty;
    }

    if (isPlayerAt(enemy.x, enemy.y)) {
      killPlayer(nearestPlayerFrom(enemy.x, enemy.y));
      return;
    }
  }
}

function isOrthogonallyAdjacentToPlayer(enemy){
  const distance = Math.abs(enemy.x - state.player.x) + Math.abs(enemy.y - state.player.y);
  return distance === 1;
}

function updateSkulls(now = performance.now()){
  if (state.won || state.deadUntil) return;
  const skullsActive = chestOpen() && !state.keyCollected;

  for (const enemy of state.enemies) {
    if (enemy.type !== 'skull' && enemy.type !== 'leeper') continue;
    if (enemy.type === 'skull' && !skullsActive) continue;
    if (enemy.type === 'leeper' && enemy.asleep) continue;

    if (enemy.type === 'leeper' && isOrthogonallyAdjacentToPlayer(enemy)) {
      enemy.asleep = true;
      enemy.pendingTurns = [];
      enemy.dir = [0, 0];
      continue;
    }

    if ((enemy.nextStepAt ?? 0) > now) continue;

    enemy.nextStepAt = now + SKULL_STEP_MS;
    const canOccupy = enemy.type === 'leeper' ? canLeeperOccupy : canSkullOccupy;
    const [dx, dy] = chooseSkullDir(enemy, canOccupy);
    enemy.dir = [dx, dy];
    if ((enemy.type === 'leeper' || enemy.type === 'skull') && (dx || dy)) {
      enemy.facing = [dx, dy];
    }
    const tx = enemy.x + dx;
    const ty = enemy.y + dy;
    if (!canOccupy(tx, ty, enemy, dx, dy)) continue;

    const fromX = enemy.x;
    const fromY = enemy.y;
    enemy.x = tx;
    enemy.y = ty;
    if (enemy.type === 'leeper') {
      setLeeperAnimation(enemy, fromX, fromY, tx, ty, Math.max(140, SKULL_STEP_MS - 36));
    }
    if (enemy.type === 'skull') {
      setSkullAnimation(enemy, fromX, fromY, tx, ty, Math.max(150, SKULL_STEP_MS - 24));
    }
    if (isPlayerAt(enemy.x, enemy.y)) {
      if (enemy.type === 'leeper') {
        enemy.asleep = true;
        enemy.pendingTurns = [];
        enemy.dir = [0, 0];
        continue;
      }
      killPlayer(nearestPlayerFrom(enemy.x, enemy.y));
      return;
    }

    if (enemy.type === 'leeper' && isOrthogonallyAdjacentToPlayer(enemy)) {
      enemy.asleep = true;
      enemy.pendingTurns = [];
      enemy.dir = [0, 0];
    }
  }
}

function isRockyNearPlayer(rocky){
  const offsetX = state.player.x - rocky.x;
  const offsetY = state.player.y - rocky.y;
  if (offsetX !== 0 && offsetY !== 0) return false;
  const distance = Math.abs(offsetX) + Math.abs(offsetY);
  if (distance > ROCKY_BLOCK_DISTANCE) return false;

  if (!rocky.dir || !ROCKY_DIRS.some(v => sameDir(v, rocky.dir))) {
    return true;
  }

  const facingDot = offsetX * rocky.dir[0] + offsetY * rocky.dir[1];
  return facingDot >= 0;
}

function getRockyChargeDir(rocky){
  let dx = 0;
  let dy = 0;
  if (rocky.x === state.player.x) {
    dy = Math.sign(state.player.y - rocky.y);
  } else if (rocky.y === state.player.y) {
    dx = Math.sign(state.player.x - rocky.x);
  } else {
    return null;
  }

  if (!dx && !dy) return null;
  if (!rocky.dir || !sameDir(rocky.dir, [dx, dy])) return null;

  for (let x = rocky.x + dx, y = rocky.y + dy; x !== state.player.x || y !== state.player.y; x += dx, y += dy) {
    if (!canRockyOccupy(x, y, rocky)) return null;
  }
  return [dx, dy];
}

function tryRockyPushPlayer(chargeDir){
  const nx = state.player.x + chargeDir[0];
  const ny = state.player.y + chargeDir[1];
  if (!passableForPlayer(nx, ny, false, chargeDir[0], chargeDir[1])) return false;
  const fromX = state.player.x;
  const fromY = state.player.y;
  state.player.x = nx;
  state.player.y = ny;
  setPlayerAnimation(fromX, fromY, nx, ny);
  return true;
}

function updateRocky(rocky, now){
  const chargeDir = getRockyChargeDir(rocky);
  if (chargeDir) {
    rocky.mode = 'charge';
    rocky.dir = [...chargeDir];
    rocky.facing = [...chargeDir];
  } else if (isRockyNearPlayer(rocky)) {
    rocky.mode = 'block';
  } else if (rocky.mode !== 'charge') {
    rocky.mode = 'patrol';
  }

  if (rocky.mode === 'charge') {
    if ((rocky.nextChargeAt ?? 0) > now) return;
    rocky.nextChargeAt = now + PLAYER_MOVE_MS;
    const [dx, dy] = rocky.dir || [0, 1];
    rocky.facing = [dx, dy];
    const tx = rocky.x + dx;
    const ty = rocky.y + dy;
    if (tx === state.player.x && ty === state.player.y) {
      if (has(state.hearts, tx, ty)) {
        rocky.mode = 'block';
        return;
      }
      if (!tryRockyPushPlayer([dx, dy])) {
        rocky.mode = 'block';
        return;
      }
      setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, PLAYER_MOVE_MS);
      rocky.x = tx;
      rocky.y = ty;
      return;
    }
    if (!canRockyOccupy(tx, ty, rocky)) {
      rocky.mode = 'patrol';
      return;
    }
    setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, PLAYER_MOVE_MS);
    rocky.x = tx;
    rocky.y = ty;
    return;
  }

  if (rocky.mode === 'block') {
    rocky.nextChargeAt = 0;
    const sideBySide = Math.abs(rocky.x - state.player.x) === 1 && rocky.y === state.player.y;
    if (sideBySide && state.player.facing && state.player.facing[0] === 0 && state.player.facing[1] !== 0) {
      const [, dy] = state.player.facing;
      const tx = rocky.x;
      const ty = rocky.y + dy;
      if (canRockyOccupy(tx, ty, rocky)) {
        setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, ROCKY_PATROL_STEP_MS);
        rocky.y = ty;
      }
    }
    return;
  }

  rocky.nextChargeAt = 0;
  if ((rocky.nextPatrolAt ?? 0) > now) return;
  rocky.nextPatrolAt = now + ROCKY_PATROL_STEP_MS;

  if (!rocky.dir || !ROCKY_DIRS.some(v => sameDir(v, rocky.dir))) rocky.dir = [1, 0];
  for (let i = 0; i < 4; i++) {
    const [dx, dy] = rocky.dir;
    rocky.facing = [dx, dy];
    const tx = rocky.x + dx;
    const ty = rocky.y + dy;
    if (canRockyOccupy(tx, ty, rocky)) {
      setRockyAnimation(rocky, rocky.x, rocky.y, tx, ty, ROCKY_PATROL_STEP_MS);
      rocky.x = tx;
      rocky.y = ty;
      return;
    }
    rocky.dir = rotateRockyRight(rocky.dir);
  }
}

function runRockyTurn(now = performance.now()){
  for (const enemy of state.enemies) {
    if (enemy.type !== 'rocky') continue;
    updateRocky(enemy, now);
  }
}

function isPlayerInDragonFireDirection(dragon){
  const [dx, dy] = dragon.dir || [0, 0];
  if (!dx && !dy) return false;
  return state.players.some(player => {
    if (dx !== 0) {
      if (player.y !== dragon.y) return false;
      return (player.x - dragon.x) * dx > 0;
    }
    if (player.x !== dragon.x) return false;
    return (player.y - dragon.y) * dy > 0;
  });
}


function triggerExplosionAt(x, y, now = performance.now()){
  state.explosions.push({ x, y, startedAt: now, life: EXPLOSION_FLASH_MS * 0.55 });
}

function spawnDragonFireball(dragon, now){
  const [dx, dy] = dragon.dir || [0, 0];
  const x = dragon.x + dx;
  const y = dragon.y + dy;
  if (!inBounds(x, y)) return;
  if (blockedForDragonSight(x, y)) {
    triggerExplosionAt(x, y, now);
    return;
  }
  const fireball = { x, y, dx, dy, lastStepAt: now };
  state.fireballs.push(fireball);
  const hitPlayer = isFireballTouchingAnyPlayer(fireball, now);
  if (hitPlayer) killPlayer(hitPlayer);
}

function updateDragonThreat(now = performance.now()){
  if (!chestOpen() || state.keyCollected || state.won || state.deadUntil) return;
  for (const enemy of state.enemies) {
    if (enemy.type !== 'dragon') continue;
    const seesPlayer = isPlayerInDragonFireDirection(enemy);
    if (!seesPlayer) {
      enemy.wasSeeingPlayer = false;
      continue;
    }
    const justSpottedPlayer = !enemy.wasSeeingPlayer;
    enemy.wasSeeingPlayer = true;
    if (!justSpottedPlayer && (enemy.coolDownUntil ?? 0) > now) continue;
    enemy.coolDownUntil = now + DRAGON_FIRE_COOLDOWN_MS;
    spawnDragonFireball(enemy, now);
  }
}

function advanceDragonFireballs(now = performance.now()){
  const next = [];
  for (const fireball of state.fireballs) {
    if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) continue;
    let stepped = false;
    while (now - fireball.lastStepAt >= DRAGON_FIREBALL_STEP_MS) {
      fireball.lastStepAt += DRAGON_FIREBALL_STEP_MS;
      fireball.x += fireball.dx;
      fireball.y += fireball.dy;
      stepped = true;
      if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) break;
      const tx = Math.round(fireball.x);
      const ty = Math.round(fireball.y);
      const hitPlayer = isFireballTouchingAnyPlayer(fireball, fireball.lastStepAt);
      if (hitPlayer) {
        killPlayer(hitPlayer);
        break;
      }
      if (blockedForDragonSight(tx, ty)) {
        triggerExplosionAt(tx, ty, fireball.lastStepAt);
        break;
      }
    }
    if (!inBounds(Math.round(fireball.x), Math.round(fireball.y))) continue;
    const tx = Math.round(fireball.x);
    const ty = Math.round(fireball.y);
    if (isFireballTouchingAnyPlayer(fireball, now)) continue;
    if (stepped && blockedForDragonSight(tx, ty)) continue;
    next.push(fireball);
  }
  state.fireballs = next;
}

function getFireballRenderPosition(fireball, now = performance.now()){
  const progress = Math.max(0, Math.min(1, (now - fireball.lastStepAt) / DRAGON_FIREBALL_STEP_MS));
  return {
    x: fireball.x + fireball.dx * progress,
    y: fireball.y + fireball.dy * progress,
  };
}

function blockedForMedusaShot(x,y){
  const b = state.base[y][x];
  return isWallTile(b)
    || b === 'V'
    || b === 'C'
    || b === 'D'
    || b === 'S'
    || has(state.blocks,x,y)
    || has(state.eggs,x,y)
    || Boolean(enemyAt(x, y));
}

function hasLineOfSightToPlayer(medusa){
  const orderedPlayers = [...state.players].sort((a, b) => {
    const da = Math.abs(a.x - medusa.x) + Math.abs(a.y - medusa.y);
    const db = Math.abs(b.x - medusa.x) + Math.abs(b.y - medusa.y);
    return da - db;
  });
  for (const player of orderedPlayers) {
    if (medusa.x !== player.x && medusa.y !== player.y) continue;
    if (medusa.x === player.x) {
      const step = Math.sign(player.y - medusa.y);
      let blocked = false;
      for (let y = medusa.y + step; y !== player.y; y += step) {
        if (blockedForMedusaShot(medusa.x, y)) { blocked = true; break; }
      }
      if (!blocked) return { dx: 0, dy: step, player };
      continue;
    }
    const step = Math.sign(player.x - medusa.x);
    let blocked = false;
    for (let x = medusa.x + step; x !== player.x; x += step) {
      if (blockedForMedusaShot(x, medusa.y)) { blocked = true; break; }
    }
    if (!blocked) return { dx: step, dy: 0, player };
  }
  return null;
}

function isPlayerAlignedWithMedusa(medusa){
  return state.players.some(player => medusa.x === player.x || medusa.y === player.y);
}

function medusaVisionTiles(medusa){
  const tiles = [];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx,dy] of dirs) {
    let x = medusa.x + dx;
    let y = medusa.y + dy;
    while (inBounds(x,y) && !blockedForMedusaShot(x,y)) {
      tiles.push({x,y});
      x += dx;
      y += dy;
    }
  }
  return tiles;
}

function isPlayerAdjacentToVision(medusa){
  return medusaVisionTiles(medusa).some(v => state.players.some(player => Math.abs(v.x - player.x) + Math.abs(v.y - player.y) === 1));
}

function resolveMedusaThreat(now = performance.now(), instantKill = false){
  state.medusaShot = null;
  for (const e of state.enemies) {
    if (e.type !== 'medusa' && e.type !== 'don_medusa') {
      if ('alert' in e) e.alert = false;
      continue;
    }
    const sight = hasLineOfSightToPlayer(e);
    const warning = isPlayerAdjacentToVision(e);
    const aligned = isPlayerAlignedWithMedusa(e);
    e.alert = Boolean(aligned || warning);
    if (!sight) {
      e.charge = 0;
      continue;
    }
    if (!e.charge) e.charge = now;
    if (instantKill) e.charge = Math.min(e.charge, now - MEDUSA_FREEZE_BEFORE_SHOT_MS);
    const elapsed = now - e.charge;
    state.frozenUntil = Math.max(state.frozenUntil, e.charge + MEDUSA_FREEZE_BEFORE_SHOT_MS + MEDUSA_SHOT_FLASH_MS);
    if (elapsed < MEDUSA_FREEZE_BEFORE_SHOT_MS) continue;

    const shotStartedAt = e.charge + MEDUSA_FREEZE_BEFORE_SHOT_MS;
    const shotAge = now - shotStartedAt;
    state.medusaShot = {
      fromX: e.x,
      fromY: e.y,
      toX: sight.player.x,
      toY: sight.player.y,
      chargeRatio: 1,
      ts: shotStartedAt,
      life: MEDUSA_SHOT_FLASH_MS,
    };
    if (shotAge >= MEDUSA_SHOT_FLASH_MS * 0.35 || instantKill) {
      killPlayer(sight.player);
      return;
    }
  }
}

function tick(){
  const now = performance.now();
  if (state.deadUntil) {
    if (now >= state.deadUntil) return resetLevel({ fromDeath: true });
    return;
  }
  if (state.won) return;
  if (state.frozenUntil && now >= state.frozenUntil) state.frozenUntil = 0;

  for (const [pos, hatchAt] of state.eggTimers.entries()) {
    if (now < hatchAt) continue;
    const [x,y] = pos.split(',').map(Number);
    state.eggTimers.delete(pos);
    if (!state.eggs.has(pos)) continue;
    state.eggs.delete(pos);
    if (!enemyAt(x,y)) state.enemies.push({ type:'ardilla', x, y, charge:0, alert:false });
  }

  state.explosions = state.explosions.filter(explosion => now - explosion.startedAt < explosion.life);

  runRockyTurn(now);
  updateSkulls(now);
  updateDonMedusas(now);
  updateDragonThreat(now);
  advanceDragonFireballs(now);
  resolveMedusaThreat(now);
}

function resize(){
  const r = boardWrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled = false;

  const w = r.width;
  const h = r.height;
  board.t = Math.max(12, Math.floor(Math.min((w - 4) / W, (h - 4) / H)));
  board.x = Math.floor((w - W * board.t) / 2);
  board.y = Math.floor((h - H * board.t) / 2);
}
window.addEventListener('resize', resize);

function drawSprite(name, x, y){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
  } else { 
    ctx.fillStyle = '#000'; 
    ctx.fillRect(px,py,board.t,board.t); 
  }
}

const WATER_PROC_SIZE = 16;
const WATER_PROC_FRAME_COUNT = 12;
const WATER_PROC_FRAME_MS = 90;
const WATER_PROC_BAYER_4X4 = [
  [0, 8, 2, 10],
  [12, 4, 14, 6],
  [3, 11, 1, 9],
  [15, 7, 13, 5]
];
const WATER_PROC_PALETTE = [
  [54, 104, 236],
  [86, 144, 255],
  [126, 184, 255],
  [222, 240, 255]
];
const proceduralWaterFrames = [];

function buildProceduralWaterFrame(frameIndex){
  const frameCanvas = document.createElement('canvas');
  frameCanvas.width = WATER_PROC_SIZE;
  frameCanvas.height = WATER_PROC_SIZE;
  const frameCtx = frameCanvas.getContext('2d');
  if (!frameCtx) return frameCanvas;
  const img = frameCtx.createImageData(WATER_PROC_SIZE, WATER_PROC_SIZE);
  const data = img.data;
  const phase = frameIndex / WATER_PROC_FRAME_COUNT;

  for (let y = 0; y < WATER_PROC_SIZE; y++) {
    for (let x = 0; x < WATER_PROC_SIZE; x++) {
      const nx = x / WATER_PROC_SIZE;
      const ny = y / WATER_PROC_SIZE;

      const waveA = Math.sin(((nx * 2.0) + (ny * 1.25) + phase * 0.9) * Math.PI * 2);
      const waveB = Math.sin(((nx * 3.0) - (ny * 2.0) - phase * 0.65) * Math.PI * 2);
      const waveC = Math.cos(((nx * 1.0) + (ny * 3.0) - phase * 1.2) * Math.PI * 2);
      const shimmer = Math.cos(((nx * 4.0) + (ny * 4.0) - phase * 1.15) * Math.PI * 2);

      let value = waveA * 0.48 + waveB * 0.30 + waveC * 0.22;
      value = (value + 1) * 0.5;

      const dither = (WATER_PROC_BAYER_4X4[y % 4][x % 4] / 16 - 0.5) * 0.11;
      const lit = value + dither + (shimmer > 0.82 ? 0.05 : 0);

      let shade = 0;
      if (lit > 0.76 || (lit > 0.64 && shimmer > 0.78)) shade = 3;
      else if (lit > 0.56) shade = 2;
      else if (lit > 0.34) shade = 1;

      const color = WATER_PROC_PALETTE[shade];
      const idx = (y * WATER_PROC_SIZE + x) * 4;
      data[idx] = color[0];
      data[idx + 1] = color[1];
      data[idx + 2] = color[2];
      data[idx + 3] = 255;
    }
  }

  frameCtx.putImageData(img, 0, 0);
  return frameCanvas;
}

function getProceduralWaterFrame(now){
  const frame = Math.floor(now / WATER_PROC_FRAME_MS) % WATER_PROC_FRAME_COUNT;
  if (!proceduralWaterFrames[frame]) {
    proceduralWaterFrames[frame] = buildProceduralWaterFrame(frame);
  }
  return proceduralWaterFrames[frame];
}

function drawProceduralWaterTile(x, y, now){
  const px = board.x + x * board.t;
  const py = board.y + y * board.t;
  const frameCanvas = getProceduralWaterFrame(now);
  ctx.drawImage(frameCanvas, px, py, board.t, board.t);
}

function getProceduralWaterPreviewDataUrl(now = 0){
  return getProceduralWaterFrame(now).toDataURL();
}

function getWaterSpriteName(now, x, y){
  const frame = Math.floor(now / 220) % 4;
  return frame === 0 ? 'water' : `water_${frame}`;
}

function dragonDirectionCode(dragon){
  const [dx, dy] = dragon.dir || [0, -1];
  if (dx === 1) return 'o';
  if (dx === -1) return 'e';
  if (dy === 1) return 's';
  return 'n';
}

function dragonIsActive(){
  return chestOpen() && !state.keyCollected && !state.won && !state.deadUntil;
}

function drawDragonSprite(dragon){
  const dir = dragonDirectionCode(dragon);
  const stateKey = dragonIsActive() ? 'open' : (dragon.asleep ? 'sleep' : 'idle');
  const spriteName = `dragon_${dir}_${stateKey}`;
  const px = board.x + dragon.x * board.t;
  const py = board.y + dragon.y * board.t;
  const img = sprites[spriteName];
  if (img && img.complete) {
    ctx.drawImage(img, px, py, board.t, board.t);
    return;
  }
  drawSprite(`dragon_${dir}`, dragon.x, dragon.y);
}

function draw(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  const now = getRenderNow();

  // Capa 0: Suelo en todas partes
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      drawSprite('floor', x, y);
    }
  }

  // Capa 1: Elementos base
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      const b = state.base[y][x];
      if (isWallTile(b)) drawSprite(getWallSpriteName(x,y),x,y);
      else if (b === 'V') {
        const px = board.x + x * board.t;
        const py = board.y + y * board.t;
        ctx.fillStyle = '#000';
        ctx.fillRect(px, py, board.t, board.t);
      }
      else if (b === '~') drawProceduralWaterTile(x, y, now);
      else if (b === 'R') {
        drawProceduralWaterTile(x, y, now);
        drawSprite('bridge',x,y);
      }
      else if (b === 'T') drawSprite('tree',x,y);
      else if (b === 'S') drawSprite('stone',x,y);
      else if (arrowDirectionForTile(b)) drawSprite(spriteNameForTile(b), x, y);
      else if (b === 'C') {
        drawSprite(chestOpen() ? 'chest_open' : 'chest',x,y);
        if (chestOpen() && !state.keyCollected) {
          const px = board.x + x * board.t;
          const py = board.y + y * board.t;
          const pulse = 0.5 + Math.abs(Math.sin(now * 0.01)) * 0.5;
          const glow = ctx.createRadialGradient(
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * 0.1,
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * (0.9 + pulse * 0.55)
          );
          glow.addColorStop(0, `rgba(255, 255, 180, ${0.28 + pulse * 0.22})`);
          glow.addColorStop(0.6, `rgba(255, 212, 92, ${0.24 + pulse * 0.2})`);
          glow.addColorStop(1, 'rgba(255, 212, 92, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px - board.t * 0.75, py - board.t * 0.75, board.t * 2.5, board.t * 2.5);
        }
      }
      else if (b === 'D') {
        drawSprite('door',x,y);
        const px = board.x + x * board.t;
        const py = board.y + y * board.t;
        if (!state.doorOpen) {
          ctx.fillStyle = 'rgba(20, 12, 4, 0.6)';
          ctx.fillRect(px, py, board.t, board.t);
        } else {
          const pulse = 0.45 + Math.abs(Math.sin(now * 0.008 + 1.2)) * 0.55;
          const glow = ctx.createRadialGradient(
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * 0.15,
            px + board.t * 0.5,
            py + board.t * 0.5,
            board.t * (1.05 + pulse * 0.5)
          );
          glow.addColorStop(0, `rgba(170, 240, 255, ${0.26 + pulse * 0.18})`);
          glow.addColorStop(0.65, `rgba(75, 192, 255, ${0.18 + pulse * 0.22})`);
          glow.addColorStop(1, 'rgba(75, 192, 255, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px - board.t * 0.8, py - board.t * 0.8, board.t * 2.6, board.t * 2.6);
        }
      }
    }
  }

  // Capa 2: Elementos interactivos
  for (const b of arrFromSet(state.blocks)) drawSprite('block',b.x,b.y);
  for (const hrt of arrFromSet(state.hearts)) drawSprite('heart',hrt.x,hrt.y);
  for (const egg of arrFromSet(state.eggs)) drawSprite('egg',egg.x,egg.y);
  for (const e of state.enemies) {
    if (e.type === 'dragon') {
      drawDragonSprite(e);
      continue;
    }
    if (e.type === 'rocky') {
      drawRockySprite(e, now);
      continue;
    }
    if (e.type === 'ardilla') {
      drawArdillaSprite(e, now);
      continue;
    }
    if (e.type === 'medusa' || e.type === 'don_medusa') {
      if (e.alert) {
        const px = board.x + e.x * board.t;
        const py = board.y + e.y * board.t;
        const t = now * 0.012;
        const pulse = 0.45 + Math.abs(Math.sin(t)) * 0.55;
        const radius = board.t * (0.5 + pulse * 0.32);
        const glow = ctx.createRadialGradient(
          px + board.t * 0.5,
          py + board.t * 0.5,
          board.t * 0.2,
          px + board.t * 0.5,
          py + board.t * 0.5,
          radius
        );
        glow.addColorStop(0, `rgba(246, 240, 107, ${0.24 + pulse * 0.22})`);
        glow.addColorStop(1, 'rgba(246, 240, 107, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(px - board.t * 0.4, py - board.t * 0.4, board.t * 1.8, board.t * 1.8);
      }
      if (e.type === 'medusa') drawMedusaSprite(e, now);
      else drawDonMedusaSprite(e, now);
      continue;
    }
    if (e.type === 'skull') {
      drawSkullSprite(e, now);
      continue;
    }
    if (e.type === 'leeper') {
      drawLeeperSprite(e, now);
      continue;
    }
    drawSprite(e.type, e.x, e.y);
  }

  const adjacentShootableTargets = getAdjacentShootableTargets();
  if (adjacentShootableTargets.length) {
    const pulse = 0.45 + Math.abs(Math.sin(now * 0.013)) * 0.55;
    for (const target of adjacentShootableTargets) {
      const px = board.x + target.x * board.t;
      const py = board.y + target.y * board.t;
      const glow = ctx.createRadialGradient(
        px + board.t * 0.5,
        py + board.t * 0.5,
        board.t * 0.12,
        px + board.t * 0.5,
        py + board.t * 0.5,
        board.t * (0.65 + pulse * 0.55)
      );
      glow.addColorStop(0, `rgba(255, 82, 82, ${0.26 + pulse * 0.26})`);
      glow.addColorStop(0.6, `rgba(255, 36, 36, ${0.22 + pulse * 0.22})`);
      glow.addColorStop(1, 'rgba(255, 24, 24, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(px - board.t * 0.6, py - board.t * 0.6, board.t * 2.2, board.t * 2.2);
      const centerX = px + board.t * 0.5;
      const centerY = py + board.t * 0.5;
      const ringRadius = board.t * (0.28 + pulse * 0.07);
      const ringWidth = Math.max(1.5, board.t * 0.08);
      ctx.strokeStyle = `rgba(255, 98, 98, ${0.58 + pulse * 0.32})`;
      ctx.lineWidth = ringWidth;
      ctx.beginPath();
      ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
      ctx.stroke();

      const armInner = ringRadius + ringWidth * 0.4;
